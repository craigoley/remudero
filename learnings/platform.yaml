# again (W1-T9 spent ~29 discovery turns; the /usage shape is W1-T4/headroom.ts, the keys were nowhere). ──
- id: claude-json-tier-keys
  subsystem: platform
  lifecycle: active
  files: [src/lib/tier.ts, src/lib/init.ts, src/lib/headroom.ts]
  fact: >-
    ~/.claude.json exposes tier-relevant KEYS locally, with NO network call: hasAvailableSubscription,
