openapi: 3.1.0
info:
  title: Remudero Daemon Service Surface
  version: 0.1.0
  description: >
    The daemon's ONE tailnet service surface (MASTER-PLAN §7A): REST + SSE,
    single port, bearer-scoped (read vs. write). No client gets a private
    backdoor -- packages/api-client is GENERATED from this document (see
    scripts/generate-api-client.mjs) and is the ONLY way any client talks to
    the daemon.


    v0 (W3-T1a, src/lib/service.ts) shipped the generic mechanism only: bearer
    read/write scope enforcement, a shared JSON error envelope, and SSE
    framing, with `paths` intentionally empty -- no business route yet.

    W3-T2 (MASTER-PLAN §7, WS-5a -- the read-only live board) adds the first
    two: GET /v1/status (task/ledger-state snapshot) and GET /v1/status/stream
    (its SSE live-update companion), built on that same mechanism via
    src/lib/board.ts.

    W3-T5 (MASTER-PLAN §7 -- human-in-the-loop panel actions) adds the first
    write routes: POST /v1/control/{pause,resume,stop}, POST /v1/quiet-hours,
    POST /v1/questions/answer, and POST /v1/manual/approve, all write-scoped
    and built via src/lib/panel-actions.ts. Every route the daemon's OTHER
    surfaces still need (plan editing, ...) is registered by later tasks the
    same way -- this document is additive, never rewritten wholesale.

servers:
  - url: "https://{tailnetHost}"
    description: The daemon over Tailscale, one port for REST and SSE alike.
    variables:
      tailnetHost:
        default: localhost:4317

components:
  securitySchemes:
    bearerRead:
      type: http
      scheme: bearer
      description: >
        Read-scoped bearer token. Grants GET access to read-scoped routes and
        SSE streams. A write-scoped token also satisfies this scope (write is
        a superset of read).
    bearerWrite:
      type: http
      scheme: bearer
      description: >
        Write-scoped bearer token. Required for any route whose `scope` is
        `write` (src/lib/service.ts's `Scope`).

  schemas:
    Error:
      type: object
      description: >
        The JSON error envelope every non-2xx response on the surface
        returns (src/lib/service.ts's `sendJson` error paths).
      required:
        - error
      properties:
        error:
          type: string
          description: >
            `unauthorized` (401, no/unrecognized bearer token), `forbidden`
            (403, recognized token missing the required scope), `not_found`
            (404, no route registered for this method + path),
            `invalid_request` (400, a write route's JSON body failed
            validation -- W3-T5's panel-action routes fail loud BEFORE any
            side effect, src/lib/panel-actions.ts's `jsonAction`), or
            `internal_error` (500, the route handler threw).
          enum:
            - unauthorized
            - forbidden
            - not_found
            - invalid_request
            - internal_error
        required_scope:
          type: string
          description: Present only on a 403 -- the scope the caller's token was missing.
          enum:
            - read
            - write

    StatusProjection:
      type: object
      description: >
        One task's projected merge-state, derived from GitHub (src/lib/status.ts's
        `StatusProjection` -- never written back to plan/tasks.yaml). This is the
        per-task "live state" the read-only board (W3-T2) renders.
      required:
        - taskId
        - status
        - merged
        - source
      properties:
        taskId:
          type: string
          description: The plan task id (plan/tasks.yaml's `id`).
        status:
          type: string
          description: Derived status label in the plan's vocabulary (src/lib/plan.ts's TaskStatus).
          enum:
            - queued
            - recon
            - prompted
            - running
            - review
            - fixing
            - diagnosing
            - blocked
            - merged
            - done
        merged:
          type: boolean
          description: The single fact dependency-gating cares about -- has this task landed?
        source:
          type: string
          description: Which precedence source resolved this projection (or `none`).
          enum:
            - ledger
            - pr-field
            - trailer
            - correction
            - none
        prNumber:
          type: number
        prUrl:
          type: string
        prState:
          type: string
        rejected_candidates:
          type: array
          description: >
            Trailer search hits rejected by the ownership/anchor asserts, each with a
            machine-readable reason. Present only when a candidate was actually rejected.
          items:
            type: object
            required:
              - pr
              - reason
            properties:
              pr:
                type: string
              reason:
                type: string

    StatusSnapshot:
      type: object
      description: >
        GET /v1/status's body -- one StatusProjection per plan task, as of `generated_at`.
      required:
        - generated_at
        - tasks
      properties:
        generated_at:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/StatusProjection"

    # ── W3-T5 (MASTER-PLAN §7, human-in-the-loop panel actions) -- request/result shapes for
    # the six write routes src/lib/panel-actions.ts registers. Every one is write-scoped and
    # ledgered with the caller's bearer as `origin` (src/lib/panel-actions.ts's `bearerTokenId`).
    PauseRequest:
      type: object
      description: POST /v1/control/pause's body -- drain-and-hold, an optional human-readable reason.
      properties:
        reason:
          type: string

    PauseResult:
      type: object
      required:
        - paused
      properties:
        paused:
          type: boolean
        reason:
          type:
            - string
            - "null"

    ResumeResult:
      type: object
      description: POST /v1/control/resume's body -- clears BOTH STOP and PAUSE; reports what it cleared.
      required:
        - clearedStop
        - clearedPause
      properties:
        clearedStop:
          type: boolean
        clearedPause:
          type: boolean

    StopRequest:
      type: object
      description: POST /v1/control/stop's body -- the hard kill, an optional human-readable reason.
      properties:
        reason:
          type: string

    StopResult:
      type: object
      required:
        - stopped
      properties:
        stopped:
          type: boolean
        reason:
          type:
            - string
            - "null"

    QuietHoursRequest:
      type: object
      description: POST /v1/quiet-hours's body -- the toggle's target state.
      required:
        - enabled
      properties:
        enabled:
          type: boolean

    QuietHoursResult:
      type: object
      required:
        - quietHours
      properties:
        quietHours:
          type: boolean

    AnswerQuestionRequest:
      type: object
      description: >
        POST /v1/questions/answer's body -- an operator's answer to a QUESTION-contract entry
        (worker.ts's plan/questions.ndjson), addressed by the task it was raised on (v0 routing
        has no path params, src/lib/service.ts).
      required:
        - taskId
        - answer
      properties:
        taskId:
          type: string
        answer:
          type: string

    AnswerQuestionResult:
      type: object
      required:
        - ok
        - taskId
        - answer
      properties:
        ok:
          type: boolean
        taskId:
          type: string
        answer:
          type: string

    ApproveManualRequest:
      type: object
      description: >
        POST /v1/manual/approve's body -- check off a MANUAL-queue item (MASTER-PLAN §4): closes
        the named `escalation-manual`-labeled GitHub issue (src/lib/escalate.ts).
      required:
        - taskId
        - issueUrl
      properties:
        taskId:
          type: string
        issueUrl:
          type: string

    ApproveManualResult:
      type: object
      required:
        - ok
        - taskId
        - issueUrl
      properties:
        ok:
          type: boolean
        taskId:
          type: string
        issueUrl:
          type: string

  responses:
    Unauthorized:
      description: No or unrecognized bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: A recognized token whose granted scope does not cover this route.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: No route registered for this method + path.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidRequest:
      description: The JSON body failed validation -- no side effect occurred (src/lib/panel-actions.ts's `jsonAction`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

# W3-T2 (MASTER-PLAN §7, WS-5a): the read-only live board's first real business routes --
# a task/ledger-state snapshot (REST) and its live-update companion (SSE). Both are built on
# the v0 mechanism above (src/lib/service.ts) and existing projection logic (src/lib/status.ts)
# -- see src/lib/board.ts. Every OTHER route the design (plan render, worker stream tails,
# DECISIONS feed, escalation inbox, question backlog, cost meter) describes is explicit
# follow-on work, not added here.
paths:
  /v1/status:
    get:
      summary: The current board snapshot -- one StatusProjection per plan task.
      description: >
        Read-only live board (MASTER-PLAN §7, WS-5a -> W3-T2): the task-DAG live-state
        projection, computed via src/lib/status.ts's `projectPlan` over the current plan +
        ledger + GitHub (src/lib/board.ts's `computeBoardSnapshot`).
      security:
        - bearerRead: []
      responses:
        "200":
          description: The current board snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── W3-T5 (MASTER-PLAN §7, human-in-the-loop panel actions) -- write routes over the SAME
  # v0 mechanism (src/lib/service.ts), all write-scoped, all built by src/lib/panel-actions.ts.
  # Depends on W3-T2's board existing (the panel acts on what the board shows). Every write
  # is ledgered with the caller's bearer as `origin`, never the raw token (see
  # src/lib/panel-actions.ts's header). Real `rmd serve` CLI wiring is later work, same split
  # W3-T2's routes below already document.
  /v1/control/pause:
    post:
      summary: Pause the fleet (drain-and-hold) -- no new spawns; an in-flight task still finishes.
      description: >
        MASTER-PLAN §4A/§4B: writes the PAUSE flag (src/lib/fleet-control.ts's `requestPause`),
        checked at the top of every drain tick. Ledgers `panel.pause_requested`.
      security:
        - bearerWrite: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PauseRequest"
      responses:
        "200":
          description: PAUSE is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PauseResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/control/resume:
    post:
      summary: Resume the fleet -- clears BOTH STOP and PAUSE.
      description: >
        MASTER-PLAN §4A: the one command that always means go (src/lib/fleet-control.ts's
        `resumeFleet`). Does NOT touch quiet hours -- a schedule preference, not an emergency
        hold. Ledgers `panel.resume_requested`. No request body.
      security:
        - bearerWrite: []
      responses:
        "200":
          description: STOP and PAUSE are both cleared (whichever were set).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/control/stop:
    post:
      summary: STOP the fleet -- the hard kill, checked first, every tick.
      description: >
        MASTER-PLAN §4A/§4B: writes the STOP flag (src/lib/fleet-control.ts's `requestStop`),
        checked before PAUSE and before picking up any new task. "STOP from the panel halts the
        fleet within one tick" (W3-T5 acceptance) -- the SAME predicate drain.ts's loop already
        checks first. Ledgers `panel.stop_requested`.
      security:
        - bearerWrite: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopRequest"
      responses:
        "200":
          description: STOP is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/quiet-hours:
    post:
      summary: Toggle quiet hours -- a scheduler preference (default OFF), independent of STOP/PAUSE.
      description: >
        MASTER-PLAN §9: "quiet-hours is now an OPTIONAL wizard toggle, default OFF." Flips
        src/lib/fleet-control.ts's QUIET_HOURS flag; the scheduler that reads it to throttle
        spawns is later work (this route ships the mechanism, not the consumer -- same split
        every route on this surface follows). Ledgers `panel.quiet_hours_toggled`.
      security:
        - bearerWrite: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuietHoursRequest"
      responses:
        "200":
          description: The resulting quiet-hours state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuietHoursResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/questions/answer:
    post:
      summary: Answer a QUESTION-contract entry (MASTER-PLAN §2), attributed to the panel's bearer.
      description: >
        "An escalation answered FROM the panel appears in the ledger with the panel's bearer
        token as origin; the answer flows to the Architect" (W3-T5 acceptance) -- proof is the
        resulting `panel.question_answered` ledger line (src/lib/panel-actions.ts).
      security:
        - bearerWrite: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerQuestionRequest"
      responses:
        "200":
          description: The answer was recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnswerQuestionResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/manual/approve:
    post:
      summary: Approve (check off) a MANUAL-queue item -- closes its GitHub issue.
      description: >
        MASTER-PLAN §4: "the MANUAL queue doubles as the human's to-do list -- rendered in the
        control panel with check-off (= closing the issue)." Closes the named
        `escalation-manual`-labeled issue (src/lib/escalate.ts) FIRST, then ledgers
        `panel.manual_approved` -- a close that fails never produces a false-approved ledger line.
      security:
        - bearerWrite: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveManualRequest"
      responses:
        "200":
          description: The issue was closed and the approval recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveManualResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/status/stream:
    get:
      summary: SSE stream of task state flips -- one `status` event per changed StatusProjection.
      description: >
        Live companion to GET /v1/status (MASTER-PLAN §7, WS-5a -> W3-T2): the daemon tails
        state/ledger.ndjson (src/lib/board.ts's `buildStatusStream`) and, for every new line
        naming a task whose derived StatusProjection actually changed, emits an SSE `status`
        event carrying that StatusProjection (src/lib/service.ts's SSE framing). Requires a
        read-scoped bearer token, same as GET /v1/status.
      security:
        - bearerRead: []
      responses:
        "200":
          description: >
            An open text/event-stream connection. Event framing is outside this OpenAPI
            subset's response-body modeling -- each `status` event's `data` payload is a
            components.schemas.StatusProjection.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
