openapi: 3.1.0
info:
  title: Remudero Daemon Service Surface
  version: 0.1.0
  description: >
    The daemon's ONE tailnet service surface (MASTER-PLAN §7A): REST + SSE,
    single port, bearer-scoped (read vs. write). No client gets a private
    backdoor -- packages/api-client is GENERATED from this document (see
    scripts/generate-api-client.mjs) and is the ONLY way any client talks to
    the daemon.


    v0 (W3-T1a, src/lib/service.ts) shipped the generic mechanism only: bearer
    read/write scope enforcement, a shared JSON error envelope, and SSE
    framing, with `paths` intentionally empty -- no business route yet.

    W3-T2 (MASTER-PLAN §7, WS-5a -- the read-only live board) adds the first
    two: GET /v1/status (task/ledger-state snapshot) and GET /v1/status/stream
    (its SSE live-update companion), built on that same mechanism via
    src/lib/board.ts.

    W3-T5 (MASTER-PLAN §7 -- human-in-the-loop panel actions) adds the first
    write routes: POST /v1/control/{pause,resume,stop}, POST /v1/quiet-hours,
    POST /v1/questions/answer, and POST /v1/manual/approve, all write-scoped
    and built via src/lib/panel-actions.ts.

    W3-T6 (MASTER-PLAN §7B -- the plan->task->PR graph + interactive plan
    adjustment) adds GET /v1/feedback (the inbox), POST /v1/feedback (submit
    feedback / answer a grill, origin=ui), GET /v1/trace (the plan->task->PR
    provenance graph, W1-T43), and POST /v1/feedback/decision (accept/reject a
    proposal), all built via src/lib/panel-graph.ts.

    W3-T8 (MASTER-PLAN §5B/§7 -- panel skill actions) adds GET /v1/skills: the
    panel's action-button set, resolved fresh from `.remudero/skills/<name>.yaml`
    (the SAME registry `rmd skill list` reads, W1-T44) via src/lib/panel-skills.ts
    -- one button per registry entry, generated, never hard-coded. POST
    /v1/skills/run (src/lib/panel-skill-run.ts) invokes one: today `{ skill:
    "plan", mode: "clarify" }` (Refine) is wired, grounding via the real §5C task
    linter and parking a `grilling` feedback entry the existing GET/POST
    /v1/feedback (W3-T6) already renders inline and answers.

    Every route the daemon's OTHER surfaces still need (re-prioritize, ...) is
    registered by later tasks the same way -- this document is additive, never
    rewritten wholesale.

servers:
  - url: "https://{tailnetHost}"
    description: The daemon over Tailscale, one port for REST and SSE alike.
    variables:
      tailnetHost:
        default: localhost:4317

components:
  securitySchemes:
    bearerRead:
      type: http
      scheme: bearer
      description: >
        Read-scoped bearer token. Grants GET access to read-scoped routes and
        SSE streams. A write-scoped token also satisfies this scope (write is
        a superset of read).
    bearerWrite:
      type: http
      scheme: bearer
      description: >
        Write-scoped bearer token. Required for any route whose `scope` is
        `write` (src/lib/service.ts's `Scope`).

  schemas:
    Error:
      type: object
      description: >
        The JSON error envelope every non-2xx response on the surface
        returns (src/lib/service.ts's `sendJson` error paths).
      required:
        - error
      properties:
        error:
          type: string
          description: >
            `unauthorized` (401, no/unrecognized bearer token), `forbidden`
            (403, recognized token missing the required scope), `not_found`
            (404, no route registered for this method + path),
            `invalid_request` (400, a write route's JSON body failed
            validation -- W3-T5's panel-action routes fail loud BEFORE any
            side effect, src/lib/panel-actions.ts's `jsonAction`), or
            `internal_error` (500, the route handler threw).
          enum:
            - unauthorized
            - forbidden
            - not_found
            - invalid_request
            - internal_error
        required_scope:
          type: string
          description: Present only on a 403 -- the scope the caller's token was missing.
          enum:
            - read
            - write

    StatusProjection:
      type: object
      description: >
        One task's projected merge-state, derived from GitHub (src/lib/status.ts's
        `StatusProjection` -- never written back to plan/tasks.yaml). This is the
        per-task "live state" the read-only board (W3-T2) renders.
      required:
        - taskId
        - status
        - merged
        - source
      properties:
        taskId:
          type: string
          description: The plan task id (plan/tasks.yaml's `id`).
        status:
          type: string
          description: Derived status label in the plan's vocabulary (src/lib/plan.ts's TaskStatus).
          enum:
            - queued
            - recon
            - prompted
            - running
            - review
            - fixing
            - diagnosing
            - blocked
            - merged
            - done
        merged:
          type: boolean
          description: The single fact dependency-gating cares about -- has this task landed?
        source:
          type: string
          description: Which precedence source resolved this projection (`none` if GitHub was read but had no evidence; `throttled` if GitHub could not be read at all).
          enum:
            - ledger
            - pr-field
            - trailer
            - correction
            - none
            - throttled
        prNumber:
          type: number
        prUrl:
          type: string
        prState:
          type: string
        rejected_candidates:
          type: array
          description: >
            Trailer search hits rejected by the ownership/anchor asserts, each with a
            machine-readable reason. Present only when a candidate was actually rejected.
          items:
            type: object
            required:
              - pr
              - reason
            properties:
              pr:
                type: string
              reason:
                type: string

    StatusSnapshot:
      type: object
      description: >
        GET /v1/status's body -- one StatusProjection per plan task, as of `generated_at`, plus
        (W1-T163, when the daemon's per-token last-seen marker store is wired) the calling
        token's own "since you last checked" recap.
      required:
        - generated_at
        - tasks
      properties:
        generated_at:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/StatusProjection"
        recap:
          type: array
          description: >
            W1-T163: every recap-worthy event (src/lib/recap.ts) after this token's PRIOR
            marker -- absent entirely on a daemon with no last-seen store wired; `[]` on this
            token's first-ever view (nothing to recap FROM).
          items:
            $ref: "#/components/schemas/RecapEvent"
        sinceCheckpoint:
          type: string
          description: >
            W1-T163: this token's marker value BEFORE this request advanced it -- the timestamp
            `recap` was computed as-of. Absent alongside `recap` for the same two reasons.

    RecapEvent:
      type: object
      description: >
        W1-T163 -- one "since you last checked" row (src/lib/recap.ts): a single ledger event
        after the caller's per-token marker.
      required:
        - kind
        - taskId
        - ts
      properties:
        kind:
          type: string
          enum:
            - merged
            - blocked
            - escalated
            - question_answered
            - retro
        taskId:
          type: string
          description: The originating ledger line's `task_id` verbatim -- `RETRO` for a fleet-wide retro event.
        ts:
          type: string
        detail:
          type: string
          description: A short human-readable detail (verdict string, escalation class, answer text, retro stats).
        title:
          type: string
          description: The plan task's own title -- present only when `taskId` names a real plan task.
        taskCardLink:
          type: string
          description: >
            A same-page `#task=<id>` hash link into the console's task card -- present ONLY
            when `taskId` names a real plan task (a fleet-wide event like `retro` has none).

    # ── W3-T5 (MASTER-PLAN §7, human-in-the-loop panel actions) -- request/result shapes for
    # the six write routes src/lib/panel-actions.ts registers. Every one is write-scoped and
    # ledgered with the caller's bearer as `origin` (src/lib/panel-actions.ts's `bearerTokenId`).
    PauseRequest:
      type: object
      description: POST /v1/control/pause's body -- drain-and-hold, an optional human-readable reason.
      properties:
        reason:
          type: string

    PauseResult:
      type: object
      required:
        - paused
      properties:
        paused:
          type: boolean
        reason:
          type:
            - string
            - "null"

    ResumeResult:
      type: object
      description: POST /v1/control/resume's body -- clears BOTH STOP and PAUSE; reports what it cleared.
      required:
        - clearedStop
        - clearedPause
      properties:
        clearedStop:
          type: boolean
        clearedPause:
          type: boolean

    StopRequest:
      type: object
      description: POST /v1/control/stop's body -- the hard kill, an optional human-readable reason.
      properties:
        reason:
          type: string

    StopResult:
      type: object
      required:
        - stopped
      properties:
        stopped:
          type: boolean
        reason:
          type:
            - string
            - "null"

    QuietHoursRequest:
      type: object
      description: POST /v1/quiet-hours's body -- the toggle's target state.
      required:
        - enabled
      properties:
        enabled:
          type: boolean

    QuietHoursResult:
      type: object
      required:
        - quietHours
      properties:
        quietHours:
          type: boolean

    AnswerQuestionRequest:
      type: object
      description: >
        POST /v1/questions/answer's body -- an operator's answer to a QUESTION-contract entry
        (worker.ts's plan/questions.ndjson), addressed by the task it was raised on (v0 routing
        has no path params, src/lib/service.ts).
      required:
        - taskId
        - answer
      properties:
        taskId:
          type: string
        answer:
          type: string

    AnswerQuestionResult:
      type: object
      required:
        - ok
        - taskId
        - answer
      properties:
        ok:
          type: boolean
        taskId:
          type: string
        answer:
          type: string

    ApproveManualRequest:
      type: object
      description: >
        POST /v1/manual/approve's body -- check off a MANUAL-queue item (MASTER-PLAN §4): closes
        the named `escalation-manual`-labeled GitHub issue (src/lib/escalate.ts).
      required:
        - taskId
        - issueUrl
      properties:
        taskId:
          type: string
        issueUrl:
          type: string

    ApproveManualResult:
      type: object
      required:
        - ok
        - taskId
        - issueUrl
      properties:
        ok:
          type: boolean
        taskId:
          type: string
        issueUrl:
          type: string

    MarkEscalationHandledRequest:
      type: object
      description: >
        POST /v1/escalation/mark-handled's body (W1-T182) -- the NEEDS ME affordance an
        ESCALATION row (any class: BLOCKED/MANUAL/HARD_STOP/GRILL) actually supports, distinct
        from ApproveManualRequest's MANUAL-queue check-off: "approve" has no defined verb for an
        escalation. Closes the named `needs-human`-labeled GitHub issue (src/lib/escalate.ts);
        the name is deliberately "mark handled", not "approve" or "resolve" -- closing the issue
        does not, by itself, imply the underlying block is fixed.
      required:
        - taskId
        - issueUrl
      properties:
        taskId:
          type: string
        issueUrl:
          type: string

    MarkEscalationHandledResult:
      type: object
      required:
        - ok
        - taskId
        - issueUrl
      properties:
        ok:
          type: boolean
        taskId:
          type: string
        issueUrl:
          type: string

    # ── W3-T6 (MASTER-PLAN §7B) -- the plan->task->PR graph + interactive plan adjustment:
    # submit feedback, answer grills, accept/reject a proposal. Built over the SAME feedback
    # inbox (src/lib/feedback.ts) and trace chain (src/lib/trace.ts, W1-T43) already documented
    # there; the four routes below are src/lib/panel-graph.ts's registrations.
    FeedbackEntry:
      type: object
      description: >
        One `plan/feedback/<id>.yaml` entry (src/lib/feedback.ts's `FeedbackEntry` -- the
        §7B schema shape: capture -> triage -> gate).
      required:
        - id
        - ts
        - raw
        - attachments
        - origin
        - status
        - proposal_pr
      properties:
        id:
          type: string
        ts:
          type: string
        raw:
          type: string
        attachments:
          type: array
          items:
            type: string
        origin:
          type: string
          enum:
            - cli
            - ui
            - issue
        status:
          type: string
          enum:
            - new
            - grilling
            - proposed
            - accepted
            - rejected
        proposal_pr:
          type:
            - string
            - "null"
          description: Set once `rmd triage` opens a proposal PR for this entry; null until then.

    FeedbackInboxResult:
      type: object
      description: GET /v1/feedback's body -- every captured feedback entry, oldest first.
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/FeedbackEntry"

    SubmitFeedbackRequest:
      type: object
      description: >
        POST /v1/feedback's body -- submit feedback from the panel (ALWAYS captured with
        origin: ui, never taken from this body). `replyTo`, if given, must name an existing
        entry parked `grilling` -- this is "answer a grill" v1 (src/lib/panel-graph.ts's header
        explains why): the answer is captured as a fresh feedback entry that re-enters triage,
        rather than a second, parallel answer-delivery primitive ahead of the still-unbuilt
        W1-T42 grill mechanics.
      required:
        - text
      properties:
        text:
          type: string
        attachments:
          type: array
          description: http(s) links ONLY -- a local file path would resolve against the daemon's own filesystem, not the operator's.
          items:
            type: string
        replyTo:
          type: string
          description: The `grilling` feedback id this submission answers, if any.

    SubmitFeedbackResult:
      type: object
      required:
        - ok
        - entry
      properties:
        ok:
          type: boolean
        entry:
          $ref: "#/components/schemas/FeedbackEntry"

    TraceRun:
      type: object
      description: One run named on a task's ledger lines (src/lib/trace.ts's `TraceRun`).
      required:
        - runId
      properties:
        runId:
          type: string
        verdict:
          type: string
        prUrl:
          type: string
        prState:
          type: string
        mergeSha:
          type: string

    TraceTaskNode:
      type: object
      required:
        - id
        - title
        - runs
      properties:
        id:
          type: string
        title:
          type: string
        origin:
          type: string
        runs:
          type: array
          items:
            $ref: "#/components/schemas/TraceRun"

    TraceFeedbackNode:
      type: object
      required:
        - id
        - raw
        - ts
        - origin
        - status
      properties:
        id:
          type: string
        raw:
          type: string
        ts:
          type: string
        origin:
          type: string
        status:
          type: string
        proposalPr:
          type: string
        proposalPrState:
          type: string
        proposalMergeSha:
          type: string

    TraceChain:
      type: object
      description: >
        The plan->task->PR provenance chain the panel renders as a graph (src/lib/trace.ts's
        `TraceChain`, W1-T43): a feedback -> proposal PR -> task(s) -> run(s) -> PR(s) -> sha,
        entered either FORWARD (from a feedback id) or REVERSE (from a task id).
      required:
        - direction
        - tasks
      properties:
        direction:
          type: string
          enum:
            - forward
            - reverse
        feedback:
          $ref: "#/components/schemas/TraceFeedbackNode"
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/TraceTaskNode"

    TraceResult:
      type: object
      description: GET /v1/trace's body -- the structured chain (for the graph render) plus the pre-rendered plain-text tree (`rmd trace`'s own output).
      required:
        - chain
        - rendered
      properties:
        chain:
          $ref: "#/components/schemas/TraceChain"
        rendered:
          type: string

    ProposalDecisionRequest:
      type: object
      description: POST /v1/feedback/decision's body -- accept or reject a `proposed` entry.
      required:
        - id
        - decision
      properties:
        id:
          type: string
        decision:
          type: string
          enum:
            - accept
            - reject

    ProposalDecisionResult:
      type: object
      required:
        - ok
        - id
        - status
        - proposalPr
      properties:
        ok:
          type: boolean
        id:
          type: string
        status:
          type: string
        proposalPr:
          type:
            - string
            - "null"

    # ── W3-T8 (MASTER-PLAN §5B/§7 -- panel skill actions) -- the button set
    # src/lib/panel-skills.ts's ONE route returns, resolved from
    # `.remudero/skills/<name>.yaml` (lib/skill.ts's `Skill`, W1-T44) the SAME
    # way `rmd skill list` does.
    SkillEntry:
      type: object
      description: >
        One `.remudero/skills/<name>.yaml` entry (lib/skill.ts's `Skill`) -- the panel button
        IS this registry entry (MASTER-PLAN §5B). `name` is the file's basename, never a
        `name:` field inside the body, so it can never drift from what `rmd skill list`
        reports it under.
      required:
        - name
        - tools
        - permission_profile
        - output_contract
        - grounding_sources
        - gate
        - tier
      properties:
        name:
          type: string
          description: The skill's identity -- its filename minus `.yaml`.
        tools:
          type: array
          items:
            type: string
        permission_profile:
          type: string
        output_contract:
          type: string
        grounding_sources:
          type: array
          items:
            type: string
        gate:
          type: string
        tier:
          type: string

    SkillsListResult:
      type: object
      description: >
        GET /v1/skills's body -- one SkillEntry per `.remudero/skills/<name>.yaml`, resolved
        fresh on every request (src/lib/panel-skills.ts).
      required:
        - skills
      properties:
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillEntry"

    # ── W3-T8 round 2 (MASTER-PLAN §5B/§7) -- invoking a registry skill button. Today ONE
    # skill+mode is wired: { skill: "plan", mode: "clarify" }, the panel's "Refine" button
    # (src/lib/panel-skill-run.ts).
    RunSkillRequest:
      type: object
      description: >
        POST /v1/skills/run's body -- which registry skill to invoke, an optional mode, and
        (for `plan`/`clarify`, i.e. Refine) the plan task id it targets.
      required:
        - skill
      properties:
        skill:
          type: string
          description: A name present in the `.remudero/skills/<name>.yaml` registry (validated against GET /v1/skills's own source).
        mode:
          type: string
          description: 'The skill mode, e.g. "clarify" for Refine (§5B: plan is ONE skill, THREE MODES).'
        taskId:
          type: string
          description: The plan/tasks.yaml task id this invocation targets. Required for `plan`/`clarify` (Refine).

    RunSkillResult:
      type: object
      description: >
        POST /v1/skills/run's body -- the invoked skill echoed back plus the grill it parked.
        Today always carries a `grilling` `feedback` entry: Refine is the only wired skill/mode,
        and Refine always grills (grounds via the real §5C linter, never proposes outright).
      required:
        - ok
        - skill
        - taskId
        - feedback
      properties:
        ok:
          type: boolean
        skill:
          type: string
        mode:
          type: string
        taskId:
          type: string
        feedback:
          $ref: "#/components/schemas/FeedbackEntry"

  responses:
    Unauthorized:
      description: No or unrecognized bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: A recognized token whose granted scope does not cover this route.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: No route registered for this method + path.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InvalidRequest:
      description: The JSON body failed validation -- no side effect occurred (src/lib/panel-actions.ts's `jsonAction`).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

# W3-T2 (MASTER-PLAN §7, WS-5a): the read-only live board's first real business routes --
# a task/ledger-state snapshot (REST) and its live-update companion (SSE). Both are built on
# the v0 mechanism above (src/lib/service.ts) and existing projection logic (src/lib/status.ts)
# -- see src/lib/board.ts. Every OTHER route the design (plan render, worker stream tails,
# DECISIONS feed, escalation inbox, question backlog, cost meter) describes is explicit
# follow-on work, not added here.
paths:
  /v1/status:
    get:
      summary: The current board snapshot -- one StatusProjection per plan task.
      description: >
        Read-only live board (MASTER-PLAN §7, WS-5a -> W3-T2): the task-DAG live-state
        projection, computed via src/lib/status.ts's `projectPlan` over the current plan +
        ledger + GitHub (src/lib/board.ts's `computeBoardSnapshot`).
      security:
        - bearerRead: []
      responses:
        "200":
          description: The current board snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── W3-T5 (MASTER-PLAN §7, human-in-the-loop panel actions) -- write routes over the SAME
  # v0 mechanism (src/lib/service.ts), all write-scoped, all built by src/lib/panel-actions.ts.
  # Depends on W3-T2's board existing (the panel acts on what the board shows). Every write
  # is ledgered with the caller's bearer as `origin`, never the raw token (see
  # src/lib/panel-actions.ts's header). Real `rmd serve` CLI wiring is later work, same split
  # W3-T2's routes below already document.
  /v1/control/pause:
    post:
      summary: Pause the fleet (drain-and-hold) -- no new spawns; an in-flight task still finishes.
      description: >
        MASTER-PLAN §4A/§4B: writes the PAUSE flag (src/lib/fleet-control.ts's `requestPause`),
        checked at the top of every drain tick. Ledgers `panel.pause_requested`.
      security:
        - bearerWrite: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PauseRequest"
      responses:
        "200":
          description: PAUSE is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PauseResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/control/resume:
    post:
      summary: Resume the fleet -- clears BOTH STOP and PAUSE.
      description: >
        MASTER-PLAN §4A: the one command that always means go (src/lib/fleet-control.ts's
        `resumeFleet`). Does NOT touch quiet hours -- a schedule preference, not an emergency
        hold. Ledgers `panel.resume_requested`. No request body.
      security:
        - bearerWrite: []
      responses:
        "200":
          description: STOP and PAUSE are both cleared (whichever were set).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/control/stop:
    post:
      summary: STOP the fleet -- the hard kill, checked first, every tick.
      description: >
        MASTER-PLAN §4A/§4B: writes the STOP flag (src/lib/fleet-control.ts's `requestStop`),
        checked before PAUSE and before picking up any new task. "STOP from the panel halts the
        fleet within one tick" (W3-T5 acceptance) -- the SAME predicate drain.ts's loop already
        checks first. Ledgers `panel.stop_requested`.
      security:
        - bearerWrite: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopRequest"
      responses:
        "200":
          description: STOP is now set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StopResult"
        "400":
          $ref: "#/components/responses/InvalidRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/quiet-hours:
