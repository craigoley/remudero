# Remudero — .remudero/mounts.yaml (mount-routing policy table, v0 — static)
#
# MASTER-PLAN §9. A DETERMINISTIC policy table (no per-call LLM judgment): keyed
# by (task_type × risk) → a mount { model, effort, max_turns, context_budget }.
# v0 is a STATIC table; the flywheel (WS-8) later proposes downgrades/upgrades as
# golden-gated PRs — routing is knowledge, so it ships behind the golden suite
# like every other knowledge change.
#
# Operator params (subscription, thinking_default, metering, …) are per-INSTANCE
# config gathered by `rmd init`, NEVER plan constants — they do not live here.
#
# ── The Tier Invariant (G-17, Craig directive) ────────────────────────────────
# The main agent (the Architect) ALWAYS rides a higher-thinking mount than the
# coding agents. Enforced deterministically at load (src/lib/mounts.ts) as TWO
# ANDed conditions, exactly per §9:
#     architect.tier  >  max(worker.tier)         # STRICT model-tier dominance
#     architect.effort ≥ thinking_default          # floor: high (plan authorship)
# A mounts.yaml that violates it is REJECTED at load. The flywheel may lower
# workers freely but can NEVER lower the Architect to or below the worker ceiling.
#
# The invariant is RELATIVE, not absolute: because the Architect rides `opus`
# (the top tier), every WORKER mount below is CAPPED at `sonnet` — a worker may
# never reach the Architect's tier. So "diagnose steps up" and "high-risk review"
# step up to the worker CEILING (sonnet, high effort), not to opus. An economy
# install could instead run haiku workers under a sonnet Architect and still
# comply — the ordering is what matters, not the absolute lineup.

# ── Model-tier ordering — CONFIG-MAINTAINED (the lineup shifts, §9) ────────────
# Higher rank = higher-thinking mount. The Tier Invariant compares models by this
# rank, so adding/renaming a model is a config edit HERE, not a code change.
tiers:
  haiku: 1
  sonnet: 2
  opus: 3

# Effort ordering — same idea for the thinking-effort axis.
efforts:
  low: 1
  medium: 2
  high: 3

# ── The Architect mount (the bookend: plan authorship, orchestration) ──────────
# opus/high — the sole top-tier mount; strictly above every worker below.
architect:
  model: opus
  effort: high
  max_turns: 400
  context_budget: 180000

# ── max_turns is a RUNAWAY CLIFF, not a work limit (§9 tripwire re-base) ────────
# Every mount's max_turns is a FLAT 400 — a tripwire set WAY above any real run,
# whose only job is to kill a genuinely runaway loop. It is NOT a sizing knob:
# task SIZING is enforced PRE-DISPATCH by the W1-T20c task linter (an over-scoped
# task is decomposed before it ever spawns, never trimmed by a low turn cap). The
# same bug as maxTurns=60 (PR #8, budget_usd re-base): a cap set NEAR expected work
# is a work limit masquerading as a safety limit. Concretely, run
# W1-T54b-1784149952116 (implement×medium) walled at 81/80 turns mid-LIVE-campaign
# — AFTER its minor proof had already merged #80 through the required gate — because
# live campaigns burn turns on POLLING the gate, work a cap must never kill.
# P7-consistent: nothing here is raised to mask over-scoping; the sizer is the linter.

# ── Worker routing table: task_type → risk band → mount ────────────────────────
# Sonnet default for execution; Haiku for mechanical/high-volume; sonnet-high is
# the worker ceiling (bookend work steps up to it, never to opus).
routes:
  recon:
    low:    { model: haiku,  effort: medium, max_turns: 400, context_budget: 60000 }
    medium: { model: sonnet, effort: medium, max_turns: 400, context_budget: 90000 }
    high:   { model: sonnet, effort: high,   max_turns: 400, context_budget: 120000 }
  implement:
    low:    { model: sonnet, effort: medium, max_turns: 400,  context_budget: 120000 }
    medium: { model: sonnet, effort: high,   max_turns: 400,  context_budget: 160000 }
    high:   { model: sonnet, effort: high,   max_turns: 400, context_budget: 200000 }
  diagnose:
    low:    { model: sonnet, effort: high,   max_turns: 400, context_budget: 120000 }
    medium: { model: sonnet, effort: high,   max_turns: 400, context_budget: 150000 }
    high:   { model: sonnet, effort: high,   max_turns: 400, context_budget: 180000 }
  review:
    low:    { model: haiku,  effort: medium, max_turns: 400, context_budget: 60000 }
    medium: { model: sonnet, effort: medium, max_turns: 400, context_budget: 90000 }
    high:   { model: sonnet, effort: high,   max_turns: 400, context_budget: 120000 }
  manual:
    low:    { model: haiku,  effort: low,    max_turns: 400, context_budget: 40000 }
    medium: { model: haiku,  effort: medium, max_turns: 400, context_budget: 60000 }
    high:   { model: sonnet, effort: medium, max_turns: 400, context_budget: 90000 }
