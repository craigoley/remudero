- id: W1-T199
  title: "STRIKE REGIME AMNESTY — strikes spent under KEYWORD-ONLY verdicts must not gate the rung under the EXECUTED-verdict regime: tag each strike with the verdict regime at spend time, or grant a one-time amnesty keyed to the T185 deploy"
  repo: remudero
  depends_on: [W1-T76, W1-T185]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "A STRIKE COUNTER THAT CANNOT TELL NOISE FROM EVIDENCE BLOCKS THE LOOP EXACTLY WHERE IT NOW WORKS.
    `priorStrikesFor` (run-task.ts) counts EVERY `fix.dispatch` line for a task with no boundary of any kind —
    no window, no marker, no regime tag — so it is monotonic over the whole ledger. A strike spent in the
    keyword-only era is indistinguishable from one spent against executed proof.
    FIXTURE, 2026-07-21. Three PRs, one rung, one night:
      #457 (W1-T192) CONVERGED — proof_exec went executed_fail -> a fix worker -> executed_pass x3 -> merged.
        That is the floor->fix loop's first end-to-end success on real evidence.
      #449 (W1-T182) and #452 (W1-T190) were REFUSED by the same rung — 'fix strikes exhausted (2/2) —
        escalating — no spawn' — even though their verdicts are now the SAME KIND of evidence that #457
        converged on: executed_fail with named criteria (#449: [_, executed_fail, executed_fail, _, _, _];
        #452: [_, executed_fail, _, executed_fail]).
    Both of those strikes were spent BEFORE the executed-verdict regime existed, against lexical blocks, during
    the session where 75 of 76 proofs read not_executable. The rung proved on #457 that it converges when given
    executed evidence — and is refused on the two PRs where that evidence now exists.
    THERE IS NO EXISTING ESCAPE, verified from source rather than assumed:
      - `strikeCapForAnswer` (sweep.ts:679) returns `policy.resetStrikeCounterOnAnswer ? originalCap : 1`. With
        the default policy TRUE this restores the cap to its ORIGINAL value (2) for a post-answer round — it does
        NOT reset the counter. With priorStrikes already at 2, 2 >= 2 still exhausts.
      - It is also wired to the SWEEP path only. An operator answer was recorded for both tasks (ledgered
        `panel.question_answered` at 08:58:22, carried into `plan/questions.ndjson`) and a subsequent `rmd sweep`
        still classified both PRs blocked-ambiguous with 0 actions taken.
      - `fixStrikeCap` (config.ts:142) is GLOBAL — there is no per-task override, so raising it changes policy
        for every task in the fleet to unblock two PRs.
      - The ledger is APPEND-ONLY. A monotonic count over appended lines cannot be decremented by appending, so
        there is no honest state-side reset: the only mechanism would be rewriting history, which breaks the
        invariant the whole provenance chain rests on.
    SO THE AMNESTY IS THE MECHANISM, not a convenience. Without it these two PRs cannot be re-dispatched by any
    sanctioned path, and every future regime change inherits the same trap."
  design: |
    PREFER TAGGING OVER A ONE-TIME AMNESTY, because tagging survives the next regime change and an amnesty does
    not. At spend time, record on the `fix.dispatch` line what KIND of verdict the strike was spent against —
    at minimum whether any proof executed, and ideally the proof_exec summary itself. `priorStrikesFor` then
    counts strikes from the CURRENT regime rather than all strikes ever.
    A ONE-TIME AMNESTY IS THE FALLBACK and must be keyed to something observable, not to a date typed by hand:
    the T185 deploy is identifiable from the ledger (the first verdict carrying a capped/executed classification),
    so strikes before that boundary can be excluded once. Ship it only if tagging cannot be made to work for
    strikes already written — those lines exist and carry no tag, so the fallback may be needed FOR THEM even if
    tagging handles everything after.
    DO NOT SIMPLY RAISE THE CAP. `fixStrikeCap` is global; raising it to unblock two PRs weakens the bound for
    every task and does not distinguish the case at all — it just buys one more strike of the same confusion.
    DO NOT MUTATE THE LEDGER. The counter must change how it READS, never what is written historically.
    KEEP THE BOUND REAL. Amnesty must not become unlimited retries: a task whose strikes were ALL spent under the
    current regime still exhausts at the cap. The point is that noise-era strikes do not count, not that strikes
    stop counting.
  acceptance:
    - claim: "strikes spent under keyword-only verdicts do NOT count toward the cap under the executed-verdict regime"
      proof: "unit test over the strike counter: a task with two prior dispatches whose verdicts recorded no executed proof, plus a current verdict carrying executed evidence, is NOT exhausted and the rung spawns. FALSIFIER: on 2026-07-21 PRs #449 and #452 were refused with 'fix strikes exhausted (2/2)' while carrying executed_fail verdicts, by the same rung that had just converged #457 from executed_fail to executed_pass x3"
    - claim: "a rung refusing to spawn SOLELY on pre-regime strikes fails the check"
      proof: "unit test asserting the refusal path is not reachable when every counted strike predates the executed-verdict boundary and the current verdict carries executed proof. FALSIFIER: priorStrikesFor today counts every fix.dispatch line for a task with no window, marker or regime tag, so it cannot express the distinction at all"
    - claim: "the bound stays REAL — strikes spent under the CURRENT regime still exhaust at the cap"
      proof: "unit test: a task whose strikes were all spent against executed verdicts exhausts at fixStrikeCap exactly as today. FALSIFIER: an amnesty broad enough to ignore regime would become unlimited retries, which reopens the loop-forever hole the cap exists to close"
    - claim: "the ledger is not mutated — the change is in how strikes are READ"
      proof: "structural test: no code path rewrites or deletes existing fix.dispatch lines; the regime distinction is derived at read time or from newly-written tags. FALSIFIER: decrementing a monotonic count over an append-only ledger is impossible by appending, so a 'reset' implemented by editing history would break the provenance invariant every other rung depends on"
