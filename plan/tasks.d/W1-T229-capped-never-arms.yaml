- id: W1-T229
  title: "a capped verdict with ZERO proofs executed still arms auto-merge for any non-tdd:strict task - prose is the default merge floor"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 60.00
  rationale: "RECON R-2, and recon T1-AC3. A CAPPED verdict means zero proofs were executed and the pass rests
    entirely on keyword coverage - a claim, never evidence. Today that still arms auto-merge unless the task is
    marked tdd:strict, and tdd:strict is not the default. So the DEFAULT merge floor for this system is prose.
    THE CEILING IS STRONG AND THE FLOOR IS NOT. Executed proofs, the awareness surface, the ratchets and the
    review judge are all real, and on a tdd:strict task they bind. The recon's summary of the gap is exact: the
    ceiling is strong, the floor is prose, and most work rides the floor.
    THIS SESSION SUPPLIED THE FIXTURES WITHOUT MEANING TO. Every remudero-review verdict posted by hand on
    2026-07-21 came back CAPPED at 0 proofs executed, because worktree materialization was unavailable, and
    those PRs armed and merged on that basis. The mechanism is not hypothetical and it is not rare - it was the
    normal case for a full day of merges."
  design: |
    decideAutoMergeArm RETURNS arm:false FOR A CAPPED VERDICT REGARDLESS OF TDD TIER. One conditional, at the
    decision function rather than at its callers, so every arm point inherits it - Phase-1 enumeration found
    seven distinct armAutoMerge call sites, and a rule applied per-caller would be applied per-caller wrong.
    VERIFY THE PLAN-ONLY CARVE-OUT SURVIVES. W1-T205 carries the operator's standing rider: a plan-only PR is
    STRUCTURALLY capped, because the task it files has no code and therefore no executable proof. If this
    change makes capped-never-arms unconditional without that exemption, every retro, approve and filing PR
    stalls forever. Read W1-T205 before implementing, and treat its falsifier as binding here.
    EXPECT THIS TO BITE IMMEDIATELY, AND SIZE FOR IT. Once capped stops arming, work whose proofs cannot execute
    stops merging - which is the point, and which is also a throughput cliff if proof execution is unreliable.
    W1-T227 (narrow the proof runs so they stop timing out) is the task that makes this survivable. Sequence
    accordingly rather than landing this into a harness that coins exec_error under load.
  acceptance:
    - claim: "decideAutoMergeArm with a capped verdict and tddStrict false returns arm false"
      proof: "unit test: case added to test/review.test.ts"
    - claim: "a plan-only PR still arms under the raised floor, so the plan lane does not stall"
      proof: "unit test: case added to test/review.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§5C", "P22"]
  files: [src/run-task.ts]
  status: queued
  attempts: 0
  note: "FILED 2026-07-21. Recon R-2 / T1-AC3.
    THE PLAN-ONLY CARVE-OUT IS NOT OPTIONAL and is carried as the second criterion rather than left to the
    implementer to remember - W1-T205 records the operator's rider verbatim, and a floor raised without it
    halts every machine-emitted plan PR.
    SEQUENCING: land W1-T227 first. Raising the floor while the proof harness still times out under load turns
    an evidence gate into a throughput stop."
