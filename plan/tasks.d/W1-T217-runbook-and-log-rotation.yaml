- id: W1-T217
  title: "no operator runbook exists for the procedures a crisis actually needs - supervisor restart, token rotation, first-run setup, the billing boundary"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 60.00
  rationale: "RECON R-25 and the runbook half of R-30, recon T10. Split from W1-T213 at intake after the plan
    linter flagged the combined task as spanning three concerns.
    THE RUNBOOK GAP IS THE OPERABLE-IN-A-CRISIS ONE. The procedures an operator needs at 3am are the ones
    nowhere written down: restarting the supervised daemon, rotating the service tokens, first-run setup on a
    new machine, and where the ANTHROPIC environment boundary sits (which matters because subscription
    billing strips those variables, so dollar figures in this system are tripwires rather than charges). Some
    of this exists as tribal knowledge in session notes. None of it is checked, so it rots.
    LOG ROTATION, SIZED TO MEASURED REALITY RATHER THAN TO THE REPORT. No rotation mechanism exists anywhere -
    verified at intake across newsyslog.d, src, scripts and bin. But the logs are SMALL today: daemon.err
    42 KB, daemon.out 117 KB, serve.log under 1 KB, drain 1.2 KB, sweep-loop 9.5 KB. This is hygiene, not an
    emergency. The genuinely unbounded file in that directory is ledger.ndjson at 9.4 MB, which belongs to
    W1-T209 and must not be conflated with these.
    ALSO OBSERVED AT INTAKE, not in the report: ad-hoc logs are accumulating in the same directory (t108.log,
    t115.log, t181.log, watch-274.log). The policy should say what happens to them even if the answer is that
    they are operator scratch and out of scope."
  design: |
    DERIVE RUNBOOK COVERAGE FROM A NAMED LIST, AND CHECK IT. The check is that an entry EXISTS and is
    non-trivial for each required procedure - a documentation-coverage assertion, headlessly verifiable, no
    supervisor involvement (Rule 18). Actually performing a restart is an operator action and is explicitly
    NOT what this task tests.
    WRITE THE ENTRIES FROM WHAT IS ALREADY KNOWN. The supervisor restart, the reap-wait needed before
    rebinding the console port, and the token rotation path have all been performed by hand and are recorded
    in operator notes and in the operator guide. This task is mostly transcription plus a gate that keeps it
    honest, not discovery.
  acceptance:
    - claim: "a runbook entry is present and non-trivial for each required procedure - supervisor restart, token rotation, first-run setup, and the billing environment boundary"
      proof: "unit test: test/runbook-coverage.test.ts"
    - claim: "a required procedure with no runbook entry FAILS, so a later-added procedure cannot silently go undocumented"
      proof: "unit test: test/runbook-coverage.test.ts"
  risk: medium
  origin: architect
  plan_refs: ["§10"]
  files: [docs/operator-guide.md]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, finding R-25 plus the runbook half of R-30. SPLIT FROM W1-T213 at intake: the
    linter flagged that combination as spanning claims, daemon and launchd, and flagged a criterion naming
    launchctl as unfit for headless verification. Both were fair, so the task was decomposed and the
    criteria rewritten to assert DOCUMENTATION COVERAGE rather than live supervisor behaviour.
    SPLIT AGAIN at intake: the linter then flagged runbook-plus-rotation as spanning daemon and
    operator-guide, so log rotation became W1-T218. Two small tasks rather than one dishonestly-graded one -
    raising a documentation-hygiene task to risk:high to satisfy a sizing rule would have been a workaround,
    not an honest reading."
