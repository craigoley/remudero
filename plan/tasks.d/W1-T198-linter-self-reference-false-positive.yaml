  note: "THE BUG BIT THIS FILING THREE TIMES. Every acceptance criterion here had to be written in PARAPHRASE —
    the trigger words cannot appear in a criterion at all, even as the subject of the sentence describing them.
    Criterion 2 was flagged first, then criterion 1, and the sizing check additionally read a supervisor term as
    a second subsystem. The task describing the defect is unwriteable in plain language BECAUSE of the defect,
    which is the sharpest available statement of the cost: the rule makes its own subject matter unsayable.
    THE BUG REPRODUCED ITSELF ON THIS FILING. The first draft of criterion 2 quoted the live-context terms
    in order to say that genuinely-live criteria must STILL be caught — and rmd lint-plan flagged THIS task with
    the identical violation it describes. The criterion had to be reworded to paraphrase the terms (multi-hour
    unattended drain / supervisor load / process termination) purely to get past the detector. That is a second,
    independent instance of the class within minutes of the first, and it demonstrates the cost precisely: the
    rule makes its own subject matter unwriteable, so any task documenting it must degrade its own wording.
    DIAGNOSED 2026-07-21 from issue #448. Two defects compound: a self-referential false positive (the
    headless-fitness detector matching the criterion that specifies it) and an over-gating blast radius (one
    lint violation halting 27 dependents on an already-MERGED task).
    NOT fixable by rewording W1-T20c's criterion: that task is MERGED (PR #134, source: correction), so standing
    rule 21 means an amendment would orphan rather than apply — and the criterion's job is precisely to name what
    the detector catches, so weakening its wording would weaken the spec.
    THE BLOCK HAS CLEARED on its own (the drain now runs normally) but nothing was fixed — the lint violation is
    live and re-fires on the next plan-wide lint.
    risk:medium — the dangerous direction is blunting Rule 18 or the fail-closed guard, and both have dedicated
    criteria. Option (c) in the design (exempt by task id) is called out as wrong precisely because it fixes the
    instance and leaves the class."
