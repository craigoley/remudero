  rationale: "FIXTURE (real): 2026-07-20 18:03, run DAEMON-1784570007163 — the drain's W1-T46 block-reasoning
    (reasonAboutBlock, block-reason.ts) classified W1-T119/#382 a GENUINE BLOCKER and HALTED+escalated (#383, 'W1-T46
    block-reasoning: W1-T119 did not merge (blocked_ci) … the daemon halted rather than continue into the gap'). But
    the block was EMINENTLY FIXABLE — a stale generated api-client (a regeneration + one bounded fix worker cleared
    every red check and the PR merged). The SWEEP (W1-T77) already routes a blocked-fixable PR to the W1-T76 fix rung;
    the DRAIN's block-reasoning halts on the SAME class. That asymmetry is the gap: progress was AVAILABLE and the
    drain did not attempt it. SIBLING of W1-T168 — W1-T168 is the fix-rung's FUTILE-ATTEMPT (strike-exhaustion on a
    false-block it cannot win); THIS is the drain's NO-ATTEMPT (a fixable block halted before any fix is tried).
    Distinct calibration failures on one axis: no-attempt/drain-side vs futile-attempt/rung-side."
  design: |
    Give reasonAboutBlock's GENUINE-BLOCKER branch the sweep's disposition vocabulary: a genuine blocker that is
    FIXABLE (a red CI check, or a blocked_review with a nameable unmet criterion — the exact signals the W1-T77 sweep
    reads for blocked-fixable) routes to the W1-T76 fix rung (a bounded fix attempt, strike-capped) BEFORE halt, so
    the drain and the sweep dispose the same block the same way. Halt+escalate NARROWS to the truly-stuck: a genuine
    blocker with NO fixable signal (ambiguous, no red check, no nameable criterion) still halts and never continues
    into a real gap. Must NOT regress into W1-T168's class — the fix attempt is strike-capped and a strike-exhausted
    false-block escalates for re-judgment, it does not fix-loop forever. VERIFY reasonAboutBlock/block-reason.ts, the
    sweep's blocked-fixable disposition in sweep.ts (W1-T77), and the W1-T76 fix-rung entry from source (distrust this
    note) — reuse the sweep's fixable-signal predicate rather than re-deriving it, so parity is structural not copied.
