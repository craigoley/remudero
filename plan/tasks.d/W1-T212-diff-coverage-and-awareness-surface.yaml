- id: W1-T212
  title: "coverage is aggregate-only so untested new code merges above the floor, and the review awareness surface omits every CI workflow and ratchet config it is supposed to police"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "RECON R-12 and R-15, both VERIFIED at source during intake. They are filed together because
    they are the same hole seen twice: a change can weaken the measurement it is measured by.
    R-12: scripts/coverage-ratchet.mjs:31-50 sums LF/LH/BRF/BRH across every record with NO filename filter,
    and the evaluator compares two scalars. A grep of that file for diff, per-file or changed returns nothing.
    So new code with zero covering tests merges freely as long as the aggregate stays above the floor - and
    the larger the codebase grows, the less any single untested addition moves that aggregate.
    R-15: USER_VISIBLE_SURFACE_RE (src/lib/review.ts:1633-1642) matches bin/, run-task.ts, spike.ts and nine
    named src/lib files. It does NOT match .github/workflows/ (any of the nine), scripts/*-ratchet.mjs,
    stryker.conf.json, package.json, hooks/, settings/, commitlint.config.mjs, CODEOWNERS, or any other
    src/lib file including sweep.ts and escalate.ts. Zero surface matches returns pass with the reason
    'no CLI/config/gate/verdict surface changed' (review.ts:1666-1668). So a PR lowering a coverage floor or
    deleting a required check from ci-gate.yml clears the docs-awareness rung SILENTLY.
    TOGETHER THEY MEAN: the ratchets can be weakened by a diff that neither the ratchet nor the review floor
    treats as notable."
  design: |
    PER-DIFF COVERAGE, NOT A HIGHER AGGREGATE. Raising the aggregate floor does not fix this and makes the
    build brittle. What is needed is a measure over the lines the PR ADDS. VERIFY from the existing lcov
    plumbing what per-file data is already available before adding tooling - the reporter already emits
    per-file records, which is why the aggregate has to sum them.
    WIDEN THE AWARENESS SURFACE TO THE THINGS THAT DEFINE THE GATE. At minimum .github/workflows/, the
    ratchet scripts and their baselines, and stryker.conf.json. The principle is that anything which can
    CHANGE THE MEASUREMENT is user-visible surface by definition, even when no user sees it.
    COORDINATE WITH W1-T204. That task protects gate configs at the branch-protection layer, this one makes a
    gate-weakening diff visible to the review floor. They are complementary - one makes the edit require the
    operator, the other makes it impossible to slip past review unremarked. Neither replaces the other.
    R-10 IS RELATED AND DELIBERATELY NOT FOLDED IN. See the note.
  acceptance:
    - claim: "new source lines added with zero covering tests FAIL, even when aggregate coverage stays above the floor"
      proof: "unit test: test/diff-coverage.test.ts"
    - claim: "a diff that lowers a coverage or mutation baseline is treated as user-visible surface by the review floor rather than passing unremarked"
      proof: "unit test: test/awareness-surface-ratchet.test.ts"
    - claim: "a diff editing a CI workflow, including removing a name from ci-gate REQUIRED, is treated as user-visible surface"
      proof: "unit test: test/awareness-surface-ratchet.test.ts"
    - claim: "the widened surface does not fire on ordinary src changes that touch none of those paths, so the rung stays useful rather than becoming noise everyone learns to ignore"
      proof: "unit test: test/awareness-surface-ratchet.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§5C"]
  files: [src/lib/review.ts]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, findings R-12 and R-15, recon T9. Both claimed line refs verified exact.
    R-10 (the mutation ratchet covering only src/lib/classify.ts, stryker.conf.json:8) is REAL and verified,
    but its denominator in the report is wrong: src holds 64 .ts files (62 under src/lib), not 74. It is NOT
    folded in here because the recon itself records it as ALREADY tracked by W1-T133's nightly full-scope
    run, and because widening PR-time mutation scope is a runtime-cost decision of a different kind from
    coverage and surface detection. Rule 19 sizing, not an oversight."
