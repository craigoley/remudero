  note: "INTAKE FIXTURE #1 (docs/audits/recon-2026-07-21.md), findings R-8 and R-16. Evidence spot-verified at
    file:line during intake rather than taken from the report - the report's PIPE_BUF framing was WRONG and
    its circuit-breaker call site (run-task.ts:3611) was wrong, the real ones being :3651 and :3885. Recorded
    because the corrected reading changes the design: no lock is needed for the race the report described.
    FIRST MEMBER of the WRITE-SIDE ATOMICITY doctrine family (MASTER-PLAN §12). Siblings: W1-T207
    (status.json) and W1-T208 (run.lock). Split per Rule 19 - three different writers, three different
    failure modes, one doctrine."
