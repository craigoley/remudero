- id: W1-T206
  title: "the ledger is the provenance spine AND the backing store for the dispatch breaker, yet an append has no atomicity guarantee and a torn line is silently parsed to {}"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "RECON R-8 + R-16, both VERIFIED at source during intake. appendLedger (src/lib/ledger.ts:23-27)
    is the entire module: mkdirSync, then appendFileSync with no lock, no temp file, no fsync. The reader
    (src/lib/status.ts:378-384) wraps JSON.parse in `catch { return {} }`, so a torn record does not throw
    and is not logged - it becomes an empty object with no task_id and no step, invisible to every consumer
    downstream.
    WHY THAT MATTERS MORE THAN AN AUDIT LOG NORMALLY WOULD: this file is not only the audit log. It is the
    backing store for the dispatch circuit breaker (isDispatchBreakerTripped via readLedgerLines, wired at
    src/run-task.ts:3651 and :3885) and for sweep dedup (src/lib/sweep.ts:866, :1201). A line that silently
    becomes {} is a decision input that silently disappears.
    CORRECTION TO THE RECON, made during intake and load-bearing for the design: appendFileSync opens with
    O_APPEND, so the kernel serializes the offset update and concurrent appenders do NOT overwrite each
    other. The recon's suggested PIPE_BUF guarantee does not apply - that is a pipe property, and this is a
    regular file. So the real exposure is narrower than 'concurrent appends corrupt the ledger': it is a
    partial write from a crash or signal mid-record, and Node's internal write loop for a record large
    enough to be split. Design for THAT, and do not add a lock whose only justification was a race that
    O_APPEND already prevents.
    R-16 IS THE SAME WOUND FROM THE OTHER SIDE: readLedgerLines returns [] when the file is absent
    (status.ts:371-372), the breaker counts run.start lines with no floor and no persisted counter, so an
    absent or rotated ledger silently resets every breaker to zero. A torn run.start line does the same
    thing one increment at a time."
  design: |
    MAKE A TORN LINE LOUD, NOT SILENT. The cheapest real win is not a lock - it is refusing to treat an
    unparseable line as an empty object. A malformed record must be counted and surfaced (its own ledger
    step, a console warning, or a field on the read result), so that corruption is observable rather than
    silently subtracted from a decision count.
    THEN DECIDE WHETHER ABSENCE MAY ZERO A BREAKER. A breaker that reads zero because the file is gone is
    the cannot-observe-implies-permitted shape this codebase has repeatedly converted into
    cannot-observe-implies-wait. Apply the same doctrine on the write path: an ABSENT ledger where one is
    expected is indeterminate, not proof of zero dispatches. VERIFY from source how deriveStatus consumes
    the count before changing the predicate - the fix belongs wherever it does not break a genuine
    first-run empty ledger.
    ATOMICITY LAST, AND ONLY WHAT THE EVIDENCE SUPPORTS. If a write-atomicity mechanism is added, it must be
    justified against the O_APPEND finding above rather than against the recon's framing. A single
    write() of a record under the filesystem block size, or a write-temp-and-append pattern, may be
    sufficient. Do not import a lock library for a race that does not exist.
  acceptance:
    - claim: "a torn or unparseable ledger line is COUNTED and surfaced rather than silently becoming an empty object that no consumer can see"
      proof: "unit test: test/ledger-atomic.test.ts"
    - claim: "N concurrent appenders produce N well-formed lines with none lost, asserted on line count AND on JSON-validity of every line"
      proof: "unit test: test/ledger-atomic.test.ts"
    - claim: "a record large enough to exceed a single write is still readable as one line, or its failure is observable"
      proof: "unit test: test/ledger-atomic.test.ts"
    - claim: "an ABSENT ledger does not silently report a dispatch-breaker count of zero for a task that has dispatch history elsewhere - absence reads as indeterminate rather than as proof of no dispatches"
      proof: "unit test: test/breaker-survives-rotation.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§12", "P29"]
