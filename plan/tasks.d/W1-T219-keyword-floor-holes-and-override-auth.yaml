    proposed amending the W1-T185 family, but W1-T185 is DONE - verified by a merged PR carrying its
    Remudero-Task trailer - so standing rule 21 applies and the amender owes a follow-up instead. The same
    check cleared W1-T197 and W1-T175 for genuine amendment, and blocked W1-T30 and W1-T48, whose docs
    follow-up is W1-T213.
    R-14 is the sharper of the two despite its lower recon severity: it is a total bypass of the capped-verdict
    floor requiring one appended ledger line, on an append-only file with no write authentication. It composes
    with R-8 - anything that can append can forge an override."
