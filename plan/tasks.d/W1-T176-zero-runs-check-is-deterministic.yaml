  note: "SIBLING of W1-T174 (drain no-attempt) and W1-T168 (rung futile-attempt) on the same calibration axis —
    this is the NEEDLESS-ASK end: the rung asks the operator for a decision the observed facts already settle.
    Fixture #393/#391, 2026-07-20. risk:high — it changes when the fleet escalates versus acts autonomously, and
    the failure direction is asymmetric: a false DETERMINISTIC-ACTION posts a gate check without an operator
    looking, so the fail-closed boundaries (one attempt per sha, unreadable-protection escalates) are load-bearing
    criteria, not defensive extras."
