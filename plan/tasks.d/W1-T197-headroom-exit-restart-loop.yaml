- id: W1-T197
  title: "DELIBERATE IDLE MUST BE AN IN-PROCESS STATE — headroom_exhausted currently exits NONZERO and KeepAlive relaunches it every ~86s; exiting ZERO is NOT the fix (SuccessfulExit:false never restarts a clean exit), so the daemon must SLEEP until resets_at with an idle heartbeat"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "LIVE AT FILING, 2026-07-21. The daemon is relaunching roughly every 86 seconds and has been since
    02:22:44. Evidence, all observed rather than inferred:
      launchctl list  ->  `29565  1  com.remudero.daemon`  — last exit status ONE
      plist           ->  KeepAlive = { SuccessfulExit: false }  — i.e. RESTART when the job exits UNsuccessfully
      ledger boots    ->  02:22:44 pid 5839, 02:24:06 pid 11581, 02:25:32 pid 17940, 02:26:59 pid 23833,
                          02:28:20 pid 29569  — five relaunches in under six minutes, median gap 86s
      every boot      ->  daemon.headroom {window: 'weekly (all models)', percent_used: 95} then
                          daemon.summary {stopReason: 'headroom_exhausted', ticks: 0, costUsd: 0} then exit
    THE CYCLE: the weekly subscription window is genuinely at 95%, so daemon.ts:284 returns
    summary('headroom_exhausted', ...) — the CORRECT decision. That stop maps to a NONZERO process exit. launchd's
    KeepAlive is configured to restart exactly on nonzero exits, so it relaunches. The new process re-reads
    headroom, finds the same 95%, stops again, exits nonzero again. Nothing changes between iterations because
    the condition is a WEEKLY window that will not move until it resets.
    THE BUG IS THE EXIT CODE, NOT THE STOP. Stopping on exhausted headroom is right and is exactly what P34's
    ratified envelope clause (c) asks for. What is wrong is expressing a POLICY stop as a CRASH: an exit status
    of 1 tells the supervisor 'I failed, restart me', when the truth is 'I am deliberately idle until Sunday'.
    ALREADY DOCUMENTED AS A CLASS, now with a second trigger: the operator's own notes record 'KeepAlive restarts
    on ANY exit -> a --max daemon restart-loops' from the W1-T12d commissioning. That was the bounded-run trigger;
    this is the headroom trigger. The shared defect is that the daemon has no way to say 'stopped on purpose'.
    HARM IS BOUNDED BUT NOT ZERO: costUsd is 0 and ticks are 0 on every iteration — no worker is spawned, because
    the headroom check precedes dispatch. What it burns is process spawns, log volume and ledger volume (six
    daemon.* lines per iteration, ~40 lines an hour indefinitely), and it makes `launchctl list` permanently
    report a failing job, which is the signal an operator would use to spot a REAL crash.
    SECOND, SMALLER DEFECT observed in the same lines: resets_at renders inconsistently across consecutive boots
    — 'Jul 21 at 12am' at 02:25:31 and 'Jul 20 at 11:59pm' at 02:26:59 and 02:28:20, for what must be the same
    reset instant. Same window, same clock, two renderings a minute apart."
  design: |
    DO NOT SOLVE THIS WITH AN EXIT CODE — that was this task's first design and it was WRONG. Under
    `KeepAlive = { SuccessfulExit: false }` launchd restarts a job ONLY when it exits UNsuccessfully, so an exit
    of ZERO is NEVER relaunched. Mapping headroom_exhausted to exit 0 would replace an 86-second relaunch storm
    with a daemon that is permanently DEAD until someone reloads the LaunchAgent by hand — silence instead of
    flapping, which is strictly worse because nothing surfaces it. EXIT CODES STAY RESERVED FOR REAL FAILURE.
    THE CEILING IS TIME-AWARE — the idle only fires when the ceiling ACTUALLY BINDS under this policy
    (operator ruling, 2026-07-21). The subscription window resets midnight Monday->Tuesday local, and headroom
    remaining at that instant EXPIRES. So the correct threshold is a FUNCTION OF TIME-TO-RESET, not a constant:
      - on the window's FINAL day (Monday local), the throttle RELAXES — consuming to 100% is correct, because
        anything unspent is destroyed at reset. Extra-usage credits exist as a cushion: do NOT target them, and
        do NOT refuse work merely because a request might graze them.
      - on every other day, the ceiling HOLDS at the operator reserve, and breaching it triggers the in-process
        idle above.
    ENCODE AS POLICY DATA, not code constants (rule 2: policy-as-data). The threshold is a lookup or a curve over
    time-to-reset, tunable without a source change — the same treatment W1-T183's anomaly thresholds get. A
    hard-coded 95 is exactly what produced the fixture below.
    FIXTURE FOR THE TIME-BLINDNESS, measured: on Monday 2026-07-20 the fleet parked from 22:22 to 00:00 EDT — 56
    consecutive headroom_exhausted stops across roughly 98 minutes — protecting headroom at 95% that EXPIRED at
    midnight, while W1-T187 (the console latency outage, ~49s first paint) sat at the drain head. That capacity
    was not saved; it was destroyed unused, and the operator-facing outage stayed unfixed for the duration. A
    time-blind ceiling does not conserve on the last day of a window; it wastes.
    THE RESERVE'S PURPOSE SURVIVES: the operator's own usage must never be crowded out. On the final day that
    purpose is served by the reset itself, which is why relaxing then is not a weakening of the reserve but a
    correct reading of what the reserve is for.
    DELIBERATE IDLE IS AN IN-PROCESS STATE. On headroom exhaustion the daemon must NOT exit at all: it sleeps
    until `resets_at` (a value it already reads and already logs) and then resumes its normal loop. One
    supervised process stays alive, the lock stays coherent, and recovery needs no supervisor involvement and no
    operator action.
    THE IDLE STATE MUST BE VISIBLE, or it is indistinguishable from a hang. Emit an idle heartbeat on a cadence
    the liveness surfaces can read — the console's own trust layer (W1-T156) and the glance strip's
    daemon-health widget (W1-T159) both need to say 'idle until <t>' rather than 'last poll: 4 hours ago'. A
    silent sleep re-creates the observability defect this task exists to fix, one layer down.
    VERIFY from source how DaemonStopReason reaches the process exit today (daemon.ts's summary path and its
    caller in run-task.ts) before changing anything — the mapping may be implicit, which is likely how this
    arose. The goal is that headroom_exhausted stops reaching that path at all, not that it maps to a different
    code.
    VERIFICATION STAYS HEADLESS (Rule 18): the deliverable is the pure stop-reason-to-exit-code mapping, which a
    worker can unit-test with no process spawn and no supervisor. The launchd relaunch behaviour is a property of
    the supervisor, already observed and recorded in the rationale — do NOT write a test that shells out to
    launchctl or installs a LaunchAgent.
    DO NOT FIX THIS BY LOOSENING KeepAlive. Removing SuccessfulExit:false would stop the loop and also stop
    restarting after real crashes — the property W1-T12d commissioned it for, and which was verified by a kill -9
    drill. The supervisor is behaving correctly; the daemon is lying to it.
    ALSO FIX resets_at RENDERING so the same reset instant renders identically on every boot. It is cosmetic
    until an operator compares two log lines and concludes the window moved.
    NOTE FOR W1-T187's SIBLING WORK: this loop writes six daemon.* ledger lines every 86 seconds into the same
    append-only ledger whose size already drives the projection cost. It is a slow contributor to that problem.
  acceptance:
    - claim: "headroom exhaustion IDLES IN PROCESS until resets_at — the daemon does not exit at all, by any code"
      proof: "unit test with an injected clock and an injected headroom reader: with the window exhausted and resets_at in the future, the daemon loop enters an idle state and RESUMES after the clock passes resets_at, without the process terminating — asserted on the loop with no process spawn and no supervisor (Rule 18, headless). FALSIFIER, and it is why the exit-code fix is wrong: under KeepAlive SuccessfulExit:false launchd restarts ONLY on a nonzero exit, so exiting 0 would leave the daemon permanently dead until a manual reload — silence instead of the observed 86-second flapping, which is worse because nothing surfaces it"
    - claim: "the ceiling is TIME-AWARE — on the window's final day the throttle relaxes toward 100%, every other day it holds, and the threshold is policy DATA rather than a code constant"
      proof: "unit test with an injected clock: with the same percent_used, a time-to-reset inside the final day permits dispatch while a time-to-reset earlier in the window triggers the in-process idle; and the threshold is read from an overridable policy source, asserted by a test that changes the curve without touching source. FALSIFIER, measured: on Monday 2026-07-20 the fleet parked 22:22-00:00 EDT — 56 consecutive headroom_exhausted stops over ~98 minutes — protecting 95%-exhausted headroom that EXPIRED at the midnight reset, while W1-T187 (a live ~49s-first-paint operator outage) sat at the drain head. A hard-coded ceiling wasted capacity it could not carry forward"
    - claim: "an UNREADABLE headroom read does NOT silently continue — cannot-read-the-budget is never rendered as proceed-as-if-unlimited"
      proof: "unit test: with the headroom reader returning no snapshot, the daemon surfaces the unreadable state as a distinguishable condition rather than proceeding as though headroom were available, and the behaviour on unreadable is an explicit, tested policy rather than an implicit fall-through. FALSIFIER, observed in the live ledger: daemon.ts:286 logs 'usage unreadable — continuing (best-effort)' and CONTINUES, and that line has fired 197 times since 2026-07-18T23:01:30Z. On a subscription the budget IS the constraint, so an unreadable budget that proceeds is the fail-open polarity at the spending layer — the same cannot-observe-rendered-as-permissive family as the gateway returning [] (W1-T181) and the projection regressing to queued (W1-T179)"
    - claim: "a genuine crash STILL exits nonzero and still restarts"
      proof: "unit test: an unexpected throw in the daemon loop yields a nonzero exit code, preserving the KeepAlive restart the kill -9 drill in W1-T12d verified. FALSIFIER: mapping every stop to zero would silence real crashes, and loosening KeepAlive's SuccessfulExit:false would do the same at the supervisor — the supervisor is correct here, the daemon is lying to it"
    - claim: "the daemon does not relaunch-storm while a KNOWN-DURATION condition holds"
      proof: "unit test: with headroom exhausted and a resets_at in the future, the daemon either exits zero once or idles until the reset — it does not produce repeated boot cycles. FALSIFIER: the observed 86-second cycle produced six daemon.* ledger lines per iteration indefinitely, with ticks 0 and costUsd 0 every time, because a WEEKLY window cannot change between relaunches"
    - claim: "resets_at renders identically for the same reset instant across boots"
      proof: "unit test: two headroom reads of the same window render the same resets_at string. FALSIFIER, observed in consecutive boots: 'Jul 21 at 12am' at 02:25:31 versus 'Jul 20 at 11:59pm' at 02:26:59 and 02:28:20 — the same instant, rendered two ways a minute apart"
