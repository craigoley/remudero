  note: "TIME-AWARE RESERVE added 2026-07-21 by operator ruling — the ceiling is a function of time-to-reset,
    relaxing toward 100% on the window's final day (Monday local) because unspent headroom is destroyed at the
    Mon->Tue midnight reset. This is the policy P34 clause (c) inherits: the operator reserve is real every
    other day, and on the last day the reset itself serves the reserve's purpose. The in-process idle fires ONLY
    when the ceiling binds under this policy.
    LIVE at filing — the loop was running while this task was written, last boot 39 seconds before the
    measurement. Diagnosed from launchctl exit status, the plist's KeepAlive dict, and five ledger boot lines with
    their lock_pids, rather than from the daemon log files (which had not been written since 22:28 and did not
    cover the window).
    CLASSIFIED as a crash class per the operator's fork, but the crash is a MISCLASSIFIED LEGITIMATE STOP — the
    daemon's decision was right and only its exit code was wrong. Explicitly NOT the W1-T46 halt / W1-T174
    fixture: no fixable block is involved.
    SECOND TRIGGER of a documented class — the W1-T12d commissioning already recorded that KeepAlive restarts on
    ANY exit, which made a --max daemon restart-loop. Same defect, new cause.
    INCIDENTAL FINDING worth carrying to P34's redraft, recorded here because it answers an open question: the
    headroom mechanism ALREADY EXISTS. daemon.boot logs billing_mode 'subscription', daemon.headroom logs
    {window: 'weekly (all models)', percent_used, resets_at}, and daemon.ts carries headroomLimitPct with a
    HEADROOM_LIMIT_PCT default. P34 clause (c) tells its implementer to VERIFY FROM SOURCE how headroom is read
    and never to invent an API — the answer is that it is already built and already stopping the fleet.
    risk:high — graded UP from medium after rmd lint-plan flagged the daemon/launchd span. Recorded as a
    regrade rather than a workaround, because the honest reading supports it: this changes the process exit code
    a SUPERVISOR acts on, and the failure direction is a fleet that silently stops restarting after a real
    crash — worse than the relaunch storm it replaces. The second criterion (a genuine crash still exits
    nonzero) is the guard, and it is load-bearing rather than defensive."
