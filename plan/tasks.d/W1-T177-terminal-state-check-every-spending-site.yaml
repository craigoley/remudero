- id: W1-T177
  title: "TERMINAL-STATE CHECK AT EVERY SPENDING SITE — before any action that spends money or acts on a PR (a fix-rung strike, a sweep disposition, a dispatch decision, a review post) the PR's terminal state is re-read FRESH, never from cached/snapshot state; terminal means stand down with a ledger line naming the site and the state"
  repo: remudero
  depends_on: [W1-T76, W1-T77, W1-T80]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "FIXTURE (real, ledger-exact): PR #388 (task W1-T154) MERGED at 2026-07-20T20:24:44Z. Every line below
    is from the ledger and happened AFTER that instant, against an already-merged, green PR:
      20:25:04 fix.dispatch strike 2 of cap 2 — a REAL worker, round=fresh, mode=body-coverage
      20:29:05 fix.done strike 2 — cost_usd 1.2405, num_turns 38
      20:30:48 escalation.issue_opened #395 (needs-human) + fix.exhausted strikes=2
      20:30:50 sweep.disposed pr 388 disposition=blocked-fixable acted=TRUE reason='required checks red — ci-log
                fix, strike 1/2' — the SWEEP started a FRESH rung on the merged PR
      20:31:00 dispatch.skipped reason='open-pr' pr 388 — the DRAIN still read it as OPEN, 6+ minutes post-merge
    Cost of the gap: one full fix worker (USD 1.24, 38 turns), both strikes, one needs-human issue an operator had
    to read and close, and a second rung started on top. W1-T154's ledger total for the day is USD 18.59.
    THE GAP IS NOT ONE SITE, IT IS A MISSING INVARIANT AT FOUR. Each site independently decides to act without ever
    asking whether its target still exists:
      (a) THE STRIKE — runFixRung's strikes++ (run-task.ts:1115) fires immediately and unconditionally at the top
          of the round loop, before any state is re-read. None of the rung's three per-round reads request PR
          state: waitForCiGreen fetches ONLY statusCheckRollup (run-task.ts:559-561), as does fetchCiFailures
          (:3959-3964, :2174-2179), and runReview (:1190) judges the head with no merge gate. A merged PR returns
          its last rollup, ciGateFromRollup reports green, and the rung sails into a full reviewer spawn.
      (b) THE DISPOSITION — runSweep dispatches on disposition==='blocked-fixable' (sweep.ts:876-882) with no
          terminal-state predicate, which is how sweep.disposed acted=true fired on a merged PR.
      (c) THE DISPATCH DECISION — the drain's in-flight guard (drain.ts:109-113) reads isOpenPr and skipped #388
          as 'open-pr' six minutes after it merged.
      (d) THE ESCALATION — the exhaustion escalate() (run-task.ts:1226) files a needs-human issue with no check
          that the PR it is escalating still exists as a live block.
    THE GUARD ALREADY EXISTS, ON THE ONE PATH THAT DID NOT NEED IT. routeFix (run-task.ts:4121-4123) opens with
    `if (prState !== \"OPEN\") return { outcome: \"refused\", reason: `state is ${prState} (only an OPEN PR carries a
    live block)` }`, fed by fixCommand which explicitly appends `state` to its --json list (run-task.ts:4196). But
    routeFix is reached ONLY from fixCommand (run-task.ts:4243) — it is the OPERATOR verb's decision core. The
    unattended path enters via runSweep (sweep.ts:876-882) -> buildSweepEffects.dispatchFix (run-task.ts:3852) ->
    runFixRung (run-task.ts:3932), and routeFix appears nowhere in it. So the INTERACTIVE path an operator is
    watching stands down, and the UNATTENDED path that spends money on a stale snapshot does not. routeFix's own
    doc comment (run-task.ts:4110) advertises the refusal as though it were a property of the rung. It is not.
    FRESHNESS IS THE CRUX, NOT AN ASIDE. The sweep's PR list is one `gh pr list --state open` taken at sweep start
    (run-task.ts:3715), so every PR dispatched later in that sweep acts on a possibly-stale OPEN. The 20:31:00
    dispatch.skipped 'open-pr' line is that staleness observed directly. A stand-down that consulted the same
    cached snapshot would not have fired on ANY of these four sites."
  design: |
    ONE shared terminal-state predicate, called at every spending site, reading LIVE — not the sweep snapshot,
    not a cached OpenPrView. Factor routeFix's existing condition (`state !== "OPEN"`, covering MERGED and CLOSED
    alike) out of routeFix so the operator verb and every automated site call the SAME function. Parity must be
    structural, not copied, or the paths drift again exactly as they have.
    Insertion points, load-bearing first:
    (i)   run-task.ts:1115 — top of the round loop, BEFORE strikes++. The only point that stops a strike being
          SPENT on a PR that merged since the previous round.
    (ii)  run-task.ts:1217 — immediately before the exhaustion escalate() at :1226, so a PR that merged mid-rung
          never files a BLOCKED 'fix rung exhausted' issue. That is exactly #395.
    (iii) sweep.ts:876-882 — the blocked-fixable dispatch, so a disposition is never ACTED on a terminal PR.
    (iv)  drain.ts:109-113 — the in-flight guard, so a terminal PR is not reported as 'open-pr'. NOTE this site
          differs in KIND from the others: it does not spend, it SKIPS, and a stale OPEN there wrongly BLOCKS a
          task from dispatching rather than wrongly spending on it. Fix it for correctness of the signal, but do
          not treat a skip as equivalent to a spend.
    (v)   run-task.ts:3866 — the cold/sweep pre-flight. dispatchFix ALREADY runs
          ghJson(["pr","view",pr.prUrl,"--json","headRefName"]) here for the creditability check, so adding
          "state" to that existing field list is a ZERO-EXTRA-ROUND-TRIP guard, sitting beside the existing
          sweep.fix.uncreditable_head refusal at :3871 — the natural precedent for a stand-down.
    BOUND THE COST HONESTLY: a live read per spending site is more gh calls. It is NOT one read per PR per sweep —
    it is one read at the moment of spending, which is the only moment the answer must be current. Reuse the
    existing pr view where one is already being made (site v) rather than adding a call.
    FAIL-CLOSED DIRECTION, and it is the opposite of the obvious one: if the state read FAILS or is
    INDETERMINATE, do NOT stand down — proceed as today. A read error must not become a silent fleet-wide halt on
    every fix and disposition. Standing down is correct only on a POSITIVE terminal reading. This mirrors the
    W1-T119 indeterminate-read discipline and is the single most important boundary in this task.
    LEDGER: one event per site naming BOTH the site and the observed state — `fix.stood_down` (rung-internal,
    naming the strike NOT spent), `sweep.fix.not_open` (cold pre-flight, matching sweep.fix.uncreditable_head's
    shape), `sweep.dispose.not_open`, and the drain's skip reason corrected from 'open-pr' to a terminal-naming
    reason. status.ts:649-653 switches on fix.dispatch/fix.resolved for phase derivation and likely wants a case
    for the new terminal events. Note run-task.test.ts:1436 asserts 'runFixRung is REUSED, never reimplemented'
    and counts call sites, so a new early-return path likely needs that invariant test updated.
    VERIFY every line reference from source before building — distrust this note, it is a 2026-07-20 survey.
  acceptance:
    - claim: "a seeded MERGED PR produces ZERO fix-rung strikes — no strike is spent, no worker spawned"
      proof: "unit test over runFixRung with an injected live state reader returning OPEN for round 1 and MERGED for round 2: the rung stands down, strikes stays at 1, spawn is called zero times, and fix.stood_down names the state. FALSIFIER: the #388 ledger — merged 20:24:44Z, yet fix.dispatch strike 2 fired at 20:25:04 and fix.done at 20:29:05 recorded cost_usd 1.2405 over 38 turns"
    - claim: "a seeded MERGED PR produces ZERO dispositions ACTED — the sweep never starts a rung on a terminal PR"
      proof: "unit test over runSweep: a PR whose live state reads MERGED yields acted=false and dispatchFix is called zero times, ledgering a terminal stand-down. FALSIFIER: the 20:30:50 line — sweep.disposed pr_number 388 disposition=blocked-fixable acted=TRUE, reason 'required checks red — ci-log fix, strike 1/2', starting a fresh rung on a PR merged six minutes earlier"
    - claim: "a seeded MERGED PR produces ZERO dispatch decisions based on a stale OPEN — the in-flight guard reads live"
      proof: "unit test over nextRunnable's in-flight guard: a task whose PR has merged is NOT reported as in-flight from a cached snapshot, and the skip reason names the terminal state rather than 'open-pr'. FALSIFIER: the 20:31:00 dispatch.skipped line reporting reason='open-pr' for PR #388 more than six minutes after it merged"
    - claim: "the automated paths stand down exactly as the operator verb does, via ONE shared predicate"
      proof: "unit tests at the sweep-driven entry mirroring the EXISTING operator-verb tests run-task.test.ts:1672 (a MERGED PR refuses naming the state — zero spawns) and :1684 (CLOSED), plus an assertion that both paths call the same extracted predicate rather than two conditions. FALSIFIER: those two tests exist today for routeFix and have NO automated-path counterpart, because routeFix is reached only from fixCommand (run-task.ts:4243) while the sweep path calls runFixRung directly (run-task.ts:3932)"
    - claim: "a FAILED or INDETERMINATE state read does NOT stand down — an unreadable state never becomes a silent fleet halt"
      proof: "unit test: a seeded state-read error at each site proceeds as today and ledgers the indeterminate read, rather than treating unreadable as terminal. FALSIFIER: a fail-closed-to-stand-down implementation, which on a gh outage would silently stop every fix, disposition and dispatch fleet-wide — a far worse failure than the waste this task prevents"
