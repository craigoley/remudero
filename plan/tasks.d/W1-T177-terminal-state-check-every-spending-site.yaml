  note: "UPGRADED at filing time from a fix-rung-only merged-check to a TERMINAL-STATE INVARIANT AT EVERY SPENDING
    SITE, because the #388 forensics showed the same missing check firing at four independent sites within seven
    minutes — the rung, the sweep disposition, the escalation, and the drain's in-flight read. A per-site patch
    would have closed one and left three.
    SIBLING of W1-T176 (absent required check -> deterministic action): same machinery acting on state it never
    checked, different state and remedy — T176 is a check that never RAN, this is a target that is TERMINAL.
    Adjacent to W1-T174 (drain no-attempt) and W1-T168 (futile attempt) on the calibration axis — this is the
    WASTED-attempt end, where the target stopped existing mid-flight.
    risk:high — it adds early-returns to the autonomous spend loop, and the failure direction is asymmetric: a
    stand-down that misfires on a genuinely OPEN blocked PR silently stops the fleet from fixing it. Hence the
    live-read criterion AND the explicit fail-OPEN-on-unreadable boundary, which is the inverse of this codebase's
    usual fail-closed default and is deliberate.
    Companion: W1-T178 (verdict stability on unchanged input) — the SAME #388 trace, different defect. This task
    would have made that fixture harmless without making the reviewer stable."
