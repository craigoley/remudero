    be amended. The correction is to the DIAGNOSIS, not the obligations - W1-T224's flake disposition,
    bounded re-runs, honest escalation and gate-integrity prohibition all stand.
    THE CORRECTION MATTERS BECAUSE THE WRONG DIAGNOSIS POINTS AT THE WRONG FIX. Read as W1-T224 wrote it, an
    implementer would build a CI-reading capability the rung already has. Read correctly, the work is about
    ROUTING - why an existing capability is unreachable on the shapes that need it.
    FIXTURES UNCHANGED: PRs 479 and 485. Fixture 449 is added as the counter-observation that keeps the
    investigation honest - it dispatched ci-log despite carrying a posted FAIL status, which proves the
    rung's computed evidence and the posted status are not the same thing.
    SELF-CORRECTION NOTE: W1-T224's overstatement was mine, filed hours earlier in the same session from the
    seven-PR jam. It was caught by reading the rung's own dispatch line rather than by any gate - which is
    the same class of miss the intake pass caught in the recon's R-1, R-20 and R-23. A claim about code that
    is not verified at source decays the same way whoever writes it."
