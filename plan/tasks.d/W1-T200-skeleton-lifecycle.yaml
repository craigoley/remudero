    first-paint SPEED rather than the skeleton's RETIREMENT.
    HARD dependency on W1-T183 is deliberate and is a coordination constraint, not a formality: T183 was IN
    FLIGHT when this was filed and rebuilds the row template for every one of these sections. Building against
    today's DOM would target markup that is about to be replaced. Verify T183's landed markup first.
    THIRD member of the W1-T188 class — an acceptance certified pre-#414 by keyword coverage and contradicted by
    the operator's screen, after T154's own timing budget and T156's criterion 4.
    risk:high — graded UP from medium after rmd lint-plan flagged the serve/serve.live-state span. Recorded as a
    regrade with its reason rather than a workaround: this modifies the section render path that W1-T183 is
    CONCURRENTLY rebuilding, so the coordination risk is real and not merely a filename artifact. The dangerous
    direction remains a naive clear-and-rebuild that regresses W1-T156's node identity and selection survival,
    which has its own criterion. (The flag itself is partly a linter artifact — concern is derived from filename
    stem — but the tests belong beside T156's own lifecycle tests, so relocating them would be the dishonest fix.)"
