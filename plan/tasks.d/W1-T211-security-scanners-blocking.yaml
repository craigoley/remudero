- id: W1-T211
  title: "every security scanner is advisory - none appears in ci-gate REQUIRED, so a hard-failing OSV scan is never awaited and a CVE can merge"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 80.00
  rationale: "RECON R-11, VERIFIED and EXTENDED during intake. The full enumeration, read from the workflows
    rather than from the report: semgrep is continue-on-error (semgrep.yml:54), dependency-review is
    continue-on-error (dependency-review.yml:29), the full OSV scan sets fail-on-vuln false
    (osv-scanner.yml:29), and CodeQL has no continue-on-error but is absent from ci-gate's REQUIRED array so
    a red CodeQL never blocks a merge. osv-scanner-pr DOES fail hard (fail-on-vuln true, osv-scanner-pr.yml:28)
    - and is likewise not in REQUIRED, which is precisely the race: ci-gate only waits on names listed in
    REQUIRED (ci-gate.yml:115-124), so a scanner that fails is simply never awaited.
    REQUIRED is at ci-gate.yml:97-98 and contains thirteen names, none of them a security scanner.
    FOUND AT INTAKE, NOT IN THE REPORT: osv-scanner-pr also skips entirely for Dependabot PRs
    (osv-scanner-pr.yml:21, `if: github.actor != 'dependabot[bot]'`). So the one scanner that fails hard is
    disabled on exactly the PRs whose whole purpose is changing dependencies. That is a second exposure and
    it belongs in this task."
  design: |
    ADD THE PR SCANNER TO REQUIRED so it is awaited rather than raced. That single change converts the
    registration race into a gate. VERIFY from ci-gate.yml how REQUIRED is consumed before editing it, and
    note that this file is itself the subject of W1-T204's gate-protection work - coordinate rather than
    collide.
    DECIDE ADVISORY-VERSUS-BLOCKING PER SCANNER, WITH THE REASON RECORDED. Not every scanner should block;
    semgrep and CodeQL have false-positive profiles that can wedge a self-driving fleet. What must not
    persist is the current state where a scanner is DESCRIBED as a gate and configured as advisory. Whatever
    is chosen, the config must match the claim.
    THE DEPENDABOT HOLE IS PART OF THIS TASK. A dependency-bumping PR is the highest-value place to run a
    dependency scanner. If the skip exists to avoid noise or permissions problems, replace it with something
    that still gates, and record why.
  acceptance:
    - claim: "a PR carrying an OSV-detected CVE cannot merge, because the PR scanner is in the awaited REQUIRED set rather than racing it"
      proof: "unit test: test/scanner-gate-config.test.ts"
    - claim: "a scanner marked continue-on-error while being claimed as a gate FAILS a config assertion, so the claim and the configuration cannot drift apart"
      proof: "unit test: test/scanner-gate-config.test.ts"
    - claim: "a Dependabot PR is NOT exempt from dependency scanning, so the PRs that change dependencies are the ones the dependency scanner actually runs on"
      proof: "unit test: test/scanner-gate-config.test.ts"
  risk: medium
  origin: architect
  plan_refs: ["§5C"]
  files: [.github/workflows/ci-gate.yml]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, finding R-11, recon T8. Both claimed line refs verified exact; REQUIRED spans
    ci-gate.yml:97-98 rather than 97 alone. The Dependabot exemption (osv-scanner-pr.yml:21) was found during
    intake and is not in the fixture."
