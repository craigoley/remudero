- id: W1-T224
  title: "the fix rung can only STARE at a red CI check - it remediates review-unmet criteria and is blind to commitlint, typecheck and flaky-gate failures, so those PRs need a human every time"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "THE REMEDY-MACHINERY GAP, measured on a seven-PR jam on 2026-07-21 rather than argued in the
    abstract. Of seven simultaneously-blocked PRs, FOUR could not have been cleared by the existing
    autonomous machinery (fix rung, sweep, W1-T178 stability) with no human. That set defines the hole.
    THE THREE MACHINE-CLEARABLE ONES were blocked on review-unmet criteria - PRs 449, 452 and 466 - which is
    precisely what the fix rung exists for. The machinery is not generally weak. It is weak in ONE named
    direction.
    THE FOUR MACHINE-UNCLEARABLE ONES split into two structural reasons.
    (i) CI-CHECK RED, THE LARGER HOLE - PRs 479 and 485, both held by a coverage-ratchet failure. The rung
    reasons about REVIEW verdicts and unmet acceptance criteria. A red CI check is not an unmet criterion,
    so the rung has nothing to act on: it can observe the PR is blocked and cannot name why or do anything
    about it. This is the W1-T137/W1-T138 gap - previously recorded as the rung escalating a CI-check failure
    as review exhausted - graduated from a diagnosis into a RUNG CAPABILITY.
    (ii) A REVIEW STATUS ORPHANED BY A LATER PUSH - PRs 477 and 484. remudero-review is a commit status bound
    to the SHA it was posted against. Pushing any commit afterwards leaves the new head with NO review status
    at all, which reads as absent rather than failed, and nothing re-posts it. Observed on the hand route
    both times, and NOT verified for the machine route, so it is recorded here as a sibling finding rather
    than folded into this task's scope - filing one task for two different holes would hide the smaller one.
    WHY THIS OUTRANKS ITS APPARENT SIZE: a class the machinery cannot clear is a class that consumes a human
    every single time it fires, forever, at whatever rate it fires. Coverage-ratchet alone fired at least
    five times in one day (W1-T220). Under subscription billing the operator's attention is scarcer than the
    money, and this is the rung that decides whether a blocked PR costs a human or costs nothing."
  design: |
    THE FIRST CAPABILITY IS NAMING, NOT FIXING. Before the rung can remediate a red check it must be able to
    say WHICH check failed and why. Today the disposition logic reasons over review verdicts, so a CI-red PR
    is dispositionally mute. Give the rung the check name and its failure output as an input it can reason
    about. VERIFY from source how the sweep currently derives a PR's disposition, and how checksState is
    computed, before adding a second parallel notion of blocked.
    THEN REMEDIATE THE MECHANICAL CLASSES, WHICH ARE THE COMMON ONES AND ARE GENUINELY DETERMINISTIC. A
    commitlint failure is a message rewrite and lib/commit-message.ts already knows the rules. A typecheck
    failure is a compile error with a file and line. Neither needs a judgement call, and both currently cost
    a human.
    A FLAKE IS A DIFFERENT DISPOSITION FROM A FAILURE, and conflating them is the trap. A check that fails
    and then passes on an unchanged commit is not a defect in the PR, and the rung must not respond by
    dispatching a worker to fix code that was never wrong. Bounded re-run is the correct response, and the
    bound is what stops it becoming an infinite retry loop that burns headroom - the same failure shape
    W1-T197 and the escalate-throw loop both produced. VERIFY the existing strike accounting before adding a
    retry, because an unbounded re-run is a strike-free loop by another name.
    ESCALATE HONESTLY WHEN IT CANNOT ACT. The rung must say which check failed and that it could not
    remediate it - never the current shape, where a CI-check red is reported as review exhausted, naming the
    wrong subsystem and sending the operator to the wrong place.
    DO NOT LET THE RUNG EDIT THE GATE. It must never resolve a red check by weakening the check. That is the
    R-6 self-modification hole from the other direction, and W1-T204 is the task that closes it - this task
    must not open it.
  acceptance:
    - claim: "a PR blocked ONLY by a red CI check yields a disposition naming that CHECK, rather than being reported as review-exhausted or as an unmet acceptance criterion"
      proof: "unit test: test/sweep.test.ts"
    - claim: "a commitlint-only failure is remediated by a message rewrite through lib/commit-message.ts, with no worker dispatched to change code"
      proof: "unit test: test/sweep.test.ts"
    - claim: "a check that fails and then passes on an UNCHANGED commit is dispositioned as a flake and re-run within a bound, never as a code defect"
      proof: "unit test: test/sweep.test.ts"
    - claim: "THE LOOP FALSIFIER - re-runs are bounded and counted, so a permanently-red check cannot produce an unbounded retry loop burning headroom"
      proof: "unit test: test/sweep.test.ts"
    - claim: "a check the rung cannot remediate escalates naming the failing CHECK and the reason it could not act, never a misattributed review-exhausted verdict"
      proof: "unit test: test/sweep.test.ts"
    - claim: "THE GATE-INTEGRITY FALSIFIER - no remediation path edits a workflow, a required-check list, or a ratchet baseline to turn a red check green"
      proof: "unit test: test/sweep.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§4B", "§5C"]
  files: [src/lib/sweep.ts]
  status: queued
  attempts: 0
  note: "FILED 2026-07-21 from the seven-PR jam, as the ONE task for the largest machine-unclearable hole.
    EVIDENCE, counted rather than recalled: 7 open PRs, 3 distinct blocking causes, 4 of the 7 unclearable by
    existing machinery. Fixtures for this task specifically are PRs 479 and 485 (coverage-ratchet red, rung
    dispositionally mute) with the W1-T137/W1-T138 diagnosis as its lineage.
    THE SIBLING HOLE IS DELIBERATELY NOT FOLDED IN. remudero-review is SHA-bound, so a later push orphans it
    and leaves the new head with no review status - observed on PRs 477 and 484, both cleared by re-posting.
    That is a different mechanism and belongs in its own task once it has been verified for the machine route
    as well as the hand route. Folding two holes into one task would hide the smaller one.
    DEPENDS IN SPIRIT ON W1-T220: until a coverage-ratchet failure names what it failed on, a rung that
    reasons about check output has nothing to read. Not expressed as a hard edge because the naming
    capability is worth building against commitlint and typecheck failures regardless."
