    Evidence is stronger than first estimated: SIX same-PR pairs, not four. The four tightest fired 64-74 seconds
    apart, which is the signature of two rungs reading one state in a single sweep pass rather than a genuine
    re-escalation.
    THE FAMILY: W1-T177 fixed WHETHER to spend, W1-T186 fixes WHAT the escalation says, this fixes HOW MANY say
    it. Sibling W1-T196 (unattributable-PR stand-down) was filed alongside from the same night.
    INVESTIGATION-MINUTES class, not money class — nothing here burns worker spend; it burns operator attention
    and inflates every escalation COUNT that reaches a digest, glance strip or recap. Sequenced behind the
    console arc accordingly.
    risk:medium — the dangerous direction is over-suppression. Two criteria exist for it specifically: a new sha
    or a different cause class must still open, and a CLOSED issue must never suppress a recurrence."
