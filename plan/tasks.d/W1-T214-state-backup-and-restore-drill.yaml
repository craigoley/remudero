- id: W1-T214
  title: "MASTER-PLAN WS-7 describes a nightly state backup with a drilled restore, and grep finds zero filed tasks - the irreplaceable artifact has no backup at all"
  repo: remudero
  depends_on: []
  type: implement
  verify: human
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "RECON §6, missing organ 3 - and the sharpest catch in the report, because it is a gap in the
    PLAN rather than in the code. MASTER-PLAN §10 WS-7 describes a nightly backup of the state directory with
    a documented and drilled restore. No task implements it. It is described, unbuilt, and until now unfiled -
    which is exactly the failure mode a plan-driven system is supposed to be immune to.
    WHAT IS ACTUALLY AT RISK. state/ledger.ndjson is the irreplaceable artifact: it carries credit history and
    it IS the backing store for the dispatch circuit breaker and sweep dedup. status.json is rederivable and
    does not matter. If state/ is lost, merged tasks can re-dispatch - that is R-16's mechanism, and the
    breaker returning zero for every task is precisely the redispatch-storm condition. If the machine is lost,
    the repository survives on GitHub but the ledger, the retro markers and the operator learnings state do
    not.
    THE DRILL IS THE POINT, NOT THE BACKUP. An untested backup is a belief, not a capability. The recon's
    related note is right that disaster recovery is otherwise well tracked (W1-T147 chaos drill, W1-T12c/d/e
    crash recovery) - this extends that family to the one scenario none of them covers: state loss."
  design: |
    BACK UP THE LEDGER FIRST AND EVERYTHING ELSE SECOND. Scope by what is irreplaceable rather than by what is
    in the directory. VERIFY from source which files under state/ are derived and which are authoritative
    before choosing the set - backing up a rederivable cache is cost without benefit, and missing an
    authoritative file is the whole failure.
    THE RESTORE MUST BE DRILLED, AND THE DRILL IS THE ACCEPTANCE TEST. Restore into a scratch location, then
    assert a PROPERTY rather than file equality: after restore, the dispatch breaker returns the same verdict
    for a task with history, and sweep dedup still suppresses an already-credited task. Those two are what
    state loss actually breaks.
    COORDINATE WITH ROTATION. W1-T209 will start moving old ledger records into archived rolls. A backup that
    captures only the live file after rotation begins would silently lose history, so the two must agree about
    what constitutes the full record.
    verify:human DELIBERATELY: a restore drill's value is an operator having done it once and knowing it
    works. A worker can build and test the mechanism, but the drill is signed off by a person.
  acceptance:
    - claim: "a backup exists on a stated cadence and captures every authoritative file under state, with derived files excluded by a rule rather than by hand"
      proof: "unit test: test/state-backup.test.ts"
    - claim: "THE DRILL - after restoring into a scratch location, the dispatch breaker returns the SAME verdict for a task with prior dispatch history as it did before the loss"
      proof: "unit test: test/state-restore-drill.test.ts"
    - claim: "after restore, sweep dedup still suppresses an already-credited task, so a restored fleet does not re-action or re-credit merged work"
      proof: "unit test: test/state-restore-drill.test.ts"
    - claim: "the restore procedure is documented as an operator runbook entry, not only as code"
      proof: "unit test: test/runbook-coverage.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§10"]
  files: [src/lib/ledger.ts]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, recon §6 missing-organ 3. Filed because the recon caught a DESCRIBED-BUT-UNFILED
    item in MASTER-PLAN §10 WS-7 - the audit rung's most valuable class of finding, since a plan gap is
    invisible to every code-level check the repo runs.
    RELATED to W1-T209 (rotation) - a backup and an archival policy must agree on what the full record is, or
    rotation silently truncates what the backup preserves."
