- id: W1-T223
  title: "a collapsed console section must still inform - every section collapses, and its header carries an always-visible one-line summary from the same projection as its rows"
  repo: remudero
  depends_on: [W1-T183]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 80.00
  rationale: "OPERATOR FEEDBACK PLUS A RESEARCH PASS, 2026-07-21. The console's sections are all-or-nothing:
    everything is visible, so nothing is prioritised, and a long RECENT or EVERYTHING ELSE pushes the
    sections that matter off the screen. Collapsing alone would trade one problem for a worse one - a
    collapsed section that shows nothing is a section the operator has to open to learn whether it needed
    opening.
    THE SUMMARY HEADER IS THE WHOLE POINT, not a decoration on a collapse feature. A collapsed section must
    still answer its own question: NOW says how many are running and how old the oldest is, NEEDS ME says how
    many are open and how old the oldest is, UP NEXT names the next task id, RECENT says how many landed
    today and how long ago the last one was. That is enough to decide whether to expand, which is the only
    decision a collapsed section needs to support.
    COUNTS COME FROM THE SAME PROJECTION AS THE ROWS - never a second derivation. This is standing rule 22
    applied to a summary: a header claiming three items over a list showing four is a surface disagreeing
    with itself, and the operator has no way to know which is lying. The W1-T181 outage (merged 0 of 160 with
    every task queued) is what a second, disagreeing derivation looks like when it fails."
  design: |
    WHOLE HEADER IS THE TRIGGER, with a chevron affordance, matching W1-T222's row interaction so the console
    has ONE expand gesture rather than two that differ by region.
    COLLAPSE STATE PERSISTS ACROSS RELOADS, client-side. Standing rule 24 applies and is not incidental here:
    persisted UI state must contain NO credential. Collapse state is a layout preference and nothing more.
    DEFAULTS THAT RESPECT ATTENTION. NEEDS ME auto-expands when it is non-empty, because that is the section
    the console exists to surface. When a NEEDS ME item arrives while the section is COLLAPSED, its header
    carries emphasis - otherwise collapsing becomes a way to silently miss the thing most worth seeing, which
    would make the feature actively harmful. Empty sections default collapsed with an HONEST empty summary,
    the words nothing needs you rather than a zero that reads like a load failure.
    NEVER A SKELETON IN A HEADER (W1-T200). A summary with no data yet says so honestly. A skeleton in a
    collapsed header is indistinguishable from a hung fetch, and W1-T200 exists because a skeleton that
    outlives its data misleads.
    ONE COHERENT IA - read the siblings before building. Overview strip (W1-T159), section summaries (this
    task), dense rows (W1-T183), inline drill (W1-T222), full journey inside the drill. Four depths of
    details-on-demand. The failure mode if these are built in isolation is duplication: a strip, a header and
    a row each deriving the same count three ways, which is precisely what the third criterion below forbids.
  acceptance:
    - claim: "a collapsed section whose header shows no count or summary FAILS - a collapsed section still answers its own question"
      proof: "unit test: test/serve.shell-ux.test.ts"
    - claim: "collapse state lost on reload FAILS, and the persisted state contains no credential"
      proof: "unit test: test/serve.shell-ux.test.ts"
    - claim: "a header summary disagreeing with its own expanded rows FAILS - the count comes from the same projection as the rows, never a second derivation"
      proof: "unit test: test/serve.live-state.test.ts"
    - claim: "a NEEDS ME item arriving while that section is collapsed with NO header emphasis FAILS - collapsing must not become a way to silently miss it"
      proof: "unit test: test/serve.live-state.test.ts"
    - claim: "NEEDS ME auto-expands when non-empty, and an empty section defaults collapsed with an honest empty summary rather than a skeleton or a bare zero"
      proof: "unit test: test/serve.shell-ux.test.ts"
    - claim: "the header expand gesture matches the row expand gesture, so the console has one interaction rather than two that differ by region"
      proof: "unit test: test/serve.shell-ux.test.ts"
