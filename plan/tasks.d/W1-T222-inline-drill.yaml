- id: W1-T222
  title: "reaching a task's detail must not mean leaving its row - clicking a row expands a detail card INLINE beneath it, retiring bottom-panel journey navigation"
  repo: remudero
  depends_on: [W1-T183]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "OPERATOR FEEDBACK PLUS A RESEARCH PASS, 2026-07-21. The console's current journey affordance
    navigates to a bottom panel, which means the operator loses the row they were looking at in order to
    learn about it. In a list whose whole purpose is comparison - which task is stuck, which is oldest, which
    needs me - navigating away from the row to read its detail defeats the list.
    THIS IS A RULE-21 SUCCESSOR TO W1-T158, NOT AN AMENDMENT. W1-T158 shipped the panel placement this task
    retires, and it is DONE - verified at filing that a merged PR carries its Remudero-Task trailer - so
    standing rule 21 requires a successor task rather than an edit to shipped work. Retiring a shipped
    decision is exactly the case the rule exists for.
    DETAILS ON DEMAND AT FOUR DEPTHS. This task is one layer of a single coherent information architecture,
    not a standalone feature: an overview strip (W1-T159), section summaries (W1-T223), dense rows (W1-T183),
    an inline drill (this task), and a full journey lazy-loaded inside the drill. Each layer answers a
    different question at a different cost, and they only work if they compose. AN IMPLEMENTER MUST READ THE
    SIBLING TASKS' CRITERIA BEFORE BUILDING - these were written together and can collide if built in
    isolation."
  design: |
    THE WHOLE ROW IS THE TRIGGER, with a right-edge chevron as the visible affordance whose direction flips
    on state. A large target beats a small one, and the chevron exists so the row LOOKS expandable rather
    than requiring the operator to discover that it is.
    THE CARD OPENS INLINE, DIRECTLY BELOW ITS OWN ROW. Never a navigation, never a scroll-away. The row stays
    exactly where it was, and its neighbours stay comparable. Re-click collapses.
    CARD CONTENT: status, phase, elapsed and spend, PR and issue links, recent ledger events, and the
    available actions. Actions RENDER PER AUTH SCOPE - a read-only bookmark shows no write affordances at
    all, rather than showing them and failing on click. That coordinates with W1-T202, which is where the
    auth model itself is decided, and it inherits standing rule 22: a surface owes the reader which state it
    is showing, and an action the viewer cannot take must not be rendered as available.
    THE FULL JOURNEY LAZY-LOADS INSIDE THE EXPANSION on demand. It is the fourth and deepest layer, and it
    must not be fetched merely because a card opened.
    DETAIL FETCHES ON EXPAND, WITH A W1-T200-COMPLIANT SKELETON - pre-data only, cleared on render, never
    left standing as decoration. A skeleton that outlives its data is the exact defect W1-T200 exists to fix.
    DEEP-LINK VIA ?task=<id>, which opens with that row expanded and scrolled into view. This REPLACES the
    bottom-panel anchor as the addressable target for a single task.
    KEYBOARD AND ASSISTIVE PARITY: Enter and Space toggle, aria-expanded reflects state, and focus is
    RETAINED across the toggle rather than being dropped to the document.
    DOM-STABILITY REACHES INTO EXPANSIONS - W1-T156's doctrine extended, and this is the half most likely to
    be missed. A background SSE or poll update must not collapse an open expansion, steal focus from inside
    it, destroy a selection inside it, or jump the viewport. W1-T156 is DONE, so this obligation is carried
    HERE rather than added there. VERIFY from source how T156 achieved stability for rows before designing
    it for expansions - the mechanism should be extended, not reinvented beside it.
  acceptance:
    - claim: "reaching a task's detail requiring the operator to scroll away from its row FAILS - the detail opens inline directly beneath the row that triggered it"
      proof: "unit test: test/serve.detail-journey.test.ts"
    - claim: "expanding or collapsing a card causing a viewport jump FAILS - the triggering row stays put"
      proof: "unit test: test/serve.detail-journey.test.ts"
    - claim: "a background SSE or poll update collapsing an OPEN expansion, stealing focus from inside it, or destroying a selection inside it FAILS"
      proof: "unit test: test/serve.live-state.test.ts"
    - claim: "the journey affordance navigating to a bottom panel after this lands FAILS - the panel route is retired rather than left beside the inline one"
      proof: "unit test: test/serve.detail-journey.test.ts"
    - claim: "a read-only bookmark renders NO write affordances inside the card, rather than rendering them and failing on click"
      proof: "unit test: test/serve.shell-ux.test.ts"
    - claim: "?task=<id> opens with that row expanded and scrolled into view, and re-click collapses it"
      proof: "unit test: test/serve.detail-journey.test.ts"
    - claim: "Enter and Space toggle the row, aria-expanded reflects state, and focus is retained across the toggle"
      proof: "unit test: test/serve.shell-ux.test.ts"
    - claim: "the detail skeleton appears only before data and is cleared on render, never left standing"
      proof: "unit test: test/serve.first-paint.test.ts"
