  note: "FILED 2026-07-21 from a read-only diagnosis requested at session close. All three candidate causes were
    tested: the merge counter is NOT below threshold (runs_seen is written as gather.totalRuns and never read back
    as a firing condition), no integrity gate is holding (the only guards found are a rendering-honesty check and
    an explicit 'generation must never abort a retro over a heading rename'), and the trigger is simply ABSENT.
    THIRD INSTANCE of the human-trigger-only class in one session, after W1-T192 (inbox draft rung) and the
    answer-driven strike reset being wired to the sweep path only. Every rung that runs unattended runs; every
    rung that needs a human does not.
    risk:high — it adds a higher-tier Architect spawn to an unattended 300s loop. The idempotence and integrity
    criteria are the load-bearing ones: an unkeyed rung is a spend leak, and an ungated one advances the marker
    over a corpus it could not read."
