- id: W1-T237
  title: "the containment preflight renders a credential-dead worker as generic 'unproven' - it must name spawn_credential_failure distinctly and fail closed"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 60.00
  rationale: "containment.ts builds the probe transcript as [probe.text, probe.blocks, probe.stderr] joined,
    and tests it only against OS_DENIAL_RE plus the sentinel token. An error-result carrying
    'Not logged in - Please run /login' matches neither, so a credential-dead worker - which makes no writes -
    renders as the generic 'containment UNPROVEN ... may never have been attempted'. That is exactly the
    misdiagnosis that cost this incident two days: a dead-auth worker and a compliant sandbox are byte-identical
    in the verdict.
    THE INFORMATION IS ALREADY IN HAND. WorkerResult carries isError and the result text; tonight's locked
    repro showed both ('Not logged in', isError true). The preflight simply does not look at them - it tests
    the transcript for denial text and stops.
    THIS IS THE NAMED-REASON DOCTRINE ON ITS NEXT SURFACE. The same doctrine already applied to materialization
    failures and verdict integrity: a floor that degrades must say WHY, or the degradation is invisible. A
    credential failure and an isolation failure demand opposite operator responses - unlock the keychain versus
    investigate the sandbox - so collapsing them is not a cosmetic gap."
  design: |
    probeContainment - and the isolation preflight if it shares the shape, VERIFY that from source - inspects
    WorkerResult.isError together with credential-shaped result text and fails closed with a DISTINCT named
    reason, e.g. spawn_credential_failure, carried in the containment.probe ledger line, the say() output, and
    the returned verdict. It must still fail closed - a credential-dead worker proves nothing about isolation -
    but it must name WHY it failed.
    DISTINGUISH THREE OUTCOMES, do not merge them: a spawn that failed on credentials, a spawn that produced no
    write with no denial (the genuine unproven case), and a spawn that saw a real OS denial (contained). Only
    the middle one keeps the generic reason.
    MATCH CREDENTIAL TEXT CONSERVATIVELY. Key on isError plus a specific credential signature ('Not logged in',
    'Please run /login'), not on any error - an unrelated error-result must not be mislabelled a credential
    failure. VERIFY the exact strings from the SDK error-result observed this session before hardcoding a
    pattern.
  acceptance:
    - claim: "a seeded error-result carrying 'Not logged in' yields the credential-named reason and NOT the generic unproven reason"
      proof: "unit test: test/containment.test.ts"
    - claim: "a genuine no-write, no-denial run still yields the generic unproven reason, so the credential path does not swallow the real isolation case"
      proof: "unit test: test/containment.test.ts"
    - claim: "the credential-named outcome still FAILS CLOSED - a credential-dead worker never counts as contained"
      proof: "unit test: test/containment.test.ts"
  risk: low
  origin: architect
  plan_refs: ["§4A", "§12"]
  files: [src/lib/containment.ts]
  status: queued
  attempts: 0
  note: "FILED 2026-07-21. Citations verified at origin/main 2d33735: containment.ts:103 (OS_DENIAL_RE) and
    :127 (transcript = [probe.text, probe.blocks.join, probe.stderr].join).
    PLANTED-PROBE ACCEPTANCE PATTERN, in the lineage of W1-T98: seed a known-shaped bad result and assert the
    verdict names it correctly, rather than waiting for the live condition to recur.
    THIS IS THE NAMED-REASON DOCTRINE'S NEXT SURFACE after materialization and verdict integrity - the third
    place a degraded floor was found reporting an opaque reason for a knowable cause."
