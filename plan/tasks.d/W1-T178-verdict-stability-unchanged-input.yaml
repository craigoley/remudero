- id: W1-T178
  title: "VERDICT STABILITY ON UNCHANGED INPUT — a re-review of an unchanged head that previously PASSED must not be downgraded by semantic-lane noise alone; a legitimate downgrade must cite what changed, or the deterministic floor's pass stands"
  repo: remudero
  depends_on: [W1-T102, W1-T72]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "FIXTURE (real, ledger-exact): on PR #388, remudero-review posted state=SUCCESS at 2026-07-20T20:28:27Z
    and state=FAILURE at 20:30:47Z against the IDENTICAL head sha 1fbea36631160fc2e99a58baf8017de9deab32a2, with no
    new commit between them and no change to the PR body. Two minutes apart, same input, opposite verdicts. The
    second verdict is what recorded fix.review strike 2 at 20:30:47 and drove fix.exhausted + escalation #395 at
    20:30:48. So the flip was not cosmetic: it was the PROXIMATE CAUSE of the strike-out.
    WHY THIS IS THE SYMMETRIC HAZARD OF W1-T102, and why that task does not already cover it. W1-T102 ('Every fix
    strike ends with a FRESH verdict — re-judge and re-post after body-only fixes too, the #177 stale-status
    exhaustion') exists because a PINNED verdict was too STICKY: the rung never re-judged after body-only fixes, so
    two CORRECT fixes exhausted against a stale 7/28 FAILURE while post-fix measurement scored 28/28 ALL MET. T102
    correctly made every strike re-judge. But making the verdict fresh made it UNPINNED, and an unpinned verdict
    over a non-deterministic judge can flap in the other direction — an earned SUCCESS silently becoming a FAILURE
    on unchanged input. T102 removed sticky-FAILURE; this task bounds flapping-SUCCESS. They are the two ends of one
    axis, and the fix must not reintroduce T102's hazard: the answer is NOT to re-pin verdicts.
    A THIRD SHOWING OF THE SAME LANE'S COST, cited precisely: PR #212 / task W3-T1a (plan/questions.ndjson,
    2026-07-18) burned a fix strike on a purely SEMANTIC downgrade — 'the reviewer judged the proof non-responsive
    (semantic downgrade)' — against an acceptance criterion whose own recorded proof text was EMPTY. Strike spent,
    operator question opened, on a criterion with nothing to judge.
    TWO CROSS-REFERENCES CORRECTED at filing, so they are not carried forward wrong: (1) PR #274 is NOT a
    semantic-strike-burner — it is 'ci: diff-scope mutation-ratchet + Stryker incremental cache (W1-T108)', and its
    recorded question (plan/questions.ndjson, 2026-07-19) reads 'checks pending, review none — escalating — no
    fix-rung strike is recorded for this PR'. That is REVIEW-ABSENT, the W1-T176 class, not a semantic downgrade,
    and no strike was spent. The genuine semantic-strike-burner fixture is #212/W3-T1a above. (2) A
    'tiebreak-sooner' retro question could not be located anywhere in plan/, MASTER-PLAN.md, LEARNINGS.md,
    DECISIONS.md or plan/questions.ndjson — it is NOT cited here rather than cited unverified. If it exists
    elsewhere, fold it in when found."
  design: |
    ANCHOR ON THE DETERMINISTIC FLOOR, which is the part of the judge that is reproducible. The rule: for a
    re-review whose head sha is UNCHANGED since a prior verdict, and whose deterministic floor PASSES, the semantic
    lane may NOT by itself render a worse verdict than its predecessor. A downgrade on unchanged input is legitimate
    ONLY when it cites NEW INFORMATION — a changed head, a changed PR body, a changed criteria set, a
    newly-observed proof execution, or an operator correction. Absent such a citation, the prior SUCCESS stands and
    the re-review is a no-op.
    ASYMMETRY IS DELIBERATE AND MUST BE PRESERVED: this constrains DOWNGRADES on unchanged input only. An UPGRADE
    (failure -> success) on unchanged input stays permitted, because that is exactly the path W1-T102 opened for
    body-only fixes to be recognised, and closing it would re-create the #177 stale-status exhaustion this
    codebase already paid for. Do NOT implement this as a general 'verdicts are pinned to a sha' rule — that is
    precisely T102's defect.
    IMPLEMENTATION SHAPE (verify from source, distrust this note): the prior verdict is already recoverable from
    the ledger's review.posted lines, which carry head_sha and state — unmetFromLedger (run-task.ts:3633-3649)
    already replays exactly these. So the comparison needs no new storage: on re-review, look back for the most
    recent review.posted for this PR, and if its head_sha matches the current head and its state was success while
    the new semantic verdict is failure, hold the success and ledger the suppressed downgrade rather than posting
    it. The deterministic floor's own result must be consulted directly — if the FLOOR fails, the downgrade is
    legitimate and posts normally, because that is not semantic noise.
    OBSERVABILITY IS PART OF THE DELIVERABLE, not optional: every suppressed downgrade ledgers an event naming the
    sha, both verdicts, and the floor result. A rule that silently swallows real regressions would be worse than
    the flapping. The suppression count is the signal that tells whether the semantic lane is getting better or
    worse over time, and it must be visible in the digest.
    OUT OF SCOPE: making the semantic reviewer itself deterministic (temperature, prompt pinning, model choice).
    That is a bigger question about the lane's design. This task bounds the BLAST RADIUS of its non-determinism —
    it stops a coin-flip from burning strikes and dollars — without claiming to fix the coin.
    RELATED, and the reason this matters more than it looks: every review in the 2026-07-20 session posted at
    proof_exec 0/N (#391 0/3, #394 0/4, #397 0/4). With the empirical floor dead (W1-T128), the semantic lane is
    carrying more of the verdict than it was designed to, so its noise costs more. W1-T128 and this task compound.
  acceptance:
    - claim: "an unchanged-SHA re-review with a PASSING deterministic floor cannot render a verdict worse than its predecessor"
      proof: "unit test: given a prior review.posted success on sha X and a semantic lane returning failure on a re-review of the SAME sha X with the floor passing, the posted verdict remains success and a suppression event is ledgered naming both verdicts. FALSIFIER: the #388 trace — success at 20:28:27Z and failure at 20:30:47Z on identical head 1fbea36 with no new commit, where the second verdict recorded fix.review strike 2 and drove fix.exhausted plus escalation #395 one second later"
    - claim: "a downgrade citing NEW INFORMATION still posts — the rule constrains noise, not genuine regressions"
      proof: "unit test: a re-review whose head sha CHANGED, or whose deterministic FLOOR fails, downgrades and posts normally. FALSIFIER: an implementation that pins a success to a PR regardless of new commits, which would let a real regression ride a stale green into merge"
    - claim: "an UPGRADE on unchanged input remains permitted — W1-T102's body-only-fix path is not re-broken"
      proof: "unit test: a prior failure on sha X followed by a success on the SAME sha X posts the success. FALSIFIER: the #177/W1-T102 incident — body-coverage fixes changed no commit, so a rule pinning verdicts to a sha would re-create the stale-status exhaustion where two CORRECT fixes exhausted against a stale 7/28 verdict that post-fix measurement scored 28/28 ALL MET"
    - claim: "every suppressed downgrade is VISIBLE — the rule never silently swallows a verdict"
      proof: "unit test: each suppression ledgers an event carrying the sha, the predecessor verdict, the suppressed verdict and the floor result, and the count surfaces in the digest. FALSIFIER: a silent suppression, which would hide a genuine reviewer regression behind a rule meant only to damp noise"
