- id: W1-T208
  title: "run.lock is written non-atomically and an unparseable read is indistinguishable from no lock at all, so a torn read can misclassify a live run as abandoned"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 60.00
  rationale: "RECON R-18, VERIFIED IN PART during intake - and the recon's stated trigger was REFUTED, which
    narrows this task considerably and is recorded here so the implementer does not chase a condition that
    cannot occur.
    WHAT IS TRUE: writeRunLock (src/lib/worker.ts:738-740) is a plain writeFileSync with flag w, which
    truncates before writing - no temp file, no rename. The read path (:742-750) collapses BOTH a
    malformed-JSON throw and a non-numeric pid into `null`, which is the exact same value the caller sees
    when there is no lock file at all. A torn read is therefore indistinguishable from an absent lock.
    WHAT IS FALSE: the recon claims a zero grace period lets this prune a LIVE worktree. It does not.
    DEFAULT_PRUNE_GRACE_MS is 120_000 (worker.ts:767), the `graceMs ?? 0` at :804 is only a library default,
    and ALL SIX production call sites override it (run-task.ts:2046, :3115, :5269, :5498, :5690, :5953). No
    non-test caller uses the zero default. Better still, the grace branch is gated on `!lock` - precisely the
    state a torn read produces - so the age guard already COVERS the torn-read case rather than being
    bypassed by it.
    THE RESIDUAL RISK, STATED HONESTLY, IS SMALL: a live worktree whose directory mtime is older than two
    minutes AND whose lock is read torn in the same instant would be force-removed. That requires a run idle
    on filesystem writes for over two minutes coinciding with the sub-millisecond truncate window of another
    process rewriting that same lock. This task is filed because the fix is cheap and the failure is
    destructive, NOT because the failure is likely."
  design: |
    SAME REMEDY AS ITS SIBLINGS: write to a temp path in the same directory and rename over the target, so a
    reader sees a whole lock or no lock and never half of one.
    DISTINGUISH CORRUPT FROM ABSENT. The more valuable half of this task is that the read path currently
    conflates two different facts. `null` should mean 'there is no lock'. An unparseable lock file is a
    DIFFERENT observation and the caller deserves to tell them apart, because one means the worktree is free
    and the other means something is wrong. Whatever shape that takes, a corrupt lock must not silently read
    as an idle worktree.
    KEEP THE GRACE PERIOD. It is doing real work and the intake evidence shows it already covers the
    torn-read path. Do not remove or shorten it as part of this change, and do not restate the recon's
    zero-grace claim in any artifact - it is false on every production path.
  acceptance:
    - claim: "a reader interleaved with a lock writer never observes a partial lock file"
      proof: "unit test: test/worker-run-lock.test.ts"
    - claim: "an unparseable lock is reported DISTINCTLY from an absent lock, so a corrupt lock cannot read as an idle worktree"
      proof: "unit test: test/worker-run-lock.test.ts"
    - claim: "the two-minute prune grace still applies unchanged after the fix, asserted so a later refactor cannot quietly drop the guard that makes the torn-read case survivable"
      proof: "unit test: test/worker-run-lock.test.ts"
  risk: medium
  origin: architect
  plan_refs: ["§12"]
  files: [src/lib/worker.ts]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, finding R-18. The recon's zero-grace trigger was REFUTED at source during intake
    (DEFAULT_PRUNE_GRACE_MS 120_000, overridden at all six production call sites, and the grace branch gated
    on the very !lock state a torn read produces). Filed anyway because the remedy is cheap and the failure
    mode is destructive, but SIZED to that honest reading rather than to the report's.
    THIRD MEMBER of the WRITE-SIDE ATOMICITY family (MASTER-PLAN §12), with W1-T206 and W1-T207."
