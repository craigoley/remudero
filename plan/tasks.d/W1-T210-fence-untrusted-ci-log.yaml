- id: W1-T210
  title: "a CI log tail is interpolated bare into the write-capable fix-worker prompt, and that worker carries no tool restriction - untrusted text reaching an agent that can push"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 80.00
  rationale: "RECON R-19, VERIFIED at source during intake with corrected line numbers. The untrusted text is
    fetched by `gh run view --log-failed` (src/run-task.ts:4183-4187) and interpolated raw at
    src/run-task.ts:1013, then spliced bare into the prompt array at :1023 between narrative instruction
    lines. No delimiter, no label, no escaping, no treat-as-data instruction. Both the check NAME and the
    60-line log tail are attacker-influenceable by anyone who can make a CI job print text.
    WHY THIS ONE IS WORSE THAN IT LOOKS, found during intake and NOT in the report: this prompt is
    write-capable - it instructs `git push origin HEAD` and branch amending (run-task.ts:1000-1006) - and
    unlike every other worker prompt in the codebase it carries NO tools restriction. INBOX_DRAFT_WORKER_TOOLS,
    PLAN_WORKER_TOOLS and TRIAGE_WORKER_TOOLS all constrain their workers. The fix worker does not. So the
    single unfenced input in the system is the one feeding the least constrained agent.
    THE CODEBASE ALREADY KNOWS HOW TO DO THIS. inboxDraftPrompt fences its untrusted content with an explicit
    `=== THE PROPOSAL ===` delimiter (src/lib/inbox.ts:384). This task is applying an existing local
    convention to the place that skipped it, not inventing a mechanism."
  design: |
    FENCE THE UNTRUSTED SPAN AND LABEL IT AS DATA. Wrap the log tail and the check name in an explicit,
    clearly delimited block that states the content is untrusted output to be analysed, never instructions to
    follow. Mirror inbox.ts's existing delimiter convention rather than inventing a second style.
    HANDLE A HOSTILE DELIMITER. Untrusted text that itself contains the fence marker must not be able to
    close the fence and escape. Whatever marker is chosen, the content must be neutralised against it - and
    that case needs its own test, because it is the first thing an attacker tries.
    CONSIDER THE TOOL RESTRICTION SEPARATELY AND STATE THE DECISION. The missing tools allowlist on the fix
    worker is a real second exposure found during intake. Either constrain it here with the reason recorded,
    or file it explicitly as follow-up. Do not silently leave it - an unfenced input was survivable partly
    because nobody had noticed the agent reading it is unconstrained.
    SCOPE NOTE - R-20 IS NOT PART OF THIS TASK. See the note field.
  acceptance:
    - claim: "a CI log tail containing an injected instruction reaches the fix-worker prompt wrapped in an inert labelled block rather than bare"
      proof: "unit test: test/fix-prompt-fencing.test.ts"
    - claim: "the attacker-influenceable check NAME is fenced too, not only the log tail"
      proof: "unit test: test/fix-prompt-fencing.test.ts"
    - claim: "untrusted content containing the fence marker itself cannot close the fence and escape into instruction context"
      proof: "unit test: test/fix-prompt-fencing.test.ts"
