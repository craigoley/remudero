  note: "FILED 2026-07-21. Measurements taken by hand on a scratch clone of origin/main a9ef3b9, not estimated:
    0.2s narrowed, 1.51s and 4.72s whole-file, against a 30s cap.
    THIS IS THE HARNESS HALF of the same-SHA proof_exec oscillation. The verdict-write half - a CAPPED result
    overwriting an executed one - is filed separately, because narrowing the runs reduces how often the race
    fires without making the overwrite safe."
