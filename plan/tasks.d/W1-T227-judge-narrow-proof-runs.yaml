- id: W1-T227
  title: "the judge runs every name-pattern proof against the FULL test glob, so the same proof coins executed or exec_error depending on machine load"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 80.00
  rationale: "MEASURED 2026-07-21 on origin/main. review.ts:333 documents the name-filtered shape as running
    `node --test --import tsx --test-name-pattern <name> test/**/*.test.ts` - the whole suite, filtered. Node
    still LOADS every test file before filtering by name, so the cost is the full suite load regardless of how
    few tests match.
    THE NUMBERS, taken by hand on a scratch clone of main: a narrowed run of one W1-T182 proof against
    test/status.test.ts alone completes in 0.2 SECONDS. The same two files whole are 1.51s (status, 94 tests)
    and 4.72s (board, 36 tests). A full-glob load is roughly 22s on an idle machine, against
    DEFAULT_PROOF_TIMEOUT_MS of 30_000 (review.ts:538).
    THAT MARGIN IS THE DEFECT. Twenty-two seconds against a thirty-second cap leaves no headroom on a machine
    running workers. The same proof, unchanged, coins executed_pass on an idle host and exec_error on a loaded
    one - and exec_error DEGRADES to the keyword floor, which is how one SHA reports 0/6 proofs executed in one
    pass and 2/6 in another. That oscillation was observed on PR 449 the same day, and it is not a flake in the
    tests: it is a timeout race in the harness that runs them.
    THE PROOFS THEMSELVES ARE SOUND. All six dialect proofs across W1-T182 and W1-T184 were re-run narrowed on
    main and every one is EXECUTED-PASS against a test named verbatim after its own acceptance criterion. The
    contract works. Only its invocation is too expensive to be reliable."
  design: |
    RESOLVE CANDIDATE FILES FIRST, THEN RUN ONLY THOSE. Take a distinctive fixed-string fragment of the pattern,
    grep test/ for it (fixed-string, never regex - a pattern body is architect prose and contains characters a
    regex would misread), and run node --test against the matched file or files alone.
    ZERO CANDIDATES CHANGES NOTHING. If no file matches, the existing behaviour stands: the run reports only the
    file wrapper, nameFilteredOutcome's wrapper filter finds no real result, and the proof fails as a zero-match
    (review.ts:641-653). Narrowing is an optimisation of the executed path, never a new way to pass.
    TIMEOUT STAYS exec_error, BUT STOPS BEING SILENT. Keep the 30s cap and the exec_error mapping. Add the
    invocation and the measured wall time to what is logged, so the next time a proof coins differently on two
    passes an operator can see which one timed out instead of inferring it from a verdict diff.
    VERIFY THE GLOB CLAIM FROM SOURCE before building. This task cites review.ts:333 as documentation of the
    invocation shape - read the actual argv construction and correct the citation if the code differs from its
    comment.
  acceptance:
    - claim: "a proof matching tests in exactly one file executes against only that file"
      proof: "unit test: built argv contains the single file, not the glob"
    - claim: "no name-pattern invocation carries the full glob"
      proof: "unit test on the command builder"
    - claim: "zero-candidate patterns still fail as zero-match"
      proof: "unit test: nameFilteredOutcome path unchanged"
  risk: medium
  origin: architect
