- id: W1-T218
  title: "no log has a size or age bound - and a naive rotation policy would sweep up the ledger and zero the dispatch breaker"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 40.00
  rationale: "RECON R-25. No rotation mechanism exists anywhere - verified at intake across /etc/newsyslog.d,
    /etc/newsyslog.conf, src, scripts and bin. Greps for rotate/logrotate/newsyslog return only unrelated
    hits (string truncation, and TOKEN rotation at serve.ts, which is credentials not logs).
    SIZED TO MEASURED REALITY RATHER THAN TO THE REPORT'S FRAMING. All five logs are small today: daemon.err
    42 KB, daemon.out 117 KB, serve.log under 1 KB, drain.log 1.2 KB, sweep-loop.log 9.5 KB. This is hygiene
    against unbounded growth, not a live problem, and the budget reflects that.
    THE ONE WAY THIS TASK CAN DO HARM is the reason it is filed separately rather than folded into a runbook
    task. ledger.ndjson sits in the same directory at 9.4 MB and is the only genuinely unbounded file there -
    and it is the backing store for the dispatch circuit breaker and sweep dedup. A generic 'rotate
    everything in state/' policy would truncate it and silently reset every breaker to zero, which is the
    redispatch-storm condition. The ledger has its own breaker-safe archival task (W1-T209) and this policy
    must exclude it explicitly.
    ALSO OBSERVED AT INTAKE, not in the report: ad-hoc logs are accumulating in the same directory (t108.log,
    t115.log, t181.log, watch-274.log). The policy should state what happens to them, even if the answer is
    that they are operator scratch and out of scope."
  design: |
    SMALLEST POLICY THAT BOUNDS GROWTH. A size or age cap per log, enforced either by a newsyslog.d entry or
    in-code at write time. Do not build a rotation subsystem for 120 KB of text.
    THE EXCLUSION IS THE LOAD-BEARING PART. Whatever mechanism is chosen must name what it rotates rather
    than rotating a directory, so that adding a new decision-backing file to state/ later cannot silently
    enrol it. VERIFY from source which files under state/ back a decision before writing the list.
  acceptance:
    - claim: "each of the daemon and service logs has a stated size or age bound rather than growing without policy"
      proof: "unit test: test/log-rotation.test.ts"
    - claim: "THE EXCLUSION FALSIFIER - the policy names what it rotates rather than sweeping a directory, so ledger.ndjson is untouched and the dispatch breaker cannot be zeroed by log hygiene"
      proof: "unit test: test/log-rotation.test.ts"
    - claim: "a decision-backing file added to state later is NOT silently enrolled into rotation by the same rule"
      proof: "unit test: test/log-rotation.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§10"]
  files: [src/lib/ledger.ts]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, finding R-25. Split out of W1-T217 at intake after the plan linter flagged the
    combined runbook-plus-rotation task as spanning two concerns. Log sizes measured at intake rather than
    assumed, which is why this is a 40-dollar hygiene task and not an incident.
    RELATED: W1-T209 handles the ledger under a breaker-safe archival policy. These two must not overlap, and
    the second criterion here is the guard that they do not.
    risk:high - GRADED UP after rmd lint-plan flagged the daemon/ledger span. Recorded as a regrade rather
    than a workaround because the honest reading supports it, even though the work is small and the budget is
    40 dollars. Effort and risk are different axes: this is an hour of hygiene whose single failure mode is
    truncating the file that backs every dispatch circuit breaker, and the failure direction is a fleet that
    silently re-dispatches merged work. The second criterion is the guard, and it is load-bearing rather than
    defensive."
