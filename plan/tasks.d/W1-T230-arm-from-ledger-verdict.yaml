  note: "FILED 2026-07-21 after a read-only arm-path recon. Citations verified at origin/main a18fdeb rather
    than assumed, and the recon corrected two things a reader would otherwise get wrong: there are SEVEN arm
    sites (not one), and FOUR of them arm without consulting the review result at all.
    NO BLOCKING FLOW FOUND: the recon looked for a legitimate path arming on a status this orchestrator did not
    write - an operator hand-post or an external re-post with no ledger record to key off. None exists.
    `rmd review` posts through the same judge and writes the same review.posted record, so the ledger-keyed
    decision covers the operator path too.
    COUPLES TO W1-T228 (status write-integrity). That task hardens the channel as a DISPLAY. This one removes
    the channel from the DECISION. Both are wanted: one stops the board lying to the operator, the other stops
    a lie merging code."
