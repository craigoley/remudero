  design: |
    Implement the two criteria against the projection, exactly as W1-T155 would have had it done. Both live in
    the DATA layer (src/lib/status.ts), not the render layer — W1-T156 already shipped the render half, and it
    is currently stamping honesty over a projection that does not yet provide it. board.ts needs no change: it
    declares 'Zero new business logic' and consumes projectPlan/deriveStatus verbatim.
    (i) MONOTONIC UNDER DARKNESS. When the batched gateway's fetch FAILS, the projection must KEEP each task's
        last-good status and mark it github_unobservable(since <t>) rather than recomputing it as absent. The
        distinction between a FAILED read and a genuinely ABSENT one already exists — W1-T119 shipped it
        (PRs #382 and #391 this evening), so this criterion CONSUMES that polarity rather than re-deriving it.
        Statuses move only FORWARD across an observation gap.
    (ii) LIVENESS BOUND. 'running' must require recent ledger activity (a heartbeat within N minutes, N a data
         threshold) OR an open PR. A dispatched row with no terminal verdict AND no recent activity renders
         unknown/orphaned.
    NOTE THE RENDER HALF IS ALREADY DONE and must not be rebuilt: W1-T156 (PR #398, merged) ships the visible
    'GitHub unreachable since <t> — statuses may be stale' stamp keyed off the projection's signal. This task
    supplies the signal that stamp is keyed off. VERIFY from source which of github_unobservable's plumbing
    already exists after #398 before writing any of it — distrust this note.
    DO NOT amend W1-T155 to remove these criteria. It is merged and terminal, and per rule 16 nothing is dropped.
    The correct end state is that W1-T155 retains them for the record and this task delivers them.
  acceptance:
    - claim: "GitHub-unobservable is a MARKED state, never a silent downgrade — a gateway-fetch FAILURE never regresses a credited task to queued (statuses are MONOTONIC under darkness); it keeps the last-good status marked unobservable"
      proof: "unit test: with the batched gateway's fetch FAILING (throttled/errored — distinguished from genuinely ABSENT per W1-T119/W1-T130's cannot-observe polarity), the projection KEEPS each task's LAST-GOOD status and marks it github_unobservable (since <t>); a merged/credited task does NOT regress to queued on the fetch failure — statuses only move FORWARD across an observation gap. FALSIFIER: a merged/credited task rendered queued during a gateway outage FAILS (the 12:58 fail-open where every task read queued with empty PR cells)"
    - claim: "in-flight 'running' has a LIVENESS bound — a dispatched row with no terminal verdict AND no recent activity is unknown/orphaned, never running"
      proof: "unit test: 'running' requires recent ledger activity (a heartbeat within N minutes, N a data threshold) OR an open PR; a dispatched row with no terminal verdict AND no recent activity renders 'unknown/orphaned', NOT running — the W1-T1 crash-era spin-loop orphan rows (dispatched, no terminal verdict, ledger-only join) classify as unknown, not in-flight (the falsifier: an orphaned dispatch rendered as running, the 12:58 W1-T1='running' reading)"
