- id: W1-T209
  title: "the ledger grows unbounded with no archival, and any rotation that hides a decision-relevant line silently zeroes the dispatch breaker it also backs"
  repo: remudero
  depends_on: [W1-T206]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "RECON R-9, coupled to R-16. Measured during intake: state/ledger.ndjson is 9,455,694 bytes and
    growing, with no rotation mechanism anywhere in src, scripts or bin, and no newsyslog entry. This is the
    same file whose SIZE drove W1-T187 projection cost from 58.7s to 0.189s once it stopped being re-read per
    task - so growth here is not merely disk, it is latency in the operator console.
    THE TRAP THAT MAKES THIS NOT A ROUTINE ROTATION: the ledger is simultaneously the audit log and the
    backing store for the dispatch circuit breaker and for sweep dedup. readLedgerLines returns [] for an
    absent file (status.ts:371-372) and the breaker has no floor and no persisted counter, so a naive
    rotation that moves old lines out of the reader's view resets every breaker to zero. Rotating this file
    carelessly re-arms the exact redispatch-storm the breaker exists to stop - roughly 130 dispatches on one
    task in the W1-T1/W1-T29 incident.
    ALSO MEASURED, AND NOT IN THE REPORT: ad-hoc logs are accumulating in the same directory (t108.log,
    t115.log, t181.log, watch-274.log). Whatever policy lands should say what happens to those, even if the
    answer is that they are operator scratch and out of scope."
  design: |
    ROLL, BUT KEEP A DECISION TAIL. Archive old records to a dated roll, and keep a compacted DECISION TAIL
    that readLedgerLines still sees - the lines the breaker and dedup actually consult (dispatch, run.start,
    pr.opened, escalation, verdict and credit steps). Everything else is archivable. VERIFY from source
    exactly which steps are decision-relevant before choosing that set, and derive it from the consumers
    rather than from this note, because a step this note forgets is a breaker that silently resets.
    THE ACCEPTANCE TEST IS THE BREAKER, NOT THE FILE SIZE. A rotation that shrinks the file and passes is
    worthless if the breaker count changed. The load-bearing test asserts an INVARIANT ACROSS rotation: for a
    task with prior dispatch history, the breaker's answer is identical before and after.
    DEPENDS ON W1-T206 deliberately. That task decides whether an absent or unreadable ledger may report a
    zero count. Rotation is the operation most likely to produce exactly that state, so the read-side
    doctrine should settle first.
  acceptance:
    - claim: "the ledger exceeding a size ceiling with no archived roll present FAILS"
      proof: "unit test: test/ledger-rotation.test.ts"
    - claim: "THE BREAKER INVARIANT - for a task with prior dispatch history, the dispatch-breaker verdict is IDENTICAL before and after a rotation, so rotation cannot re-arm a redispatch storm"
      proof: "unit test: test/breaker-survives-rotation.test.ts"
    - claim: "a rotation that drops a decision-relevant line from the reader's view FAILS, with the decision-relevant step set derived from its consumers rather than hardcoded to a stale list"
      proof: "unit test: test/ledger-rotation.test.ts"
    - claim: "sweep dedup still suppresses a duplicate action after a rotation, so archival cannot cause a merged task to be re-credited or re-actioned"
      proof: "unit test: test/ledger-rotation.test.ts"
  risk: high
  origin: architect
  plan_refs: ["§12", "P29"]
  files: [src/lib/ledger.ts]
  status: queued
  attempts: 0
  note: "INTAKE FIXTURE #1, finding R-9 coupled to R-16, recon T5. Size measured at intake: 9,455,694 bytes.
    The recon's own framing is right that this must be breaker-safe, and that is the whole difficulty - a
    plain logrotate here is actively dangerous, not merely insufficient."
