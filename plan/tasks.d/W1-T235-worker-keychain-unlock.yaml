  verify: human
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "THE HAZARD WAS PRE-REGISTERED AND FIRED LIVE. worker-home.ts records the mechanism verbatim: the
    login keychain holds the Claude Code OAuth token and is HOME-relative, so under the redirected worker HOME
    'Claude Code exits Not logged in at $0 before any turn (W1-T18 spawn deadlock, verified live)'. FINDINGS.md
    records for WS-7 that 'the Keychain must be unlocked for the lookup to succeed', that 'no OAuth token is
    stored in a file (Keychain only)' - which closes the file-credential escape - and flags 'Keychain unlock
    under cold-boot launchd (no console login) is unverified ... a hard WS-7 chaos-drill gate'. LEARNINGS.md
    records the W1-T12e live-drill lineage that was never run.
    ON 2026-07-21 THE GATE FIRED. Two worker spawns died at 20:59:10Z and 21:15:00Z, verdict blocked_containment
    at $0, while the login keychain was locked. Proven by controlled repro on the same tree (0fd5db5) and the
    same binary: locked keychain yields text 'Not logged in - Please run /login', isError true, cost $0, one
    turn; unlocked yields a normal pass. The securityd state confirmed the lock held through the decisive run
    (post-run SecKeychainCopySettings returned 'User interaction is not allowed'), and no unlock event landed
    between the lock and the spawn. The stderr the incident discarded was recovered from the repro:
    'Claude Code returned an error result: Not logged in - Please run /login'.
    WHY IT LOOKED LIKE A CONTAINMENT FINDING. The credential-dead worker makes zero writes, so the containment
    probe sees no outside write, no inside write, and no OS-denial text, and renders the generic
    'containment UNPROVEN ... may never have been attempted'. That misdiagnosis cost two days of theory. Naming
    the credential failure distinctly is a SEPARATE task (the preflight-naming shard); THIS task removes the
    cause on the spawn path."
  design: |
    THE ACCEPTANCE IS NON-NEGOTIABLE: a headless worker spawn SUCCEEDS while the LOGIN keychain is LOCKED.
    Tonight's locked repro is the regression proof and must be scripted - lock the login keychain, spawn a
    worker, assert a normal result rather than 'Not logged in' at $0.
    DESIGN SPACE, implementer chooses WITH EVIDENCE, not from this note:
    (i) a DEDICATED always-unlocked worker keychain holding a copy of the 'Claude Code-credentials' item, with
    the harness unlocking it at daemon boot and the worker HOME pointing at it instead of the login keychain
    symlink. Smallest blast radius - the operator's login keychain and GUI session are untouched.
    (ii) a GUARANTEED login-keychain unlock at daemon boot. Simpler, but it unlocks the operator's real
    credential store as a side effect of running the fleet, which is a larger and more surprising blast radius.
    THE FILE-CREDENTIAL OPTION IS CLOSED. FINDINGS.md records no OAuth token is stored in a file - keychain
    only - so 'just read a creds file' is not available and must not be proposed. Verified this session:
    ~/.claude/.credentials.json does not exist under either HOME.
    VERIFY THE SYMLINK TRUTH FROM SOURCE before designing: worker-home/Library/Keychains/login.keychain-db is a
    single-inode symlink to the operator's real login keychain, so anything done to the worker path is done to
    the real one. A dedicated keychain (option i) is what breaks that coupling.
    SCOPE: THE SPAWN PATH ONLY. Distinct-naming of the failure (the preflight shard) and stderr persistence
    (the persistence shard) are filed separately and must not be folded in here.
    verify:human because the deliverable changes credential plumbing and a boot-time unlock, which an operator
    confirms live - the same reason the W1-T12e drill it descends from is human-verified.
  acceptance:
    - claim: "a headless worker spawn succeeds while the LOGIN keychain is LOCKED, scripted from tonight's locked repro as the regression proof"
