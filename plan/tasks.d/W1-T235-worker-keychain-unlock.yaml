    - claim: "the worker credential path does not require unlocking the operator's real login keychain as a side effect of running the fleet, OR if it does, that unlock is explicit and ledgered at daemon boot"
      proof: "unit test: test/worker-keychain.test.ts"
    - claim: "a locked-keychain spawn no longer renders as blocked_containment - it either succeeds or fails with a credential-named reason"
      proof: "unit test: test/worker-keychain.test.ts"
