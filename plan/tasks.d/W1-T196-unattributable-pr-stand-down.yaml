    THE ATTRIBUTION ABSENCE IS A DESIGNED PROPERTY: a plan-filing PR carries no Remudero-Task trailer because
    findMergedByTrailer would otherwise credit the filed task DONE on merge of its own filing. That rule is
    W1-T136 criterion 5 and is now enforced by the shared emitter merged in PR #437.
