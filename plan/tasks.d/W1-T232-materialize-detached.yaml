  note: "FILED 2026-07-21 from a hand-reproduced failure, not from a report. The collision was reproduced
    verbatim against a live PR branch and the two-step shape read at source.
    SUPERSEDES an earlier framing that blamed the bare catch alone. The catch is a real defect and is filed as
    W1-T233, but it is the SECOND defect: step 2 is what fails, and the catch is what makes the failure both
    silent and leaky."
