- id: W1-T232
  title: "review materialization checks out a branch it never needs, and that step is the only reason a held branch can keyword-only a review"
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 60.00
  rationale: "VERIFIED AT SOURCE 2026-07-21, run-task.ts:2716-2718. materializeReviewWorktree runs TWO git
    commands:
      git -C <repo> worktree add <path> origin/<branch>          - succeeds, leaves a DETACHED worktree
      git -C <path> checkout -B <branch> origin/<branch>         - THROWS when any worktree holds that branch
    Step 2 exists only to give the worktree a branch NAME. Proof execution reads files at the PR head tip,
    which the detached checkout from step 1 already provides.
    THE COLLISION IS ENTIRELY A CONSEQUENCE OF STEP 2, and it is not theoretical. Every operator-lane review on
    2026-07-21 posted keyword-only CAPPED because the session's own filing worktrees (f4a through f4e) held the
    very branches being reviewed. Reproduced by hand:
      fatal: 'plan/gate-worker-post-instruction' is already used by worktree at '.../worktrees/f4d'
    Five PRs then merged on that degraded evidence. Removing step 2 removes the class - not a workaround for
    it, not a detection of it.
    THE RUNG PATH NEVER SAW THIS because it executes inside the run's existing worktree and never materializes
    a second one. That is why the in-rung judge executed 2 of 6 proofs on PR 449 the same afternoon while every
    operator-lane review of the same period executed zero. Two paths, one of them carrying an unnecessary step."
  design: |
    DROP THE checkout -B. Materialize detached at the origin/<branch> tip and stop there.
    ADD A STALE-FETCH GUARD, because dropping the branch pin removes an implicit freshness check. After
    materializing, assert the checked-out tip equals the PR head SHA and FAIL LOUDLY on mismatch. Reviewing
    stale code silently is worse than not reviewing - a verdict against the wrong tree is a false verdict.
    PROVE DETACHED PARITY RATHER THAN ASSUMING IT. The third criterion executes a real proof in a detached
    materialization. If any part of the proof-execution path turns out to need a named branch, it must be named
    and fixed HERE. Deferring that would ship a change whose whole premise is unverified.
    THIS DOES NOT REPLACE THE TEARDOWN WORK. Residual failure modes remain after this - a failed fetch, a full
    disk, a permissions error - and each still leaks a worktree and still reports an opaque reason. That is
    W1-T233, filed alongside, and it is wanted even once this lands.
  acceptance:
    - claim: "materialization performs no branch checkout and yields a detached worktree at the PR head SHA"
      proof: "unit test: recorded git argv contains no checkout -B, worktree HEAD equals head SHA"
    - claim: "a review materializes and executes proofs while another worktree holds the PR's branch"
      proof: "unit test: seeded holding worktree, proofs execute, no CAPPED, no collision error"
    - claim: "detached parity - the proof-execution path performs no operation requiring a named branch, and any dependence found is fixed in this task rather than deferred"
      proof: "unit test executing a real proof in a detached materialization"
    - claim: "a tip mismatch after fetch fails materialization loudly rather than reviewing stale code"
      proof: "unit test: seeded stale origin ref, loud failure, no verdict posted"
  risk: medium
  origin: architect
  plan_refs: ["§5C"]
