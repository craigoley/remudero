  cited: "2026-07-15"

# ── A live-operator criterion is UNFIT for a headless worker (a NEW error class, W1-T9). Design
# interactive steps for no-TTY: flags + TTY-absent default; test via injected input. (DIAGNOSIS.md) ──
- id: no-live-operator-in-headless-worker
  subsystem: cli
  files: [src/lib/init.ts, src/run-task.ts, bin/rmd]
  fact: >-
    A criterion requiring live operator confirmation ("operator confirms", "user selects") is UNFIT for a
    headless worker — there is no TTY and no operator. W1-T9 burned its last ~15 turns on readline-repro
    scripts trying to conjure an operator that isn't there, then died error_max_turns. Redesign every
    interactive step for no-TTY: expose --tier/--yes-style FLAGS + a TTY-ABSENT SAFE DEFAULT (log the
    chosen value); prompt ONLY when process.stdin.isTTY. Test the non-interactive path via injected
    input / flags, never a live human. (MASTER-PLAN Standing rule 18.)
  src: DIAGNOSIS.md (diag/w1t9-max-turns), W1-T9
  cited: "2026-07-15"

