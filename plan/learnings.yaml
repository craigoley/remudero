# ── The daemon task bundled 3 concerns AND 3 headless-unfit criteria (W1-T12). Split logic (headless,
# unit-tested) from live commissioning (verify:human). (DIAGNOSIS.md diag/w1t12-max-turns) ──
- id: daemon-split-logic-from-live-commissioning
  subsystem: architecture
  files: [src/lib/daemon.ts, src/lib/launchd.ts, src/run-task.ts]
  fact: >-
    W1-T12 (the daemon) bundled THREE concerns (scheduler loop + launchd unit + crash-recovery) AND three
    HEADLESS-UNFIT criteria: a live OVERNIGHT drain, a launchctl-LOAD into a real session, and a live
    KILL-and-recover. A headless worker cannot verify launchd/boot/kill behavior — those are verify:human
    COMMISSIONING steps. Split the daemon into headless, unit-tested LOGIC (scheduler loop over an injected
    clock+runner; plist GENERATION + in-process boot assertion; recovery over a SEEDED interrupted state)
    and a separate verify:human live-commissioning task. The machine builds + unit-proves; the human
    commissions live (draft→playtest→ready). (Rules 16/18/19.)
  src: DIAGNOSIS.md (diag/w1t12-max-turns), W1-T12
  cited: "2026-07-15"

# ── Standing rules were enforced FORWARD-ONLY; W1-T12 pre-existed Rules 18/19 and slipped through to a
# worker. New rules must sweep the EXISTING open queue, not only govern new authoring. ──
- id: rules-must-sweep-the-existing-queue
  subsystem: process
  files: [plan/tasks.yaml]
  fact: >-
    Rules 18 and 19 already existed when W1-T12 ran, but were applied FORWARD-ONLY — nothing re-graded the
    already-authored queue against them, so a task that violated both (3 concerns at risk:medium + 3
    live-context criteria) reached a worker and burned 81 turns / $10.27 (the 4th max_turns event). A new
    sizing/fitness rule must RETROACTIVELY re-grade every open task; `rmd retro` sweeps the queue against
    every standing rule and files corrective tasks. A rule the queue is never swept against protects only
    tasks written after it. (MASTER-PLAN Standing rule 20.)
  src: DIAGNOSIS.md (diag/w1t12-max-turns), W1-T12
  cited: "2026-07-15"

# ── The runner was the FIRST line of task-quality defense, so 4 malformed tasks reached workers before the
# pattern was caught. Gate task quality BEFORE dispatch + re-grade continuously. (§5C) ──
- id: task-quality-gates-before-dispatch
  subsystem: architecture
  files: [src/lib/task-linter.ts, src/run-task.ts, src/lib/retro.ts]
  fact: >-
    The runner was the FIRST line of task-quality defense, so FOUR malformed tasks (W1-T6, W1-T9, W1-T12)
    reached workers and burned budget before a human noticed the pattern. Task quality must be gated BEFORE
    dispatch (a deterministic linter, FAIL-CLOSED: a linter-failing task is never dispatched,
    verdict=blocked_illformed) and re-graded continuously (the retro plan-health sweep). Reactive diagnosis
    after an 81-turn / $10 burn is the anti-pattern this project exists to kill — the runner is the LAST
    line, not the first. (MASTER-PLAN §5C.)
  src: W1-T12, this session
  cited: "2026-07-15"

# ── Most task-quality failures are catchable DETERMINISTICALLY — no LLM. Cheap checks first. (§5C) ──
- id: task-linting-is-mostly-deterministic
  subsystem: architecture
  files: [src/lib/task-linter.ts]
  fact: >-
    Most task-quality failures are catchable DETERMINISTICALLY with no LLM: criteria COUNT (sizing, Rule
    19), subsystem COUNT, forbidden live-context VERBS (headless-fitness lexicon, Rule 18 — overnight/
    launchctl/killed/"operator confirms"/...), and PROOF-SHAPE (observable proof, not a vibe). Reserve the
    Architect LLM review for genuine ambiguity ("is this really one concern?", "is a criterion secretly a
    task-inside-a-task?"). Cheap deterministic checks first; the LLM layer is advisory and does not block.
  src: W1-T12, this session
  cited: "2026-07-15"

# ── Control-surface hazards for an unattended daemon (fix/cli-safe-control-surface). ──
- id: control-surface-fail-loud-stop-one-shot
  subsystem: cli
  files: [src/run-task.ts, src/lib/fleet-control.ts]
  fact: >-
    An unknown CLI command / unrecognized subcommand fell THROUGH to launching a drain
    (`rmd daemon install --dry-run` silently ran the daemon and merged a task unattended),
    and STOP was a persistent latch that silently blocked every future `rmd drain` until
    manually cleared — both are unattended-daemon HAZARDS. A control surface must FAIL LOUD
    on bad input (unknown command/arg → print usage, exit non-zero, spawn NOTHING; validate
    flags BEFORE any spawn/lock), and STOP must be ONE-SHOT (auto-consumed on the halting
    run's terminal, and a no-op-that-warns when nothing is running) — distinct from PAUSE, a
    PERSISTENT hold cleared only by `rmd resume`.
  src: fix/cli-safe-control-surface (W1-T14/T15 incident)
  cited: "2026-07-15"

# ── How the daemon selects its repo (fix/daemon-repo-targeting; W1-T12d commissioning). ──
- id: daemon-repo-targeting-explicit
  subsystem: cli
  files: [src/run-task.ts, src/lib/launchd.ts]
  fact: >-
    `rmd daemon` originally read its plan from the CHECKOUT it ran in (join(repoRoot,
    plan/tasks.yaml)) and hardcoded the status gateway to ghGateway(owner, "remudero") — so an
    unattended run could only drain the main repo and would SILENTLY self-target. The daemon now
    takes an EXPLICIT target: --repo <name> scopes the gateway to <owner>/<name> and reads the
    plan from a synced clone (<root>/repos/<name>/plan/tasks.yaml, reset --hard to origin/main so
    it's current); --plan <path> overrides; --dry-run previews (spawns nothing, logs
    daemon.target). A SELF-TARGET GUARD refuses to drain the daemon's own source repo unattended
    without --allow-self-target. `rmd daemon-plist --repo <name>` bakes --repo into the launchd
    unit's ProgramArguments so the unit drains the intended repo, not an implicit default.
    (Task EXECUTION already derives its repo from task.repo via runTask — only the daemon's
    PLAN SOURCE + gateway were pinned.)
  src: fix/daemon-repo-targeting (W1-T12d)
  cited: "2026-07-15"

# ── Daemon commissioning gotchas, observed in the W1-T12d drill (chore/t12d-commissioning-record). ──
- id: daemon-launchd-keepalive-restart
  subsystem: platform
  files: [src/lib/launchd.ts, src/lib/daemon.ts]
  fact: >-
    The launchd unit runs the daemon with KeepAlive, so launchd restarts it on ANY exit — a kill-9
    (this is the crash-recovery path: restart re-derives merged state from GitHub and goes idle,
    reconstructOrphan W1-T12c handles a real in-flight orphan, NO duplicate task run) AND a clean
    exit. GOTCHA: a `--max N`-bounded daemon under KeepAlive RESTART-LOOPS — it drains N tasks,
    exits max_reached, launchd restarts it, it finds nothing runnable and logs daemon.idle, exits,
    restarts… (observed in commissioning: 3 daemon.start lines, the 2nd/3rd immediately idle). For a
    real unattended daemon run WITHOUT --max (persistent poll loop); use --max/--dry-run only for a
    bounded manual drill, and expect KeepAlive to bring it back. Plist path:
    ~/Library/LaunchAgents/com.remudero.daemon.plist; commission with `launchctl load <path>`.
  src: chore/t12d-commissioning-record (W1-T12d, 2026-07-15)
  cited: "2026-07-15"
