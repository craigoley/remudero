raw: "RUN-LANE PROSE PROOFS CANNOT SELF-MERGE — an implement/fix task whose plan
  acceptance proofs are PROSE (not executable dialect) opens a PR whose OWN
  orchestrator review keyword-matches and FAILS/CAPs, so it can never
  auto-merge; every such task requires a manual, SEPARATE executable-dialect
  proof-rewrite plan PR (Standing rule 15 forbids the impl PR editing its own
  criteria) plus a re-review. Observed repeatedly 2026-07-23: W1-T245/#651 (5
  prose proofs → 0/5 executed → split into #656+#657), W1-T173/#660 (2 prose
  proofs → FAIL → #661). The worker WRITES correct tests; only the PLAN's proof
  lines are unrunnable. ROOT FIX (the highest-leverage automation unblock this
  session): the Architect/triage plan-authoring path must emit
  EXECUTABLE-dialect proofs — 'unit test: <plain test-name substring>' or 'unit
  test: test/<file>.test.ts', plain substrings with no regex-special chars (the
  escaped-regex floor, fb-1784821500625-cdcf8b) — at MINT time, so a task is
  born gate-passable. Interim: the run orchestrator could, on a
  keyword-only/CAPPED verdict where the diff added tests, auto-open the split
  proof-rewrite plan PR itself instead of exhausting strikes.
  Supersedes/sharpens fb-8d739e with the run-lane self-merge angle and the
  rule-15 split requirement."
