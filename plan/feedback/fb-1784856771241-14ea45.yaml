  DECISIONS.md preserve-and-diff case per W1-T191, then ff-pull — refusing only
  on true divergence. Sibling of fb-1784826522421-1d57e9 (the bridge sweep stops
  the feedback-dupe accumulation at its source) and of the paramedic doctrine: a
  recipe the operator types twice is a spec."
