  fleet; the supervisor's staleness comparison (fb-6635d1's booted-SHA fix)
  reads the install checkout; daemon exhaust routes to state/ outside any repo
  tree so the install tree is clean by construction. ACCEPTANCE: arbitrary
  operator dirt in ~/Remudero/remudero has zero effect on daemon restart,
  dispatch, or deploy; a launchd restart with any operator-tree state comes up
  healthy; proven by test where feasible and by a documented live drill where
  not."
