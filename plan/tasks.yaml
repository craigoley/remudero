      proof: "unit test over a RECORDED stream fixture containing a compaction event: the detector emits a compaction ledger line + quality_suspect=true on the verdict"
    - claim: "the goal, acceptance criteria, and hard constraints are re-injected VERBATIM after compaction"
      proof: "fixture/transcript: after a compaction event the anchored block reappears byte-identical (not summarized) in the continued prompt"
  risk: high
  origin: architect
  note: "Redesigned (Rules 18/20): compaction-event DETECTION + the VERBATIM re-anchoring are provable from
    a RECORDED stream fixture (verify:auto). The LIVE half — 'a real forced-compaction run' driven past the
    threshold — moves VERBATIM to W1-T12e (operator-golden). Semantics preserved: detection + anchoring hold
    on the recorded stream; the live run confirms the threshold fires in practice."
  status: queued
  attempts: 0

