# Remudero — plan/tasks.yaml (schema v1)
# WS-1: proto-runner → daemon. T1 is the LAST hand-built thing; T2+ land VIA the proto-runner (L1).
# Prompts are pre-authored (G-2). STATUS IS DERIVED FROM GITHUB — this file is never machine-rewritten.
#
# STATUS MODEL (MASTER-PLAN v2.1, implemented in lib/status.ts):
#  - `status:` is DECORATIVE / initial-state only. The runner NEVER writes it back. Real merge-state is
#    DERIVED FROM GITHUB by deriveStatus(taskId), in precedence: (a) the ledger `pr.opened` line for the
#    task -> that PR's state; (b) an explicit `pr:` field here (hand-executed, pre-ledger tasks); (c) a
#    merged PR whose body carries the trailer `Remudero-Task: <id>`. Projection cached to state/status.json.
#  - A YAML round-trip would destroy these comments and a machine writer would race the human editor —
#    conflict classes we simply do not have by never writing status back.
#
# budget_usd is a RUNAWAY TRIPWIRE, not an allowance. It exists to catch a worker in a loop, not to
# ration honest work. On subscription these dollars are NOTIONAL (an API-equivalent meter, not billed
# spend — MASTER-PLAN §9). Window pressure (the real limit) is managed by the HeadroomTracker (W1-T4),
# never by per-task dollar caps. Do NOT lower these to "save money" — you will kill good work and save
# nothing. Set at 100.00 (an order of magnitude above any observed task) so the cap only fires on
# pathology. W1-T3 died blocked_budget at $3.57/36 turns against a GUESSED $4 cap — still working, not
# looping. That is a limit set NEAR the work's cost acting as a WORK LIMIT; the same bug as maxTurns
# (PR #8), one field over.
#
# BINDING RULES for every task below (injected into every rendered prompt):
#  - DISTRUST THE PROMPT OVER THE INSTALLED VERSION. Read the installed schema/types. Two tasks running,
#    two prompt errors caught this way (WS-0: allowedDomains nesting; W1-T1: the SDK schema is $loose and
#    silently strips unknown keys). This document can be wrong too.
#  - tdd: strict => the REPORT must paste RED->GREEN proof (failing test output, then passing).
#  - Fresh worktrees have NO node_modules: npm ci in the worktree before typecheck/test.
#  - git push WITHOUT -u inside worktrees (shared .git/config is outside the sandbox write scope).
#  - Never merge a PR to remudero whose required checks are not green (W1-T1B).
#  - A blocked worker ADDS the missing work or ESCALATES; it NEVER edits acceptance criteria to match its
#    diff, and NEVER lowers budget_usd (Standing rules 15 / §9 tripwire doctrine).
#
# `satisfied_by: <PR url or #N>` on an acceptance criterion (schema, honored by judgeReview): the
# deterministic judge treats that criterion as MET, citing the PR as proof — for a criterion an EARLIER
# merge already satisfied (the reviewer judges diff+report, never repo state, so it is otherwise
# unsatisfiable by a later PR). ★ BINDING: `satisfied_by` may ONLY be set by a human/Architect in a
# plan-only PR. A WORKER adding `satisfied_by` to its own blocking criterion IS "editing the criteria to
# match the diff" (Standing rule 15) — a FAILED task. The reviewer rubric flags any diff that adds
# `satisfied_by` to this file unless the PR is plan-only and human-authored (W1-T3E). W1-T3F replaces this
# manual patch with real OBSERVATION (the reviewer runs the proof's test/grep on the PR head).
#
# `origin:` and `plan_refs:` (task-level, ARCHITECT-ONLY — same rule as satisfied_by): PROVENANCE FOR THE
# PLAN, not just for prompts (Standing rule 17). Every task cites WHY it exists — a task with no origin is
# an orphan and cannot be trusted to reflect anyone's intent.
#   origin:    feedback#<F-id> | retro#<R-id> | architect | human   (who/what caused this task to exist;
#              `architect` = added by an Architect plan PR, the default for a hand-authored task)
#   plan_refs: ["§8A", "§5"]   (the plan sections this task implements/changes)
# These are DECLARATIVE metadata (loadPlan tolerates them; consumed by `rmd trace`, W1-T43). ★ BINDING:
# only a human/Architect sets them, in a plan-only PR — a worker adding `origin:` to justify its own diff
# is the satisfied_by violation, one field over (Standing rule 15/17).
#
# `risk:` (low | medium | high; default medium) is the SECOND axis of the mount routing table (§9): the
# runner resolves resolveMount(task.type, task.risk) → {model, effort, max_turns} at spawn (never a
# hardcoded literal — the W1-T6 defect, DIAGNOSIS.md). HIGH marks schema/ledger/telemetry/CI/containment-
# cutting tasks that run long (e.g. W1-T6 needed >61 turns → implement.high = 120). Set by the Architect.
#
# ★ KICK ORDER (post-WS-1, SECURITY-FIRST — rule-20 sweep, operator-directed; mirrors NET STATE):
#   security tiers (W1-T24 ci-gate → W1-T23 scanners) → plan-health (W1-T20c/d, W1-T20) →
#   quality/architecture (W1-T25/T26/T28) → W1-T27 → W2-T2 fleet dry-run; fleet-ops (§5D, W1-T54–T57)
#   fold in alongside. nextRunnable (drain.ts) is DECLARATION-ORDERED, but the remudero queue is
#   operator-kicked (the daemon drains the sandbox), so this is the authoritative kick guide, NOT a
#   physical reordering of the entries below (a contiguous block-move can't produce this interleaving).

- id: W1-T121
  title: QUEUE GOVERNOR — a WIP limit on DISPATCH only; flow control throttles intake, never drainage
    (the 23-open-PR incident)
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'Filed from #271 holding-note item 3. No backpressure exists anywhere in the pipeline, so

    authoring rate converts DIRECTLY into queue depth with nothing to arrest it — the 23-open-PR

    incident. Little''s law is the argument: throughput comes from bounding WIP, not from pushing

    harder on intake.


    CORROBORATION, the governor''s thesis run by hand: with the dispatcher DOWN and only the sweep

    loop running, the queue drained 23 -> 14 open PRs in a single pass window; and on 2026-07-19,

    with dispatch again halted, the remaining ten drained to ZERO. Drainage is demonstrably

    healthy while intake is zero — the two halves are separable IN PRACTICE, not just in

    principle, which is exactly what makes a dispatch-only throttle safe rather than a stall.


    THRESHOLDS ARE POLICY DATA, NOT CONSTANTS, and the home already exists: SweepPolicy /

    DEFAULT_SWEEP_POLICY (src/lib/sweep.ts) is the repo''s declarative threshold table, whose own

    doc comment insists disposition is a function of observed PR state plus an exported

    SweepPolicy table and NEVER an ad-hoc check. The governor''s limit belongs in that table.'
  design: '(i) Add the WIP limit as a ROW in SweepPolicy/DEFAULT_SWEEP_POLICY — not a constant, not a

    flag read at a call site.

    (ii) The dispatch path consults it: at or above the limit, dispatch of NEW tasks is deferred.

    (iii) sweep / heal / arm / merge are UNGATED at any depth — the governor bounds what ENTERS

    the system and never what LEAVES it. This asymmetry is the whole design; a governor that also

    throttled drainage would deepen the very queue it exists to bound.

    (iv) A throttled pass is NOT silent: ledger `dispatch_deferred_wip` carrying the observed open

    count, so a quiet daemon is distinguishable from a throttled one.'
  acceptance:
  - claim: 'at the limit: zero dispatches, a dispatch_deferred_wip ledger line carrying the observed count,
      and sweep/heal/arm/merge in the SAME pass unaffected — proving the throttle hits intake only'
    proof: 'unit test: test/queue-governor.test.ts'
  - claim: 'below the limit: dispatch proceeds normally — the falsifier proving the governor is not simply
      off or always-on'
    proof: 'unit test: test/queue-governor.test.ts'
  - claim: changing the limit is a policy-data row edit with zero code change, the falsifier for whether
      this is really policy-data
    proof: 'unit test: test/queue-governor.test.ts'
  risk: high
  origin: architect
  plan_refs:
  - MASTER-PLAN#5C
  files:
  - src/lib/sweep.ts
  depends_on: []
- id: W1-T122
  title: PLAN SHARDING (plan/tasks.d/) — concurrent filings become conflict-free BY CONSTRUCTION, not
    by a wider merge window
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'Filed from #271 holding-note item 4. One file per task: plan/tasks.d/<id>.yaml. Two concurrent

    filings no longer share an EOF to collide on, so they CANNOT textually conflict.


    MEASURED EVIDENCE: the nine-PR appender train consolidated by #271. All 437 consolidated lines

    are pure appends to the SINGLE EOF of one file — exactly the collision surface. #206 and #214

    had auto-merge ARMED yet sat DIRTY, i.e. conflict-blocked on that shared EOF where auto-merge

    could never fire. Under sharding those two would have merged untouched and #271 would not have

    needed to exist.


    W1-T107 already solved this exact class ONE LINE AT A TIME (ci-gate REQUIRED array, one entry

    per line, so concurrent gate additions merge instead of conflicting). Sharding is the same

    insight at FILE granularity: it deletes the class rather than widening the window.'
  design: '(i) loadPlan globs plan/tasks.d/*.yaml and merges with plan/tasks.yaml during migration.

    (ii) FAIL on duplicate ids across shards — the uniqueness guard the single-file format gave

    for free must not be lost in the split.

    (iii) Every consumer (lint-plan, claims, status derivation) operates over the MERGED VIEW, so

    the change is invisible above loadPlan.

    (iv) NOT IN SCOPE: migrating the existing entries. That is a one-time codemod filed

    separately; this task must leave the current single-file plan loading unchanged so migration

    can be staged.'
  acceptance:
  - claim: two branches each adding a DIFFERENT shard merge with zero textual conflict — the whole point,
      proven by a real two-branch merge rather than asserted
    proof: 'unit test: test/plan-sharding.test.ts'
  - claim: a duplicate id across two shards fails loadPlan, preserving the uniqueness guard the single-file
      format gave for free
    proof: 'unit test: test/plan-sharding.test.ts'
  - claim: the existing single-file plan/tasks.yaml still loads unchanged — the back-compat lock that
      lets migration be staged
    proof: 'unit test: test/plan-sharding.test.ts'
  risk: high
  origin: architect
  plan_refs:
  - MASTER-PLAN#5C
  files:
  - src/lib/plan.ts
  depends_on: []
- id: W1-T155
  title: "live-state DATA — the board projection exposes the FULL status taxonomy (in-flight+phase, blocked, needs-human, armed-awaiting-merge) + startedAt/elapsed, joined from the ledger run state"
  repo: remudero
  depends_on: [W1-T139]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "The board projection today collapses to merged/queued. The overhaul's NOW section (W1-T153) needs the
    FULL status taxonomy — in-flight WITH phase (recon/implement/review/fix-rung), blocked, needs-human,
    armed-awaiting-merge — plus startedAt/elapsed joined from the ledger run state. DATA BEFORE PIXELS: this is the
    prerequisite DATA half of the live-state layer; the UI half is W1-T156. It is the prerequisite for W1-T153's NOW
    (this task is added to W1-T153's depends_on)."
  design: |
    Extend StatusProjection (status.ts) / computeBoardSnapshot (board.ts) to expose the full taxonomy per task +
    startedAt/elapsed: derive the in-flight PHASE from the ledger run-state events (run.start + phase markers
    recon/implement/review/fix-rung), armed-awaiting-merge from the PR auto-merge state the batched gateway already
    holds, needs-human from the open escalation, blocked from the derived block. Preserve the board-fix invariant:
    ZERO extra GitHub calls (the batched gateway serves it). DARKNESS IS MARKED, NEVER A SILENT DOWNGRADE (console
    regression 12:58: a gateway rate-limit failed the fetch and the projection FAIL-OPENED — every task read queued,
    PR cells empty — the W1-T119/W1-T130 throttled-vs-absent polarity bug in the board): on a gateway-fetch FAILURE
    the projection KEEPS each task's last-good status marked github_unobservable(since <t>); statuses are MONOTONIC
    under darkness (never regress credited->queued on an observation failure). LIVENESS BOUND on in-flight: 'running'
    requires a recent ledger heartbeat (within N minutes) OR an open PR — a dispatched row with no terminal verdict
    and no recent activity is 'unknown/orphaned' (the W1-T1 crash-era ledger-only orphans), never running. VERIFY
    StatusProjection's current shape, the ledger phase/run-state events, the gateway's failure signal, and how the
    batched gateway exposes armed/merge state from source first (distrust note).
  acceptance:
    - claim: "the projection exposes the FULL status taxonomy per task, not just merged/queued"
      proof: "unit test: a projection over a fixture where tasks are in-flight (phase recon/implement/review/fix-rung), blocked, needs-human, armed-awaiting-merge, merged, and queued yields the correct DISTINCT status for EACH; a task collapsed to merged/queued when it is actually in-flight-with-phase FAILS (the falsifier)"
    - claim: "in-flight tasks carry startedAt + elapsed from the ledger run state, and the phase is the CURRENT one"
      proof: "unit test: an in-flight fixture with a run.start + phase events yields startedAt (the run.start ts) and the LATEST phase; elapsed derives from startedAt; a stale/earlier phase is not reported"
    - claim: "the taxonomy is derived with ZERO extra GitHub calls (the batched gateway serves it)"
      proof: "unit test over an injected counting gateway: computing the full-taxonomy projection over N tasks makes O(1) gateway fetches, not per-task — the board-fix (buildBatchedGithub) invariant preserved (the falsifier being O(N) calls)"
    - claim: "GitHub-unobservable is a MARKED state, never a silent downgrade — a gateway-fetch FAILURE never regresses a credited task to queued (statuses are MONOTONIC under darkness); it keeps the last-good status marked unobservable"
      proof: "unit test: with the batched gateway's fetch FAILING (throttled/errored — distinguished from genuinely ABSENT per W1-T119/W1-T130's cannot-observe polarity), the projection KEEPS each task's LAST-GOOD status and marks it github_unobservable (since <t>); a merged/credited task does NOT regress to queued on the fetch failure — statuses only move FORWARD across an observation gap. FALSIFIER: a merged/credited task rendered queued during a gateway outage FAILS (the 12:58 fail-open where every task read queued with empty PR cells)"
    - claim: "in-flight 'running' has a LIVENESS bound — a dispatched row with no terminal verdict AND no recent activity is unknown/orphaned, never running"
      proof: "unit test: 'running' requires recent ledger activity (a heartbeat within N minutes, N a data threshold) OR an open PR; a dispatched row with no terminal verdict AND no recent activity renders 'unknown/orphaned', NOT running — the W1-T1 crash-era spin-loop orphan rows (dispatched, no terminal verdict, ledger-only join) classify as unknown, not in-flight (the falsifier: an orphaned dispatch rendered as running, the 12:58 W1-T1='running' reading)"
  risk: high
  origin: architect
  plan_refs: ["§7", "§9"]
  files: [src/lib/status.ts, src/lib/board.ts]
  status: queued
  attempts: 0
  note: "DATA half of the live-state layer (layer 1). Prerequisite for W1-T153's NOW section — added to W1-T153's
    depends_on so the DAG orders it first. Sibling W1-T156 (UI+trust half). Preserves the board-fix O(1) invariant."

- id: W1-T110
  title: "rmd inbox — the ratification inbox's deterministic core: Architect-drafted candidates + a rule-2 readiness predicate; deferred-with-trigger is never recommended (ratifies P25 i)"
  repo: remudero
  depends_on: [W1-T20c]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Ratifies P25(i), operator-requested by name and now forced by the daemon commissioning:
    the machine generates decisions on a five-minute cadence while ratification rides a chat ledger. The
    field's 2026 finding is that approval controls fail by FATIGUE — reflexive approval is a documented
    clickthrough vulnerability, and the cure is risk-tiering plus surfacing only what is genuinely
    actionable [research: hitl-approval-fatigue-2026]. This task is the tiering: only READY proposals
    ever surface, readiness is computed not asserted, and a proposal whose trigger has not fired is
    DEFERRED-WITH-TRIGGER, never recommended (the dead-consumer discipline, now code)."
  design: |
    (a) DRAFT RUNG: for each ACTIVE proposal, a bounded Architect worker drafts the candidate
    ratification — a tasks.yaml fragment + the stamp line — cached (state-side, never committed) and
    invalidated when main moves past the proposal's evidence anchors. Drafting is the LLM's job;
    everything after is deterministic.
    (b) READINESS PREDICATE (rule 2, policy-as-data): READY = drafted tasks' deps all merged
    (deriveStatus, corrections-supreme) AND the proposal's cited evidence anchors still grep-true on
    main AND the drafted set passes rmd lint-plan AND no open conflicting proposal. Otherwise
    DEP-UNMET / EVIDENCE-DRIFTED / DEFERRED-WITH-TRIGGER (a named unfired trigger, e.g. P19@WS-2),
    each with the failing predicate named.
    (c) rmd inbox renders the classification with the drafted tasks attached to READY items — the
    reasoning rides with the recommendation, never a bare ask.
  acceptance:
    - claim: "the four-state fixture classifies correctly and only READY carries a draft"
      proof: "unit test over injected deps: a seeded proposal set {ready, dep-unmet, evidence-drifted, deferred-with-trigger} -> exactly one READY with its lint-clean draft attached; each non-ready names its failing predicate; the deferred item names its trigger and is never marked recommended"
    - claim: "readiness is deterministic and draft-cache invalidation is anchor-keyed"
      proof: "unit tests: the predicate runs with the LLM stubbed out entirely; moving a fixture anchor flips READY -> EVIDENCE-DRIFTED and marks the cached draft stale"
    - claim: "a draft that fails lint-plan is not READY"
      proof: "unit test: a drafted fragment with a live-verb proof -> lint violation -> DEP state reported as draft-unclean, not surfaced as READY"
  risk: high
  origin: architect
  plan_refs: ["P25", "§7", "§2"]
  files: [src/lib/inbox.ts, src/run-task.ts]
  status: queued
  attempts: 0

- id: W1-T111
  title: "rmd approve / rmd reframe — one bit ratifies through the gate, feedback redrafts through the ledger; approve-rate is telemetry (ratifies P25 ii-iv)"
  repo: remudero
  depends_on: [W1-T110, W1-T8]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Ratifies P25(ii)-(iv). The operator's requirement verbatim: 'just request a thumbs up on
    each to agree, or a way to provide feedback to reframe/replan the item.' Intent stays separated from
    execution: the bit INITIATES a plan PR that rides the full gate — rule 15's human-initiation
    preserved, audit and revert first-class [research: hitl-approval-fatigue-2026]. And because the
    field's failure mode is the rubber-stamp queue, the approve/reframe ratio is LEDGERED telemetry —
    a sustained approval rate near 100% is a signal the readiness triggers are too loose, surfaced in
    the retro, not discovered in a postmortem."
  design: |
    (ii) rmd approve <P##>: valid only for READY items; opens the plan PR carrying W1-T110's pre-drafted
    lint-clean tasks + the RATIFIED stamp; ledgers ratify.approved. The gate reviews; auto-merge lands
    it; nothing auto-files without the bit.
    (iii) rmd reframe <P##> --feedback "<text>": ledgers ratify.reframed with the feedback verbatim;
    invalidates the draft; the next inbox pass redrafts WITH the feedback in the Architect prompt —
    the reframe history rides the proposal until resolution.
    (iv) TRANSPORT v1: READY items surface through the existing digest + escalate with numbered options
    (approve / reframe / defer) — no new UI; the §7 panel and WS-6 MCP upgrade the surface later.
    Escalation dedup discipline applies (one open item per proposal).
    TELEMETRY: the retro gather reports approve/reframe counts and the running approval rate.
  acceptance:
    - claim: "approve on a READY fixture produces exactly ONE plan-PR payload carrying the draft + stamp, and a ledger line; approve on a non-READY refuses naming the state"
      proof: "unit test over injected git/gh deps: one branch, one PR call, payload deepEquals the cached draft + stamp; dep-unmet fixture -> refusal, zero PR calls"
    - claim: "reframe ledgers feedback verbatim, invalidates the draft, and the redraft prompt carries it"
      proof: "unit test: reframe fixture -> ratify.reframed with the text; next draft-rung invocation's rendered prompt contains the feedback; no PR opened"
    - claim: "the approval-rate telemetry lands in the retro"
      proof: "unit test: a seeded ledger with 3 approvals + 1 reframe -> the retro report carries 75% with both counts"
  risk: high
  origin: architect
  plan_refs: ["P25", "§7", "§4"]
  files: [src/lib/inbox.ts, src/run-task.ts]
  status: queued
  attempts: 0
  note: "Named consumers already filed: W1-T105's follow-up candidates and the retro's minted proposals
    flow here. P26's issue-reaction transport is the roadmapped upgrade."

- id: W1-T153
  title: "console shell UX overhaul — replace the flat file-order table with operator-priority sections + a real design system (dark, phone-first, CI-dashboard quality)"
  repo: remudero
  depends_on: [W1-T139, W1-T140, W1-T141, W1-T110, W1-T155]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Operator verdict on the v0 shell: functionally correct, experientially POOR. The board is a flat
    file-order table with browser-default styling. Replace it with an operator-priority INFORMATION ARCHITECTURE and
    an actual DESIGN SYSTEM — the quality bar of a good CI dashboard, not a debug page. The operator's primary glance
    device is an iPhone over tailnet, so phone-first responsive + dark theme are load-bearing, not polish."
  design: |
    INFORMATION ARCHITECTURE (top to bottom, file order appears NOWHERE): (1) NOW — in-flight runs with live phase
    (recon/implement/review/fix-rung) + elapsed; (2) NEEDS ME — needs-human escalations + pending inbox items
    (W1-T110), each a one-line ask + an action affordance; (3) UP NEXT — the drain head (first ~5 runnable tasks in
    drain order), linking into W1-T140's preview/curation; (4) RECENT — last ~10 merges/blocks with PR links + the
    W1-T141 rundown; (5) everything else COLLAPSED behind grouped counts (queued: N, merged: N) with expand +
    filter/search. DESIGN SYSTEM: status color semantics (running/blocked/needs-human/merged/queued), monospace ids,
    readable density, dark theme (default or auto via prefers-color-scheme), phone-first responsive (390px iPhone ->
    1440px). Structure the CSS/layout for CHEAP revision — the operator is the design judge and a taste iteration
    loop is expected. FLEET-CONTROL READ-BACK: the control panel READS the current fleet mode from the fleet-control
    state (isPaused/isStopped/isQuietHours) and renders the active mode's control active/disabled so controls reflect
    state (not stateless buttons that invite discovery-by-actuation — the operator asked "should I try clicking
    start?", which on STOP is destructive); STOP carries an explicit confirm step. VERIFY where the console frontend
    actually lives (renderShellHtml in serve.ts vs the apps/dashboard React app) and the fleet-control read predicates
    from source before choosing the home (distrust this note). a11y/screenshot mechanism per W3-T7 (design-review
    skill) / the arcade-fleet Lighthouse pattern.
  acceptance:
    - claim: "the five operator-priority sections exist and order top-to-bottom (NOW, NEEDS ME, UP NEXT, RECENT, then everything-else collapsed); file order appears NOWHERE"
      proof: "a DOM/structure test over the rendered console asserts the five sections in that exact order — NOW (in-flight runs w/ phase+elapsed), NEEDS ME (escalations+inbox w/ one-line ask+action), UP NEXT (first ~5 drain-order runnable, linking W1-T140), RECENT (last ~10 merges/blocks w/ PR links + W1-T141 rundown), rest collapsed as queued:N/merged:N + expand/filter/search; no element renders tasks in raw plan/file order (the falsifier)"
    - claim: "state colors are distinct and consistent across the shell (running/blocked/needs-human/merged/queued)"
      proof: "a test asserts each of the five states maps to a DISTINCT, stable color token (CSS custom property/class) reused everywhere that state appears — no two states share a token, and no state uses an ad-hoc inline color (the falsifier being a duplicated/inline color)"
    - claim: "the shell is responsive at 390px and 1440px with NO horizontal scroll, dark theme default/auto"
      proof: "a headless-browser check renders the shell at 390px and 1440px and asserts scrollWidth <= clientWidth (no horizontal overflow) at BOTH widths; the dark theme is applied by default or via prefers-color-scheme"
    - claim: "Lighthouse accessibility >= 90 on the shell (the arcade-fleet house pattern), with screenshot artifacts attached to the PR"
      proof: "a Lighthouse (or equivalent headless a11y) run on the served shell scores accessibility >= 90 — paste the score; 390px + 1440px screenshot artifacts are attached to the PR for the operator's design review"
    - claim: "the control panel reads back the CURRENT fleet mode (running/paused/stopped/quiet-hours) and the active mode's button renders active/disabled — controls reflect state, never invite discovery-by-actuation"
      proof: "a test asserts the panel derives the mode from the fleet-control state (isPaused/isStopped/isQuietHours) and renders the active mode's control as active/disabled, visibly distinct from the others; a panel that renders IDENTICAL button states in paused vs running modes FAILS (the falsifier — the operator's 'should I try clicking start?' ambiguity)"
    - claim: "STOP requires an explicit confirm step — a destructive control is never a single click"
      proof: "a test asserts STOP requires an explicit confirmation before it POSTs /v1/control/stop; a single-click STOP that fires without a confirm step FAILS (the falsifier)"
  risk: high
  origin: architect
  plan_refs: ["§7", "§7B"]
  files: [src/lib/serve.ts, apps/dashboard/src]
  status: queued
  attempts: 0
  note: "Operator is the design judge; expect a taste iteration loop — structure CSS/layout for cheap revision.
    Mechanical proxies (sections+order, distinct state colors, responsive no-hscroll, a11y>=90) are the auto gate;
    the visual taste is the human loop over the attached screenshots. Sibling W1-T154 (first-paint perf). a11y +
    screenshot mechanism per W3-T7 / the arcade Lighthouse pattern."

- id: W1-T154
  title: "console first-paint — pre-warm the batched gateway at boot + skeleton/last-snapshot cache, so the first request is never cold; <2s first-paint-to-data at 183-task scale"
  repo: remudero
  depends_on: [W1-T153]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "The board-fix batched gateway made GET /v1/status O(1), but the FIRST request still pays the cold
