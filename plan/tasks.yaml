  rationale: "Ratifies P22's core. The pipeline is EDGE-TRIGGERED today — a verdict fires once and if its
    consumer is missing the PR strands (five instances this session). The reconciler is LEVEL-TRIGGERED
    [research: prow-tide-2017, level-triggered-reconciliation]: each daemon poll + on-demand rmd sweep
    re-derives EVERY open PR's disposition from observed state and takes the gated action. Third
    policy-gated ACT lane (§5D): dep lane W1-T54 · alert lane P20 · PR-pipeline, this."
  design: |
    Deterministic predicate (policy-as-data, rule 2) over each open PR's observed state:
    MERGEABLE (required contexts green, review success, unmerged) -> arm auto-merge (rule 3B; per-repo
