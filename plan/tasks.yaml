  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Extends W1-T29 plan-claims to KNOWLEDGE. Provenance decays: a fact pinned to SDK 0.3.209 must
    not keep being injected after the SDK moves. An entry MAY carry an `assertion:` (a command that must
    exit 0); CI runs them, and a FAILING assertion auto-QUARANTINES the entry as STALE so it stops being
    injected until re-verified. A learning that can no longer prove itself is not ground truth."
  design: |
    Add an optional `assertion:` (shell command, exit 0 = still true) to a learning entry. A CI job runs
    every assertion; a non-zero exit sets the entry lifecycle to quarantined/stale and NAMES it. The
    injector excludes quarantined entries. Re-verification (assertion passes again) restores it.
  acceptance:
    - claim: "CI runs each entry's assertion and a FAILING assertion auto-quarantines that entry"
      proof: "a deliberately-broken assertion turns the learnings-assertion CI job RED and quarantines its entry (lifecycle flips) — paste the red run naming the entry, then revert"
    - claim: "a quarantined entry is ABSENT from a rendered prompt"
      proof: "fixture test: an entry whose assertion fails is excluded from the injected learnings for a matching task, even though its files: glob matches"
