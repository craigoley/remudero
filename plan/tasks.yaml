    test file or test-name token, so the W1-T72 executor correctly refused to guess and the keyword floor
    was binding on a gate-cutting merge. W1-T72 is working AS BOUNDED; the gap is AUTHORING: a prefix
    that promises executability with an unresolvable payload produces permanent silent-ish degradation.
    The birth gate is the right home — new tasks' proofs become genuinely executable by construction,
    and floor_degraded becomes a legacy-only signal that W1-T73's mining tracks down."
