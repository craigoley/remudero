    exit path including errors (the W1-T115/W1-T131 withTempDir discipline), and the daemon's boot sweep reaps
    homes orphaned by ended runs. VERIFY worker-home.ts's current singleton construction, the exact symlink
    allowlist, and the spawn-time HOME wiring in worker.ts from source before editing (distrust this note).
