- id: W1-T19
  title: Promptsmith injects LEARNINGS — the READ side of the compounding thesis (PULLED FORWARD)
  repo: remudero
  depends_on: [W1-T3, W1-T3B, W1-T3C, W1-T3D, W1-T3E]
  type: implement
