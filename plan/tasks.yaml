# CLI self-freshness — the code-freshness half of the W1-T60 pair (W1-T60 self-syncs the PLAN; nothing
# self-syncs the CODE). Live incident #138: rmd correct existed on main but the operator's stale local CLI
# printed the OLD usage — the binary predated its own merge.
- id: W1-T79
  title: "rmd manages its own git — CLI self-freshness at entry (auto ff-pull when clean, refuse-with-command when not; the stale-binary class)"
  repo: remudero
  depends_on: [W1-T60]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "LIVE INCIDENT (2026-07-16, operator-reported): rmd correct existed on main (#138) but the
    operator's invocation printed the OLD usage and exited — run-task had just built the feature from a
    fresh origin/main worktree while the CLI executing locally predated its own merge. W1-T60 made rmd
    self-sync the PLAN (dispatch from the origin/main blob); nothing self-syncs the CODE. The operator
    should never be the freshness mechanism — 'rmd should be managing git for me' is the requirement,
    verbatim."
  design: |
    At CLI entry (every subcommand, before dispatch): compare local HEAD to origin/main (a fetch is
    already performed for dispatch paths per W1-T60 — reuse it; other subcommands fetch the same way,
    honoring --allow-stale semantics on fetch failure).
    CLEAN + BEHIND (ff-possible) -> git pull --ff-only automatically, print one line
      (### rmd self-sync: <old>..<new>), re-exec the CLI once (the freshly pulled code must be what
      runs — a pulled-but-stale process is the same bug wearing a fix; guard the re-exec with an env
      flag so it cannot loop).
    DIRTY or DIVERGED -> never mutate; refuse with the exact command to run and exit non-zero
      (the control surface never falls through on staleness, matching the bad-input doctrine).
    UP-TO-DATE -> zero output, zero added latency beyond the fetch already performed.
