    ci-gate -> BLOCKED, even though the code passed its review rounds. The daemon's review-fix-rung has no move
    for a commit-message/CI failure, so it burned both strikes and escalated (#304/#306) WITHOUT touching the
    real blocker. This is the W1-T136 class (a PR-emission path that never learned the grown gate stack) at the
