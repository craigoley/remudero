    session, whose reviews reported '1 criteria' for 3-claim bodies). parseAcceptanceBlock (src/lib/review.ts:820)
    collects consecutive BULLET lines and BREAKS on the first non-bullet line once bullets have begun. But the
    house body format is a multi-line pair — '- claim: \"...\"' then an INDENTED '  proof: \"...\"' (not a bullet)
