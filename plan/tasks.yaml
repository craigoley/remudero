- id: W1-T17
  title: Isolation preflight probe — fail closed before any task work begins
  repo: remudero
  depends_on: [W1-T1, W1-T1B, W1-T1D]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 3.00
  rationale: "PR #8's shell isolation works ONLY because `~/.bashrc` is absent on this host — an accident
    of the machine, not construction (LEARNINGS.md; FIELD FINDING 11b). On a machine with a populated
    `~/.bashrc` it would silently isolate NOTHING. Standing rule 11: isolation is PROVEN PER RUN by
    probe, never assumed from configuration. The runner must verify containment before it trusts it."
  design: |
    Before a run spawns its first task worker, spawn a read-only PREFLIGHT worker (or reuse the recon
    slot) that runs `alias | wc -l` (and `declare -F | wc -l` for functions). NONZERO ⇒ the worker
    inherited operator shell state ⇒ isolation is not holding ⇒ FAIL CLOSED: ledger a named error
    (e.g. isolation_preflight_failed with the observed count) and refuse to start task work. Zero ⇒
    proceed. The probe is the empirical backstop the config alone cannot provide.
  acceptance:
    - claim: "a nonzero alias/function count from the preflight worker aborts the run with a named error before task work"
      proof: "planted `~/.bashrc` containing an alias makes `rmd run-task` REFUSE to start; ledger shows
        isolation_preflight_failed with the observed count and NO implement.done line"
    - claim: "removing the planted ~/.bashrc lets the same run proceed past preflight"
      proof: "with ~/.bashrc removed, the same task reaches recon/implement; ledger shows preflight passed (count 0)"
    - claim: "the preflight worker is read-only"
      proof: "unit/transcript: no write tool used by the preflight worker"
  status: queued
  attempts: 0

- id: W1-T18
  title: General shell-isolation mechanism (OSS blocker — stop relying on an absent ~/.bashrc)
  repo: remudero
  depends_on: [W1-T1, W1-T1B, W1-T1D]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 4.00
  rationale: "CLAUDE_CODE_SHELL=/bin/bash isolates only because THIS machine has no ~/.bashrc; most OSS
    users have a populated one and would get zero isolation (FIELD FINDING 11b). Remudero cannot ship a
    fleet whose containment is an accident of the host. Need a mechanism that isolates regardless of the
    operator's dotfiles."
  design: |
    Investigate redirecting the worker's HOME to a scratch dir (e.g. <root>/worker-home) that holds ONLY
    Remudero-controlled empty rc files, with the things a worker genuinely needs symlinked back
    (~/.claude for OAuth, ~/.config/gh, ~/.gitconfig). WS-0 FIELD FINDING 11c proved the Keychain OAuth
    token resolves off USER, NOT HOME — but Claude Code ALSO reads ~/.claude/ under HOME; VERIFY end to
    end with a probe, do not assume. If HOME-redirection breaks auth or gh, record THAT as ground truth
    in LEARNINGS.md and state the fallback (e.g. per-run generated rc + CLAUDE_CODE_SHELL, or a wrapper
    shell). The deliverable is isolation that holds on a stranger's machine, proven by probe.
  acceptance:
    - claim: "a worker on a machine WITH a populated ~/.bashrc reports 0 aliases (isolation independent of operator dotfiles)"
      proof: "planted ~/.bashrc with an alias; live worker `alias | wc -l` = 0 AND the worker still
        authenticates (subscription OAuth) and can run gh"
    - claim: "if HOME-redirection breaks auth, that is recorded as ground truth with the working fallback"
      proof: "LEARNINGS.md gains a provenance-tagged line stating the outcome; the shipped mechanism is proven by probe either way"
  status: queued
  attempts: 0

