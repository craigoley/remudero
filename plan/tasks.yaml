    fetch FAILURE => a named ledger error (git_fetch_failed) and NO spawn — FAIL CLOSED — with an explicit
    `--allow-stale` escape hatch that proceeds on the last-fetched refs and ledgers stale_dispatch=true.
    Never `git pull`, never touch the working tree or local branch refs.
