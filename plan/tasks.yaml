# SPLIT (was one W1-T1C carrying four deliverables — violated one-concern-per-PR). Now two tasks:
#   W1-T1C = "the reviewer can JUDGE" — the review worker posts a verdict (NOT yet required).
#   W1-T1D = "the gate ENFORCES the reviewer" — protection requires it; verified live both ways.
- id: W1-T1C
  title: The reviewer can judge — a fresh-context REVIEW worker posts remudero-review
  repo: remudero
  depends_on: [W1-T1B]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Standing rule 4 says green checks are NOT evidence, yet today `merged` means only that CI
    passed — no one verifies the task's acceptance criteria. Build the JUDGE first, as a decoupled
    step that posts a commit status; enforcement is a separate concern (W1-T1D). Splitting lets the
    falsifier — does the reviewer actually FAIL a test-passing-but-acceptance-ignoring diff? — be proven
    as a UNIT FIXTURE before any live gate depends on it."
  design: |
    After ci goes green, a REVIEW worker (FRESH context — never the implementer's session; read-only
    tools + gh) reads: the PR diff, the task's acceptance criteria from tasks.yaml, and the implement
    worker's REPORT. It verdicts each criterion against its stated PROOF, then posts a commit status:
      gh api -X POST repos/{owner}/{repo}/statuses/{sha} -f context=remudero-review -f state=success|failure
    A criterion whose proof is missing, unpasted, or non-responsive = FAILURE. Test theater
    (assertions that assert nothing) = FAILURE. The reviewer may never edit code.
    This PR does NOT touch branch protection — remudero-review is posted but NOT required yet (W1-T1D
    does that). The verdict LOGIC is factored into a pure function so the falsifier is a unit fixture.
  acceptance:
    - claim: "a REVIEW worker with FRESH context posts remudero-review to the PR head commit after ci is green"
      proof: "gh api .../statuses/<sha> shows context=remudero-review with a state on a real PR"
    - claim: "FALSIFIER (unit fixture): a diff that PASSES tests while ignoring a stated acceptance
        criterion yields state=failure; test theater (assertions that assert nothing) yields failure"
      proof: "unit test over recorded fixtures: (criterion, diff, report) with an unmet proof -> the
        verdict function returns failure; a responsive+proven criterion -> success"
    - claim: "the reviewer never edits code (read-only tools + gh only)"
      proof: "worker settings/transcript show no write tool used; the PR head sha is unchanged by review"
  risk: medium
  origin: architect
  status: queued
  attempts: 0

- id: W1-T1D
  title: The gate enforces the reviewer — remudero-review becomes a REQUIRED status check
  repo: remudero
  depends_on: [W1-T1C]
  type: implement
  verify: auto
  principles: {tdd: encouraged}
  budget_usd: 100.00
  rationale: "W1-T1C makes a verdict VISIBLE; it does not make it BINDING. Today blocked_ci leaves
    auto-merge ARMED, so a runner-rejected PR can still land GitHub-side with no acceptance verdict.
    Root cause: the merge gate is a runner-side decision that can be raced. Fix: make BOTH checks a
    GitHub-enforced contract (Standing rule 3B) so the runner's exit verdict becomes advisory telemetry
    that cannot diverge from reality, and auto-merge is safe to leave armed permanently."
  design: |
    Add `remudero-review` to required_status_checks.contexts alongside `ci`. ORDERING (bootstrap, same
    pattern as T1B): this PR merges under the CURRENT gate (ci only); protection is updated to require
    remudero-review only AFTER it merges — state that in the REPORT. GitHub then merges a PR only when
    BOTH checks are green.
  acceptance:
    - claim: "protection requires exactly [ci, remudero-review]"
      proof: "gh api repos/craigoley/remudero/branches/main/protection --jq .required_status_checks.contexts"
    - claim: "a PR that is CI-GREEN but FAILS acceptance is NOT merged (verified LIVE)"
      proof: "planted probe: an implement worker that passes tests but ignores a stated acceptance
        criterion -> remudero-review=failure -> PR stays OPEN -> paste the status + PR state, then close"
    - claim: "a PR green on BOTH checks auto-merges with no runner-side merge call (verified LIVE)"
      proof: "ledger shows automerge.armed then pr.merged with no explicit merge command"
  risk: medium
  origin: architect
  status: queued
  attempts: 0

