# ── Golden / smoke tasks on the sandbox repo (WS-8 seeds at WS-0). These target
#    remudero-sandbox and drive the proto-runner's own proofs. `prompt`/`context`
#    are pre-authored (G-2); `context` claims MUST carry a [src] (provenance gate).
- id: SB-HELLO
  title: "Smoke: proto-runner appends a run-stamped hello line to sandbox docs"
  repo: remudero-sandbox
  depends_on: []
  type: implement
  verify: auto
  principles: {tdd: off}
  budget_usd: 2.00
  context:
    - claim: "remudero-sandbox is the golden-task target; proto-runner smoke markers live under docs/."
      src: "plan#W1-T1"
  prompt: >
    Append a single new line to docs/proto-runner.md (create the file if it does
    not exist) reading exactly: "proto-runner smoke — ${RUN_ID}". Change nothing else.
  acceptance:
    - claim: "proto-runner lands a docs line on remudero-sandbox via `rmd run-task SB-HELLO`"
      proof: "merged PR whose ledger line names SB-HELLO"
  status: queued
  attempts: 0
