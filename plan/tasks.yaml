    that changes remudero may merge without a green gate."
  acceptance:
    - claim: "PR workflow runs typecheck + full test suite on every PR to remudero"
      proof: "a green check-run on this task's own PR (gh pr checks)"
    - claim: "run-task REFUSES to merge a PR whose required checks are not green"
      proof: "a deliberately-red PR is left OPEN with verdict=blocked_ci in the ledger, never merged"
    - claim: "workers npm ci in the worktree before typecheck/test (a fresh worktree has no node_modules)"
      proof: "worker transcript shows npm ci, then tests passing IN the worktree"
  status: queued
  attempts: 0

