# Sibling of W1-T63: same hardcoded-turn-cap class, on the retro/architect spawn W1-T63 didn't cover.
# The retro can't currently open its own PR (walls at 40 turns -> empty branch -> gh-pr-create fails).
- id: W1-T64
  title: "Retro/architect spawn is mount-governed (the maxTurns:40 W1-T63 missed) + gh-pr-create guarded by commitsAhead"
  repo: remudero
  depends_on: [W1-T63]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
