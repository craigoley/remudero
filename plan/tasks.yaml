# ── KNOWLEDGE ARCHITECTURE & CONTEXT ECONOMY (MASTER-PLAN §8A/§8B). W1-T19 shipped the READ side, which
# makes the knowledge architecture load-bearing; these close its five holes. Context is a finite resource:
# smallest high-signal set, stable-first/volatile-last, compaction measured not assumed. ───────────────
- id: W1-T33
  title: Knowledge SPLIT + INDEX + SUPERSESSION — a lookup, not a scan; superseded entries never inject
  repo: remudero
  depends_on: [W1-T19]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "MASTER-PLAN §8A Tier 1. One flat learnings file becomes a scan; split it into
    learnings/{platform,architecture,ci,testing,failures}.md with a GENERATED index (tag → file → entry
    ids) so injection is a LOOKUP. Entries gain a LIFECYCLE (active | superseded); a SUPERSEDED entry is
    NEVER injected — it stays for provenance only. Provenance decay is real: a fact can become FALSE."
  design: |
    Split the corpus into learnings/{platform,architecture,ci,testing,failures}.md (or the yaml mirror by
    section) + a generated INDEX mapping tag/subsystem/files -> file -> entry ids, so the Promptsmith does
    a lookup, not a full scan. Add a `lifecycle: active|superseded` field; the injector filters out
    superseded entries. Regenerate the index in CI (a stale index fails).
  acceptance:
    - claim: "the corpus is split by subsystem with a generated index and injection is a lookup keyed by tag"
      proof: "learnings/{platform,architecture,ci,testing,failures}.* exist; the generated index maps tag/files -> entry ids; a stale index FAILS CI (regenerate check) — paste the index + the check"
    - claim: "a SUPERSEDED entry is NEVER injected (live example: the false ZDOTDIR claim)"
      proof: "the entry claiming 'ZDOTDIR isolates worker shells' is marked lifecycle=superseded; a worker touching env.ts receives ONLY the CLAUDE_CODE_SHELL entry and NEVER the superseded ZDOTDIR one (fixture test over the rendered prompt)"
  risk: high
  origin: architect
  status: queued
  attempts: 0

- id: W1-T34
  title: SELF-VERIFYING LEARNINGS — an entry may carry an assertion; a failing one auto-quarantines it
  repo: remudero
  depends_on: [W1-T29, W1-T33]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Extends W1-T29 plan-claims to KNOWLEDGE. Provenance decays: a fact pinned to SDK 0.3.209 must
    not keep being injected after the SDK moves. An entry MAY carry an `assertion:` (a command that must
    exit 0); CI runs them, and a FAILING assertion auto-QUARANTINES the entry as STALE so it stops being
    injected until re-verified. A learning that can no longer prove itself is not ground truth."
  design: |
    Add an optional `assertion:` (shell command, exit 0 = still true) to a learning entry. A CI job runs
    every assertion; a non-zero exit sets the entry lifecycle to quarantined/stale and NAMES it. The
    injector excludes quarantined entries. Re-verification (assertion passes again) restores it.
  acceptance:
    - claim: "CI runs each entry's assertion and a FAILING assertion auto-quarantines that entry"
      proof: "a deliberately-broken assertion turns the learnings-assertion CI job RED and quarantines its entry (lifecycle flips) — paste the red run naming the entry, then revert"
    - claim: "a quarantined entry is ABSENT from a rendered prompt"
      proof: "fixture test: an entry whose assertion fails is excluded from the injected learnings for a matching task, even though its files: glob matches"
  risk: high
  origin: architect
  status: queued
  attempts: 0

- id: W1-T35
  title: CACHE-AWARE PROMPT ASSEMBLY — stable prefix first, volatile last; ledger cache tokens
  repo: remudero
  depends_on: [W1-T19]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "MASTER-PLAN §8A ordering rule. Caches key on EXACT PREFIX BYTES: any early edit invalidates
    the cache for everything after, and cache reads price at ~1/10th of fresh input [research]. Assemble
    prompts STABLE-FIRST (Tier 0 preamble) / VOLATILE-LAST (matched learnings), and ledger the cache tokens
    so a wrong ordering is MEASURABLE, not opinion."
  design: |
    Order the rendered prompt: stable Tier-0 preamble first, matched Tier-1 learnings last. Ledger
    cache_read_input_tokens + cache_creation_input_tokens from the result envelope on every worker.
  acceptance:
    - claim: "the prompt is assembled stable-first, volatile-last"
      proof: "a rendered-prompt test asserts the invariant preamble precedes the matched-learnings block; an early edit to the preamble is what would move, not the learnings"
    - claim: "cache tokens are ledgered (cache_read + cache_creation columns on every worker's ledger line)"
      proof: "unit/fixture test: a result envelope carrying cache_read_input_tokens + cache_creation_input_tokens is ledgered into named columns on the worker line"
  risk: medium
  origin: architect
  status: queued
  note: "Redesigned (Rules 18/20): the ASSEMBLY-ORDERING invariant + the ledger COLUMNS are fixture-provable
    (verify:auto). The LIVE cache-reuse observation — 'the second worker of a run shows cache reads > 0' —
    moves VERBATIM to W1-T12e (operator-golden). Semantics preserved: stable-first ordering is MEASURABLE
    via the ledgered cache tokens; a second real worker demonstrates the reuse."
  attempts: 0

- id: W1-T36
