- id: W1-T126
  title: DAEMON SELF-FRESHNESS — the daemon notices origin/main has advanced past its boot sha and restarts
    into the new code (five hand cycles in one weekend)
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'Filed from #271 holding-note item 7. Each poll, the daemon checks whether origin/main has

    advanced past the sha its PROCESS loaded — cheap: a fetch plus rev-parse against a sha

    recorded at boot. If stale: finish in-flight work, pull, restart into the new sha. A

    long-lived daemon is otherwise pinned to whatever code it booted with, and every pipeline fix

    merged after boot is invisible to the process that most needs it.


    EVIDENCE: five manual pull-and-reload cycles in a single weekend. Every merged pipeline fix

    was invisible to the running daemon until a human noticed and cycled it by hand.


    TRAP — THE RESTART SEMANTICS INVERT THE OBVIOUS IMPLEMENTATION. The service definition runs

    SuccessfulExit=false, which means a ZERO exit does NOT restart the daemon: a clean exit reads

    as ''job done''. So the intentional-restart path must exit NON-ZERO, or be re-kickstarted

    externally. Either way it must ledger daemon_selfrestart_for_freshness, because under

    SuccessfulExit=false an intentional restart and a crash-loop look IDENTICAL from the outside.

    This is the same edge already recorded from WS-1, where a --max-bounded daemon restart-loops.


    SIBLING: W1-T79 (CLI freshness) is the same staleness class in a different process; they

    should share one freshness check rather than grow two.'
  design: '(i) Record the boot sha at process start.

    (ii) Each poll: fetch and compare origin/main against it.

    (iii) If stale: let in-flight work COMPLETE (never abandon a run mid-flight), then restart —

    exiting NON-ZERO so the supervisor''s SuccessfulExit=false semantics actually restart it.

    (iv) Ledger daemon_selfrestart_for_freshness on the intentional path, so it is

    distinguishable in the record from a crash-loop.

    (v) Share the freshness predicate with W1-T79 rather than duplicating it.'
  acceptance:
  - claim: 'stale fixture (origin/main ahead of the boot sha): in-flight work completes, the restart is
      ledgered as daemon_selfrestart_for_freshness, and the next process records the NEW sha'
    proof: 'unit test: test/daemon-freshness.test.ts'
  - claim: 'current fixture (boot sha equals origin/main): NO restart — the falsifier proving the check
      reads the sha rather than restarting on a timer'
    proof: 'unit test: test/daemon-freshness.test.ts'
  - claim: the intentional restart exits non-zero and is distinguishable in the ledger from a crash-loop
      under SuccessfulExit=false semantics
    proof: 'unit test: test/daemon-freshness.test.ts'
  risk: high
  origin: architect
  plan_refs:
  - MASTER-PLAN#5C
  files:
  - src/lib/daemon.ts
  depends_on: []
- id: W1-T127
  title: 'STRIKE-ACCOUNTING INTEGRITY — a strike exists only where a worker RAN and a judgment was POSTED
    (the #212 fixture: 20h41m blocked on a strike that never happened)'
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'Filed from #271 holding-note item 8. Today an infrastructure failure can debit the strike

    budget without producing either a run or a judgment. A task can therefore exhaust its strikes

    and escalate to a human ON WORK THAT WAS NEVER ATTEMPTED.


    EVIDENCE — PR #212, and it is the fixture. The July-19 binary crash (the spawn-ENOENT /

    autoupdater-race class) debited budget and counted a strike with NO WORKER AND NO JUDGMENT.

    The escalation issue (#213) claimed ''fix strikes exhausted (2/2)'' while its own detail text

    said ''after 1 fix strike(s)''. Only one strike was ever judged; the second was fiction. The PR

    then sat 20h41m on that fiction — with all 16 CI checks GREEN and only remudero-review red,

    against code that was complete and correct from its first commit. When finally examined by

    hand the fix was BODY-ONLY: zero code changes. The entire block was accounting.'
  design: '(i) A strike is recorded ONLY on the conjunction (worker ran AND judgment posted). Assert

    both, never either.

    (ii) A spawn-infra failure (the blocked_toolchain class) increments NEITHER strikes NOR

    attempts-toward-escalation.

    (iii) Its cost line is tagged `infra`, not `task`, so budget forensics can separate ''this task

    was expensive'' from ''the host was broken''.

    (iv) The #212 replay is the regression lock, not an illustration.'
