  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "OWN CONCERN: review.ts REVIEWER judgment. The four rubric items and the reviewer goldens are
    one subsystem (the judge), distinct from parsers/permission-modes/linter. Two criteria here are
    already shipped on main (the PR #12 golden in #16, status-names-the-criterion in #20) and carry
