    the working tree. Worktrees continue to base on origin/main (now GUARANTEED fresh by the fetch). A
    fetch FAILURE => a named ledger error (git_fetch_failed) and NO spawn — FAIL CLOSED — with an explicit
    `--allow-stale` escape hatch that proceeds on the last-fetched refs and ledgers stale_dispatch=true.
    Never `git pull`, never touch the working tree or local branch refs.
  acceptance:
    - claim: "a run dispatches from origin/main's plan even when the working-tree tasks.yaml differs locally"
      proof: "injected-git unit test: local tasks.yaml modified; the loaded plan content equals the origin/main blob, and a fetch was issued before worktree.add"
