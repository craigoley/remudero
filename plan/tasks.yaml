- id: W1-T21
  title: Flight judge (Layer 2) — advisory LLM-as-judge on PROCESS, deterministic controller acts
  repo: remudero
  depends_on: [W1-T20]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "MASTER-PLAN §4B Layer 2. A Layer-1 tripwire invokes a FRESH-context judge that sees the
    goal, acceptance criteria, and the last N turns' TOOL CALLS AND RESULTS — never the worker's
    reasoning (the maker sees its trail; the verifier sees only behavior + rubric). It ADVISES; a
    deterministic controller ACTS (Standing rule 12). Judge rides a HIGHER tier than the worker (G-17)."
  design: |
    On a Layer-1 trip, spawn a fresh-context judge (read-only) with {goal, acceptance criteria, last N
    turns of tool calls + results}. It returns {state: productive|converging|spiraling|blocked|off_track,
    evidence[], recommendation: continue|nudge|halt_and_diagnose|escalate, confidence}. A DETERMINISTIC
    controller maps advice to action: spiraling+high-confidence -> halt + dispatch a DIAGNOSE worker
    (never a third blind patch, Standing rule 5); off_track -> halt + escalate; converging -> raise the
    tripped threshold ONCE, log, continue. Capped at K invocations per run; the Kth MUST decide, not
    defer. The judge NEVER edits code and NEVER merges. Tier invariant (judge.tier > worker.tier)
    asserted at load, same enforcement shape as mounts.yaml (W1-T5 / G-17).
  acceptance:
    - claim: "a PLANTED spiraling transcript (same edit reverted 4x) is classified spiraling and the controller HALTS + dispatches diagnose"
      proof: "fixture test: the reverted-4x transcript -> judge state=spiraling -> controller emits halt + a diagnose dispatch in the ledger, never a third blind patch"
    - claim: "a healthy slow transcript is classified converging and is NOT halted"
      proof: "fixture test: a slow-but-progressing transcript -> judge state=converging -> controller raises the threshold once and continues (no halt line in the ledger)"
    - claim: "the judge rides a higher tier than the worker, asserted at load"
      proof: "a config where judge.tier <= worker.tier is REJECTED at load with a named Tier-Invariant error (G-17)"
    - claim: "the judge is read-only and capped at K invocations per run"
      proof: "transcript/unit: no write tool used by the judge; a run that would exceed K forces a decision on the Kth call, not another deferral"
