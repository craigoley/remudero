- id: W1-T124
  title: POST-FIX RE-VERIFICATION — when a systemic fix merges, stale reds of that class self-heal instead
    of rotting (the drainage-side complement to the governor)
  repo: remudero
  depends_on:
  - W1-T123
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'Filed from #271 holding-note item 5. A sweep rung that, once a fix PR merges, re-runs the

    failed required checks on every open PR whose recorded failure MATCHES THE FIXED CLASS —

    driven by a data-mapped failure-pattern -> fix-PR table, never a hardcoded special case. A red

    caused by infrastructure, whose cause is now merged, should not need a human to notice it.


    EVIDENCE — the 14-PR pile, and then a second, sharper instance on 2026-07-19. A large share of

    that queue was blocked on ci-gate/mutation-ratchet failures that were INFRASTRUCTURE ARTIFACTS

    of the ~13-minute Stryker tax, not defects. W1-T108 removed the cause, but nothing re-examined

    the PRs the cause had already poisoned. The 2026-07-19 instance is the regression fixture:

    FOUR PRs (#265/#249/#245/#236) went red on ''ci-gate: timed out waiting for required check(s):

    mutation-ratchet'' while mutation-ratchet itself completed SUCCESS on those same heads moments

    later — the gate timed out, the work was fine. All four needed a hand-pushed fresh head.


    This is the DRAINAGE-side complement to W1-T121: the governor stops the queue GROWING, this

    stops it ROTTING.


    STRIKE INTERACTION, load-bearing: a re-verification pass must either not consume a strike, or

    must credit back strikes spent on a now-fixed class. Otherwise self-healing is capped by the

    very counter it exists to relieve.'
  design: '(i) A failure-pattern -> fix-PR mapping held as DATA, so covering a new systemic fix is a row,

    not code.

    (ii) On a fix PR merging, re-drive the matching required checks on each open PR whose recorded

    failure matches that class; re-dispose on the fresh result.

    (iii) The re-drive MUST work against real ci-gate semantics — see W1-T123, which is a hard

    dependency: until check-runs dedupe by name, a re-run in place cannot clear a stale red and

    this rung would silently no-op. If W1-T123 has not landed, the re-drive must push a refresh

    commit instead of re-running in place.

    (iv) Strike accounting: a re-verification pass does not consume a strike, and strikes already

    spent on a now-fixed class are credited back.'
  acceptance:
  - claim: an open PR whose recorded failure matches a merged fix-PR's class has its required check re-driven
      exactly once and re-disposes on the fresh result
    proof: 'unit test: test/post-fix-reverification.test.ts'
  - claim: an open PR whose failure does NOT match the class is untouched with no re-drive — the falsifier
      proving the mapping does real work rather than blanket-rerunning
    proof: 'unit test: test/post-fix-reverification.test.ts'
  - claim: a strike-exhausted PR whose only defect was the fixed class becomes eligible again, with the
      strike credited back or never consumed
    proof: 'unit test: test/post-fix-reverification.test.ts'
  - claim: the four 2026-07-19 ci-gate-timeout PRs, replayed as a fixture, all re-dispose to mergeable
      without a hand-pushed head
    proof: 'unit test: test/post-fix-reverification.test.ts'
  risk: high
  origin: architect
  plan_refs:
  - MASTER-PLAN#5C
  files:
  - src/lib/sweep.ts
- id: W1-T125
  title: ARM-AT-OPEN — auto-merge is armed when the PR is CREATED, not when the runner regains control
    (2-8 minutes of measured dead time, sometimes never)
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'Filed from #271 holding-note item 6. Because remudero-review is a REQUIRED commit status,

    GitHub''s server-side auto-merge fires the instant checks plus review go green: event-driven

    merging, zero polling latency, no sweep pass needed on the happy path. Sweep then demotes to

    EXCEPTION RECONCILER — conflicts, staleness, heals — which is what a level-triggered system

    should be.


    PRECISION ON THE DEFECT, because the arm call ALREADY EXISTS: armAutoMerge is invoked in the

    ''ARM auto-merge, then POLL to the gate'' block AFTER THE WORKER RETURNS. The PR itself was

    opened by the worker minutes earlier. The gap is not a missing arm; it is an arm positioned at

    the wrong moment in the lifecycle. This task MOVES the arm, it does not ADD one.


    MEASURED (own-repo run PRs, created -> armed): #251 8m13s, #245 5m42s, #240 2m42s, #249

    2m05s, #265 NEVER ARMED, #274 still unarmed 11+ min later. #274 is the clearest case: its

    worker was still alive running fix rungs, so control never reached the arm call.


    ALSO IN SCOPE: the spike path arms only AFTER waitForCiGreen returns — strictly worse, since

    it forfeits server-side auto-merge entirely and re-implements the wait client-side.'
  design: '(i) Arm at PR-CREATION time, in the same code path that opens the PR.

    (ii) Remove the post-return arm as the PRIMARY path; keep an idempotent re-arm in sweep as the

    exception reconciler for PRs that somehow opened unarmed.

    (iii) The spike path stops waiting client-side and arms at creation like every other path.

    (iv) SAFETY ARGUMENT, which must be preserved explicitly: early arming is safe ONLY because

    the required-status contract still gates the merge. Arming earlier must never merge anything

    the gate would have refused.'
  acceptance:
  - claim: a run PR has a non-null autoMergeRequest immediately at creation, asserted at creation rather
      than eventually
    proof: 'unit test: test/arm-at-open.test.ts'
  - claim: a PR that greens merges with no sweep action ledgered, proving the happy path no longer depends
      on the reconciler
    proof: 'unit test: test/arm-at-open.test.ts'
  - claim: a red or failed PR is unchanged and does NOT merge — the falsifier proving early arming did
      not bypass the required-status contract
    proof: 'unit test: test/arm-at-open.test.ts'
  - claim: 'the created-to-armed delta is ~0 rather than the 2-8 minutes measured on #251/#245/#240/#249,
      locked as a regression fixture'
    proof: 'unit test: test/arm-at-open.test.ts'
