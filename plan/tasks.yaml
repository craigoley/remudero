      proof: "unit test over an injected executor: proof names a test/grep, executor returns pass/match, report contains NO proof keywords -> criterion MET with proof_exec=executed_pass"
    - claim: "a criterion keyword-CLAIMED in the report whose named proof FAILS on the head is judged UNMET (executed_fail overrides keyword coverage)"
