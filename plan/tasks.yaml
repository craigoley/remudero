- id: W1-T123
  title: ci-gate dedupes check-runs BY NAME and evaluates only the LATEST attempt — today a stale red
    is unretractable and permanently poisons its SHA
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: "Filed from #271 holding-note item 5's fold-in, split out per Rule 19 because it BOUNDS that\n\
    item rather than elaborating it. ci-gate aggregates commits/<sha>/check-runs and fails on ANY\nentry\
    \ whose conclusion is a failure, with NO grouping by name. A SHA accumulates one check-run\nPER ATTEMPT,\
    \ so once a job has failed on a SHA, re-running it to green CANNOT clear the gate —\nthe stale failure\
    \ is still in the list and is unretractable. That SHA is permanently\nun-mergeable.\n\nOBSERVED LIVE\
    \ ON #242. After the refactor-campaign label was removed the job re-ran and PASSED\non head 287cbcb,\
    \ and ci-gate still held merge naming refactor-campaign. Both check-runs were\nlive on that SHA at\
    \ once:\n\n  refactor-campaign completed/failure started=19:37:44 id=88229873992\n  refactor-campaign\
    \ completed/success started=19:52:17 id=88231013731\n\nCost: one throwaway empty commit (a61ddd7)\
    \ purely to obtain a clean SHA.\n\nWHY THIS GATES W1-T124: re-verification's whole premise is 're-run\
    \ the failed required check\nand re-dispose on the fresh result', which on this ci-gate DOES NOT WORK\
    \ — the fresh green is\ninvisible under the stale red. Without this fix the self-healing rung silently\
    \ no-ops on\nexactly the PRs it exists to rescue."
  design: '(i) Group the check-run list by `name`, keep the attempt with the latest started_at, and

    evaluate ONLY that one. A name with a failed attempt followed by a successful attempt reads as

    SUCCESS.

    (ii) Preserve the existing IGNORE list and the fail-on-absent semantics unchanged — this task

    narrows WHICH runs are evaluated, never what a REQUIRED check means.

    (iii) Keep the aggregation in jq inside ci-gate.yml, so the gate stays self-contained and

    readable in the workflow it enforces.'
  acceptance:
  - claim: 'a SHA carrying a failed then a later successful run of the SAME required check name reads
      as SUCCESS — the #242 fixture, locked so a re-run can clear a red in place'
    proof: 'unit test: test/ci-gate-dedupe.test.ts'
  - claim: a SHA whose LATEST attempt for a name is a failure still FAILS the gate — the falsifier proving
      dedupe did not weaken the gate into ignoring real reds
    proof: 'unit test: test/ci-gate-dedupe.test.ts'
  - claim: a required check absent from the list still blocks, and IGNORE-listed names are still skipped
      — the pre-existing contract is untouched
    proof: 'unit test: test/ci-gate-dedupe.test.ts'
