- id: W1-T120
  title: A gate PROVES it read the file under test — repoRoot resolves from cwd, and lint/review emit
    a read-identity assertion (the silent-green wrong-plan class)
  repo: remudero
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: "GATE INTEGRITY, filed from #271 holding-note item 1. src/run-task.ts derives\n`const repoRoot\
    \ = dirname(dirname(fileURLToPath(import.meta.url)))` — from WHERE THE SCRIPT\nLIVES, never from cwd\
    \ (bin/rmd resolves symlinks and execs $DIR/src/run-task.ts, reinforcing\nit). Invoking ONE checkout's\
    \ bin/rmd from ANOTHER tree therefore lints the WRONG PLAN and\nvouches for it.\n\nLIVE FIXTURE (observed\
    \ while gate-checking #271 itself). FALSE GREEN — main checkout's\nbin/rmd, cwd = the consolidation\
    \ worktree; it read the main checkout's plan and never opened\nthe 8-task file under test:\n\n  rmd\
    \ lint-plan: 2 task(s) checked (2 new/changed vs origin/main) - 0 failing, 0 warning(s)\n\nTRUE —\
    \ the worktree's OWN ./bin/rmd, same cwd, same --base:\n\n  rmd lint-plan: 8 task(s) checked (8 new/changed\
    \ vs origin/main) - 0 failing, 0 warning(s)\n\nBOTH EXIT 0. Nothing in the false run signals the file\
    \ under test was never opened: the\nfailure is silent AND green, the most dangerous shape a gate has.\
    \ Escaping via --plan does\nnot save you either — relative(repoRoot, planPath) yields a ../../.. path\
    \ and\n`git show <base>:<that>` dies as a base-resolution failure rather than as 'your plan is\noutside\
    \ my root'.\n\nWHY (b) IS THE REAL DELIVERABLE: the repo already requires gates to be proven ACTIVE,\
    \ not\nmerely present (W1-T98's planted TS-strict probe, W1-T26's depcruise falsifier, the coverage\n\
    ratchet's falsifier). This class needs something those cannot give — a gate proving it read\nthe RIGHT\
    \ INPUT. An active gate pointed at the wrong file is still green and still wrong;\nidentity is a distinct\
    \ property from activeness, and no existing falsifier would have caught\nit."
  design: '(i) Resolve repoRoot by CWD-ASCENT (`git rev-parse --show-toplevel` from process.cwd()) or
    an

    explicit --repo-root, replacing the install-path derivation. Fall back to the install path

    ONLY when cwd is not inside a git work tree, and say so on stderr.

    (ii) REFUSE when --plan resolves outside the resolved root, with a message naming both paths,

    instead of the current silent relative()/git-show failure that mis-reports as a base problem.

    (iii) READ-IDENTITY ASSERTION — the deliverable that kills the CLASS. lint-plan and review

    emit, in their summary line, the ABSOLUTE path plus a content hash of the plan file they

    actually opened. The proof of what was gated becomes legible in the output itself rather than

    inferred from cwd.

    (iv) NOT IN SCOPE: changing what lint-plan checks. This task changes only WHICH FILE it reads

    and how that choice is evidenced.'
  acceptance:
  - claim: 'invoking a checkout''s bin/rmd with cwd inside a DIFFERENT work tree gates the cwd tree''s
      plan, not the install tree''s — the live #271 false-green fixture, locked as a regression test'
    proof: 'unit test: test/repo-root-identity.test.ts'
  - claim: a --plan path resolving outside the resolved root is REFUSED by name, not reported as a base-resolution
