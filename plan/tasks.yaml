    tripped threshold ONCE, log, continue. Capped at K invocations per run; the Kth MUST decide, not
    defer. The judge NEVER edits code and NEVER merges. Tier invariant (judge.tier > worker.tier)
    asserted at load, same enforcement shape as mounts.yaml (W1-T5 / G-17).
