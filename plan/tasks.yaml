# from the daemon surface and BLOCKS every client, so a breaking change fails CI across all consumers in
# one PR. Nothing client-side starts before W3-T1. One web app, three shells (browser · Tauri macOS ·
# Tauri iOS); push is an adapter concern, not an app concern. ─────────────────────────────────────────
