  acceptance:
    - claim: "the reviewer rubric (MASTER-PLAN §5 layer 2) checks four judgment items: ONE CONCERN per
        PR, ALL CALLERS AUDITED (partial-fix drift), TEST THEATER, and REFACTOR-PHASE HONESTY"
      proof: "fixture tests over recorded (diff, report) tuples: a two-concern diff -> one-concern=fail;
        a diff that edits one call site but leaves a sibling caller stale -> callers-audited=fail; an
