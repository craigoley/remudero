    package-lock.json change (or a new workspaces layout) runs STALE node_modules against NEW code. W1-T126's daemon
    self-restart pulls origin/main and re-execs WITHOUT reinstalling, so it inherits the exact same staleness. FIX:
    after any git pull that changes package.json / package-lock.json, run npm install BEFORE build/serve — in both
