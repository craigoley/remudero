      proof: "unit test: test/worker-home-per-run.test.ts"
    - claim: "each per-run home reproduces the singleton's isolation guarantee — a home materialized against an injected operator-dotfile fixture yields zero inherited aliases and zero operator functions, per home"
      proof: "unit test: test/worker-home-per-run.test.ts"
    - claim: "a per-run home is reaped on every exit path including the error path, and a home orphaned by an ended run is reaped by the boot sweep — no home debris accumulates across runs"
      proof: "unit test: test/worker-home-per-run.test.ts"
  risk: high
