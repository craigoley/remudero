  budget_usd: 100.00
  rationale: "Docs-as-code fails because it assumes humans notice when documentation falls behind. The
    missing piece is the AWARENESS LAYER connecting a change to the docs it falsified [research]. Plan
    prose is unverifiable; a FALSIFIABLE claim with a command that must exit 0 is not. A red claim means
    THE PLAN IS LYING ABOUT THE SYSTEM — caught in CI, not by a human noticing months later."
  design: |
    NEW FILE plan/claims.yaml: a list of {id, claim, plan_section, assertion: a shell command that must
    exit 0}. A CI job runs every assertion; any non-zero exit fails the job and NAMES the false claim.
    Seed with claims already checkable: workers get NO MCP config · buildWorkerEnv strips all ANTHROPIC_*
    · tasks.yaml is never machine-written · DEFAULT_BUDGET_USD is 100 · containment fails closed · the
    merge gate requires [ci, remudero-review].
  acceptance:
    - claim: "plan/claims.yaml exists and a CI job runs every claim's assertion, seeded with the six checkable claims"
      proof: "the claims CI job runs green on main with all seeded assertions exiting 0 — paste the job output"
    - claim: "a deliberately-broken claim turns the claims job RED and NAMES the false claim"
      proof: "reverting one assertion's premise (or breaking its command) makes the job exit non-zero and print the failing claim id/text — paste the red run, then revert"
  risk: high
  origin: architect
  status: queued
  attempts: 0

