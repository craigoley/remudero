    ids) so injection is a LOOKUP. Entries gain a LIFECYCLE (active | superseded); a SUPERSEDED entry is
    NEVER injected — it stays for provenance only. Provenance decay is real: a fact can become FALSE."
  design: |
    Split the corpus into learnings/{platform,architecture,ci,testing,failures}.md (or the yaml mirror by
    section) + a generated INDEX mapping tag/subsystem/files -> file -> entry ids, so the Promptsmith does
    a lookup, not a full scan. Add a `lifecycle: active|superseded` field; the injector filters out
    superseded entries. Regenerate the index in CI (a stale index fails).
  acceptance:
    - claim: "the corpus is split by subsystem with a generated index and injection is a lookup keyed by tag"
      proof: "learnings/{platform,architecture,ci,testing,failures}.* exist; the generated index maps tag/files -> entry ids; a stale index FAILS CI (regenerate check) — paste the index + the check"
    - claim: "a SUPERSEDED entry is NEVER injected (live example: the false ZDOTDIR claim)"
      proof: "the entry claiming 'ZDOTDIR isolates worker shells' is marked lifecycle=superseded; a worker touching env.ts receives ONLY the CLAUDE_CODE_SHELL entry and NEVER the superseded ZDOTDIR one (fixture test over the rendered prompt)"
  risk: high
  origin: architect
  status: queued
  attempts: 0

- id: W1-T34
