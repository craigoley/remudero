# ── §4B FLIGHT CONTROL (in-flight supervision → risk gates → specialist panel). ──────────────────
# Today's only guards are terminal cliffs (budget/turns/strikes) — they catch a worker AFTER the burn,
# not while it goes wrong (FIELD FINDING 12). These four tasks add deterministic flight signals (L1),
# an advisory process-judge (L2), risk scoring that makes auto-choose SAFE (L3), and a triggered
# specialist panel (L4). Doctrine: supervision is deterministic; judgment is advisory (Standing rule 12).
# Wiring: T20 -> T21 -> T22, all after the enforced gate W1-T1D; W2-T1 after the reviewer + risk scoring.
- id: W1-T20
  title: Flight signals (Layer 1) — deterministic per-turn tripwires from stream-json
  repo: remudero
  depends_on: [W1-T1D]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "MASTER-PLAN §4B Layer 1. In-flight supervision starts with cheap deterministic predicates
    computed per turn from the worker's stream-json: they FIRE, they never JUDGE (Standing rule 2/12).
    A trip is what invokes the Layer-2 judge (W1-T21); on its own it decides nothing."
  design: |
    Consume the worker stream-json per turn and compute pure predicates over the running transcript:
    burn-rate vs. the task-type baseline; diff-growth per turn; repeated tool-call hashes; error-signature
    loops (count only occurrence N>=3 of a fingerprinted error, the analyze-diagnostics discipline);
    scope drift (files touched vs. the task's declared files); and a stall timeout. Each predicate is
    deterministic and side-effect-free; the controller ORs their trips into a single tripwire signal.
    No LLM here. Same input a real run emits, driven from recorded fixtures in tests.
  acceptance:
    - claim: "a seeded transcript with 5 identical tool calls trips the repetition predicate"
      proof: "unit test over a fixture of 5 identical tool-call payloads -> repeated-tool-call predicate returns tripped"
    - claim: "a 12-turn zero-diff transcript trips the no-progress predicate"
      proof: "unit test over a 12-turn fixture with an unchanged diff -> stall/no-progress predicate returns tripped"
    - claim: "a healthy transcript trips NOTHING (no false positive)"
      proof: "unit test over a productive fixture (growing diff, varied tool calls, no error loop) -> every predicate returns not-tripped"
  risk: medium
  origin: architect
  status: queued
  attempts: 0

# ── §5C TASK PRE-FLIGHT (the plan gate). Task quality moves UPSTREAM of the runner: a deterministic linter
# catches malformed tasks BEFORE dispatch (the runner is the LAST line, not the first). Four malformed tasks
# (W1-T6, W1-T9, W1-T12) reached workers before the pattern was caught. [origin: feedback#plan-health]
- id: W1-T20c
  title: "Deterministic task linter + fail-closed pre-dispatch guard (§5C Layer A)"
  repo: remudero
  depends_on: [W1-T1D]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "MASTER-PLAN §5C Layer A. Task quality must be gated BEFORE dispatch, deterministically and
    fail-closed. Four malformed tasks (W1-T6, W1-T9, W1-T12 — the last violating Rules 18 and 19 three
    times) reached workers and burned budget; a no-LLM linter catches sizing (Rule 19), headless-fitness
    (Rule 18), proof-shape, and provenance before a worker ever spawns."
  design: |
    A PURE linter over a loaded plan. Checks: SIZING (≥2 acceptance criteria or ≥2 subsystems implied by
    files:/criteria while risk<high); HEADLESS-FITNESS (each auto-verify criterion vs a forbidden
    live-context LEXICON held as DATA — overnight/reboot/launchctl/"loads at boot"/killed/"operator
    confirms"/"user selects"/manual-eyeball); PROOF-SHAPE (observable proof, not "works"/"correct"/a vibe);
    PROVENANCE (origin+risk present); BUDGET-SANITY (soft warn if risk->mount turns < class mean). Wired at
    TWO points: (i) a CI check on plan/tasks.yaml PRs; (ii) a fail-closed pre-dispatch guard in
    rmd run-task/drain -> verdict=blocked_illformed, no worker spawned.
