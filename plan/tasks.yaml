- id: W1-T131
  title: TEST-FIXTURE TEMP HYGIENE — the suite leaks one temp dir per fixture per run and mutation
    testing multiplies it (202,830 dirs / 14G measured)
  repo: remudero
  depends_on:
  - W1-T115
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'SUPERSEDES this task id''s first draft (review-path hygiene), which W1-T115 already
    closed generically via lib/tmp.ts withTempDir — refiled against the ACTUAL dominant source after
    measuring it. Recording the correction rather than quietly reusing the id.


    MEASURED, 2026-07-19, os.tmpdir() = /var/folders/sq/.../T: 349,968 entries totalling 14G, of
    which 202,830 carry the rmd- prefix. By prefix: rmd-status 49,386, rmd-sweep 31,739,
    rmd-init-test 22,666, rmd-fixrung 14,484, rmd-escalate 13,670, rmd-git-sync 13,462, rmd-plan
    9,416, rmd-containment-test 9,272, rmd-correct 8,968, rmd-digest 6,840, plus rmd-worker-guard.
    This — not /private/tmp/claude-502, which holds 936M of Claude Code session dirs rmd does not
    own — is what drove /System/Volumes/Data to 526Mi free.


    THE SOURCE IS THE TEST SUITE, NOT THE RUNNER. Confirmed instance: test/worker.test.ts:373 calls
    mkdtempSync(join(tmpdir(), "rmd-worker-guard-")) and never removes it, so every suite execution
    leaks one. The prefix census shows the same pattern replicated across the status, sweep,
    fixrung, escalate, git-sync, correct, digest and init/containment fixtures. Mutation testing is
    the multiplier: Stryker re-runs the suite once per mutant (W1-T108), so a single gate run
    multiplies every un-cleaned fixture by the mutant count. That is how a per-test dir reaches six
    figures.


    THE RATIONALE OF W1-T115 WAS WRONG ABOUT THE CAUSE, and its own worker said so in lib/tmp.ts:
    status.ts readLedgerLines already reads ledger.ndjson directly via readFileSync with no temp
    copy, so "every rmd invocation copies the ledger" describes code that does not exist. The
    26,711-dir figure was real but its attribution was not. This task carries the corrected
    attribution.


    WHAT W1-T115 DOES AND DOES NOT COVER. Its withTempDir fixes the two PRODUCTION sites in
    run-task.ts — genuinely correct, but the review site leaks one dir per PR review, a rounding
    error against 202,830. Its sweepStaleTempDirs DOES key on os.tmpdir() with the rmd- prefix and
    so would reap all of the above, which is the load-bearing part of that fix. But it runs ONLY at
    daemon boot, and the suite runs where no daemon boots — CI runners and the developer machine,
    which is precisely where this exploded. A backstop that never fires on the host generating the
    debris is not a backstop.'
  design: '(i) Route EVERY test-created temp dir through a single cleanup-guaranteed fixture helper
    (or an after/teardown hook), the test-side analogue of lib/tmp.ts withTempDir. Do not hand-roll
    a finally per test file — that is the discipline that already failed at scale.

    (ii) Fix the census, not one file: the prefixes above enumerate the call sites to convert. A fix
    that only lands test/worker.test.ts leaves 200,000 dirs of headroom on the table.

    (iii) A REGRESSION GATE THAT RUNS WHERE THE DEBRIS IS MADE — assert the suite is net-zero temp
    dirs across a full run. Relying on the daemon boot sweep is what leaves CI and the dev machine
    uncovered.

    (iv) Consider invoking sweepStaleTempDirs from more than daemon boot (any rmd entrypoint, cheap
    and idempotent) so the backstop fires on hosts that never boot a daemon.

    (v) Reclaiming the EXISTING 14G is an operator action, not this task — but the gate must prove
    the leak cannot regrow.'
  acceptance:
  - claim: a full test-suite run leaves ZERO net new rmd- prefixed dirs under the temp root, counted
      before and after
    proof: 'unit test: test/temp-hygiene-suite.test.ts'
  - claim: test/worker.test.ts:373 specifically no longer leaks its rmd-worker-guard- dir, the
      confirmed instance that anchored the census
    proof: 'unit test: test/temp-hygiene-suite.test.ts'
  - claim: a test whose body THROWS still leaves no temp dir behind — the error path is the one that
      leaks at scale
    proof: 'unit test: test/temp-hygiene-suite.test.ts'
  - claim: a mutation-style repeated run of the same fixture N times creates at most a bounded number
      of dirs, pinning the Stryker multiplier that turned a per-test dir into six figures
    proof: 'unit test: test/temp-hygiene-suite.test.ts'
  risk: medium
  origin: architect
  plan_refs:
  - MASTER-PLAN#9
  files:
  - test/worker.test.ts
