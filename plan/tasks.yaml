      proof: "unit test over the trigger predicate + policy: a marker with merges >= N (default 25) fires reason=merges; a marker with days >= D (default 7) fires reason=days; whichever crosses first fires; below both, NO fire; a fire writes a retro_triggered line naming the reason; N and D are policy-data rows (changing the value changes the threshold with no code edit)"
