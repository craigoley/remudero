# CLI self-freshness — the code-freshness half of the W1-T60 pair (W1-T60 self-syncs the PLAN; nothing
# self-syncs the CODE). Live incident #138: rmd correct existed on main but the operator's stale local CLI
# printed the OLD usage — the binary predated its own merge.
- id: W1-T79
  title: "rmd manages its own git — CLI self-freshness at entry (auto ff-pull when clean, refuse-with-command when not; the stale-binary class)"
  repo: remudero
  depends_on: [W1-T60]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "LIVE INCIDENT (2026-07-16, operator-reported): rmd correct existed on main (#138) but the
    operator's invocation printed the OLD usage and exited — run-task had just built the feature from a
    fresh origin/main worktree while the CLI executing locally predated its own merge. W1-T60 made rmd
    self-sync the PLAN (dispatch from the origin/main blob); nothing self-syncs the CODE. The operator
    should never be the freshness mechanism — 'rmd should be managing git for me' is the requirement,
    verbatim."
  design: |
    At CLI entry (every subcommand, before dispatch): compare local HEAD to origin/main (a fetch is
    already performed for dispatch paths per W1-T60 — reuse it; other subcommands fetch the same way,
    honoring --allow-stale semantics on fetch failure).
    CLEAN + BEHIND (ff-possible) -> git pull --ff-only automatically, print one line
      (### rmd self-sync: <old>..<new>), re-exec the CLI once (the freshly pulled code must be what
      runs — a pulled-but-stale process is the same bug wearing a fix; guard the re-exec with an env
      flag so it cannot loop).
    DIRTY or DIVERGED -> never mutate; refuse with the exact command to run and exit non-zero
      (the control surface never falls through on staleness, matching the bad-input doctrine).
    UP-TO-DATE -> zero output, zero added latency beyond the fetch already performed.
    Daemon note: this covers daemon STARTUP; long-run in-process staleness is the WS-2 self-updater's
    remit (thundering-herd risks already noted there) — out of scope here, say so in the module doc.
  acceptance:
    - claim: "a clean checkout behind origin/main self-syncs and the NEW code executes (the #138 incident shape)"
      proof: "unit test over injected git deps: behind+clean -> ff-pull invoked, re-exec invoked exactly once with the loop-guard env set"
    - claim: "a dirty or diverged checkout is never mutated — refuse with the exact remedy"
      proof: "unit tests: dirty -> no pull, stderr carries git pull --ff-only guidance, exit non-zero; diverged (non-ff) -> same refusal, no merge attempted"
    - claim: "up-to-date adds nothing"
      proof: "unit test: same-sha fixture -> no pull, no re-exec, no output beyond the command's own"
    - claim: "the re-exec cannot loop"
      proof: "unit test: entry with the loop-guard env already set skips the freshness check entirely"
  risk: high
  origin: architect
  plan_refs: ["§2", "§4B"]
  files: [src/run-task.ts, src/lib/self-sync.ts]
  status: queued
  attempts: 0
  note: "Operator-requested verbatim 2026-07-16. Completes the W1-T60 pair: plan freshness (shipped) +
    code freshness (this). The refuse path exists so rmd never destroys local state to help. RISK raised
    medium->high per the §5C linter's sizing resolution (2 subsystems run-task+self-sync) — and
    auto-pull + re-exec on every entry is genuinely high-risk (mutates the working tree, re-execs the
    binary), so high is the more accurate rating, not a decompose."

# Dispatch dedup — an OPEN PR means the task is IN-FLIGHT. Live incident #143/#145: rmd review posted
# success on #143, the drain started seconds later (merge is async -> not-merged), nextRunnable has no
# in-flight concept, and a fresh worker rebuilt W2-T1 as #145, orphaning the reviewed-green #143.
- id: W1-T80
  title: "Dispatch dedup — a task with an OPEN PR is IN-FLIGHT, never runnable (the #143/#145 duplicate-build race)"
  repo: remudero
  depends_on: [W1-T69]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "LIVE INCIDENT (2026-07-16): rmd review posted success on #143, and the drain started seconds
    later — merging is ASYNC, so deriveStatus correctly read not-merged, nextRunnable has no concept of
    in-flight, and a fresh worker rebuilt W2-T1 end-to-end as #145 (merged), orphaning the reviewed-green
    #143. The review-to-merge gap race. The same missing guard is why blocked-open PRs could be
    re-dispatched as fresh identical workers (the #111/#113 ping-pong): an OPEN PR means the task is
    IN-FLIGHT — its next action belongs to the merge queue, the fix rung (W1-T76), or a human — never a
    duplicate fresh build."
  design: |
    nextRunnable (locate it — drain-side; verify by grep, distrust this prompt) additionally consults the
    task's derived PR state: a task whose most recent PR is OPEN is skipped with a legible line
    (dispatch.skipped reason=open-pr #N) on console + ledger. CLOSED (unmerged) PRs do NOT block — an
    abandoned/superseded attempt leaves the task runnable (intentional re-runs stay possible). Reuse the
    deriveStatus projection (corrections-supreme + all guards intact) rather than a second GitHub read
    path. Drain-v1 semantics otherwise unchanged: skip means CONTINUE to the next runnable task, not halt
    — an in-flight PR must not stop the drain the way a block does.
  acceptance:
    - claim: "the canonical race fixture: a task whose latest PR is OPEN (reviewed-green or blocked alike) is excluded from nextRunnable with a legible skip"
      proof: "unit test over injected deps reproducing the #143 state -> task skipped, dispatch.skipped ledger line with the PR number, drain proceeds to the next runnable task"
    - claim: "a CLOSED-unmerged PR leaves the task runnable (re-runs stay possible)"
      proof: "unit test: closed-PR fixture -> task included in nextRunnable"
    - claim: "merged and correction-credited tasks are excluded exactly as today"
      proof: "existing deriveStatus/nextRunnable tests pass unchanged; a correction-credited fixture stays excluded"
  risk: high
  origin: architect
  plan_refs: ["§4B", "§2"]
  files: [src/lib/drain.ts, src/lib/plan.ts]
  status: queued
  attempts: 0
  note: "Filed from the 2026-07-16 duplicate-build incident (#143 orphaned by #145, $3.32 duplicate spend).
    Complements W1-T77's MERGEABLE disposition: the sweep handles the open PR's next action; this guard
    stops the drain from creating a competitor for it."
