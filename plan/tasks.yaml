      proof: "unit test over a seeded ledger fixture: the predicate carries task id, run id, head branch, injected learning ids, mount (model/effort), num_turns, cost, reviewer_outcome, gate contexts, correction lineage; two calls over the same ledger are byte-identical (stable key order, no generation timestamp in the payload)"
