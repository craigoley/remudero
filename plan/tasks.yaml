    2026-08; SLSA source-track + in-toto vocabulary; NIST agent-identity's tamper-proof-logs/human-intent
    requirements). SUBSTRATE VERIFIED IN THE LEDGER 2026-07-16 (grep): run.start (task_id/run_id),
    pr.opened (pr_url→head branch), learnings.injected (injected learning ids), implement.done via
    workerLedgerFields (mount model/effort, num_turns, cost_usd), review.posted reviewer_outcome (W1-T63,
    shipped), pr.merged + automerge.armed (gate contexts at merge), correction.provenance (present). ONE
