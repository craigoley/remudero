  rationale: "THE COMPOUNDING THESIS IS BROKEN AT THE READ SIDE: LEARNINGS.md is written and never read —
    every worker starts fresh and re-learns what is written two files away. PULLED FORWARD to run NEXT
    after the T3 family (was buried behind a dozen tasks) because until this ships, every run pays the
    re-learning tax. GitHub's repo-scoped agentic memory (Jan 2026) validates provenance-tagged,
    repo-scoped, JUST-IN-TIME-verified learnings — and the READ side is exactly what we are missing."
  design: |
    Extend the prompt renderer (renderImplementPrompt) to inject, per task: (a) DISTRUST THE PROMPT OVER
    THE INSTALLED VERSION; (b) the autonomy clause (Standing rule 8); (c) the LEARNINGS entries MATCHING
    the task. Matching is DETERMINISTIC, not semantic: give each LEARNINGS entry a `subsystem:` tag and
    `files:` (globs); inject ONLY entries whose globs match the task's repo/files, each as a
    provenance-tagged CONTEXT claim `[src: learnings#<id>]`. Enforce a KNOWLEDGE BUDGET — cap the injected
    chars so a growing LEARNINGS file never becomes an unbounded context tax; over budget, keep the
    highest-relevance/most-recently-cited entries and drop the rest (logged). Provenance linting stays
    intact (injected claims carry their [src]).
  acceptance:
    - claim: "every rendered prompt injects the distrust-the-prompt rule, the autonomy clause, and matched LEARNINGS entries"
      proof: "a rendered-prompt fixture test asserts all three are present: the distrust string, the
        autonomy string, and at least one provenance-tagged LEARNINGS line for a task with a matching tag"
    - claim: "injected LEARNINGS context still passes the provenance linter"
