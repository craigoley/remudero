- id: W1-T17
  title: Isolation preflight probe — fail closed before any task work begins
  repo: remudero
  depends_on: [W1-T1, W1-T1B, W1-T1D]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "PR #8's shell isolation works ONLY because `~/.bashrc` is absent on this host — an accident
    of the machine, not construction (LEARNINGS.md; FIELD FINDING 11b). On a machine with a populated
    `~/.bashrc` it would silently isolate NOTHING. Standing rule 11: isolation is PROVEN PER RUN by
    probe, never assumed from configuration. The runner must verify containment before it trusts it."
  design: |
    Before a run spawns its first task worker, spawn a read-only PREFLIGHT worker (or reuse the recon
    slot) that runs `alias | wc -l` (and `declare -F | wc -l` for functions). NONZERO ⇒ the worker
    inherited operator shell state ⇒ isolation is not holding ⇒ FAIL CLOSED: ledger a named error
    (e.g. isolation_preflight_failed with the observed count) and refuse to start task work. Zero ⇒
    proceed. The probe is the empirical backstop the config alone cannot provide.
  acceptance:
    - claim: "a nonzero alias/function count from the preflight probe aborts the run with a named error before task work"
      proof: "unit test: the preflight fail-closed LOGIC, given an INJECTED nonzero alias/function count,
        ledgers isolation_preflight_failed with the observed count and refuses to start (no implement.done);
        given a count of 0 it proceeds. The probe is WIRED into the run path (grep proof)."
    - claim: "the preflight worker is read-only"
      proof: "unit/transcript: no write tool used by the preflight worker"
  risk: medium
  origin: architect
  status: queued
  attempts: 0
  note: "Redesigned headless (Rules 18/20): the fail-closed preflight LOGIC is unit-tested via an INJECTED
    alias/function count (a worker cannot plant the operator's real ~/.bashrc — OS-denied, §4A). The LIVE
