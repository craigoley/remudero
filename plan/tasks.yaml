- id: W1-T132
  title: WIRE shippedSince INTO THE RETRO — the gather credits merges from the ledger alone, which is
    structurally empty in the gate-side-merge era
  repo: remudero
  depends_on: []
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'RETRO-BLOCKING. The durable record cannot be written until this lands, so it jumps the
    queue on the W1-T102/W1-T108 precedent.


    MEASURED, 2026-07-19 ops sweep, read-only gather over the live ledger since marker
    2026-07-18T14:10:27Z: 193 runs, verdicts blocked_ci 21, incomplete 110, no_pr 42,
    pr_attribution_failed 12, blocked 4, blocked_containment 2, blocked_isolation 2 — and ZERO
    merged. mergedSince returned 0 and shipped returned 0 on a day when roughly 28 pull requests
    actually merged. A retro run in that state would have written a durable record asserting that
    nothing shipped since the previous day.


    MECHANISM, located exactly. retroCommand at src/run-task.ts:2397 calls buildGather WITHOUT a
    github gateway. buildGather then falls back to ledgerOnlyShipped(merged), and merged comes from
    mergedSince, which filters on ledger verdict === merged. No run ends verdict === merged any more:
    merges land GATE-SIDE, after the run has already terminated blocked_review or incomplete, via the
    sweep fix rung and auto-merge. The predicate is not wrong so much as extinct.


    THE DRIFT STORY, which is the point of filing this. shippedSince — the ledger-union-GitHub
    credit path built by W1-T51 for exactly this gap, complete with ownership assertion and
    gate-side annotation — is FULLY IMPLEMENTED in src/lib/retro.ts and was NEVER PLUGGED IN. The
    ledger-only fallback was correct in the runner-merges era and has been silently false ever
    since. An UNWIRED FIX IS INDISTINGUISHABLE FROM AN UNBUILT ONE: W1-T51 reads as shipped in the
    plan, its tests pass, and the defect it was written to prevent went on happening in production
    for weeks. Landing this is also the falsifier for any other W1-T51-shaped claim.'
  design: '(i) Wire a github gateway into retroCommand buildGather — reuse the SAME gateway shape
    already implemented for lib/status.ts findMergedByTrailer and headRefName rather than minting a
    third.

    (ii) DEGRADE LOUDLY, the W1-T130 polarity applied to the read layer: a gather whose gateway is
    throttled, errored or absent must SAY SO BY NAME in the rendered report and refuse to present a
    ledger-only count as a complete one. Silently reporting none is the exact failure being fixed,
    and a fix that can fail the same way quietly is not a fix.

    (iii) NOT-OBSERVABLE IS NOT NOT-SHIPPED — the same distinction W1-T119 draws for the dispatch
    read, drawn here for the credit read. This task does not depend on W1-T119 and must not wait for
    it, but the two must agree in polarity.

    (iv) shippedSince discrepancy lines are SURFACED, not swallowed — a gate-side merge is exactly
    the case the operator needs to see named.'
  acceptance:
  - claim: a gather over the 2026-07-19 ledger with a live gateway credits the roughly 28 gate-side
      merges that the ledger-only path reports as zero
    proof: 'unit test: test/retro-shipped-wiring.test.ts'
  - claim: a gather whose gateway is THROTTLED names the throttle in the rendered report and does NOT
