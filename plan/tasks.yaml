- id: W1-T14
  title: Make `rmd` a real installable CLI (package.json bin + publishable, no secrets in the tarball)
  repo: remudero
  depends_on: [W1-T1C]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 3.00
  rationale: "package.json has NO `bin` field, so `npm link` is a no-op and `rmd` never lands on PATH —
    every invocation today is `./bin/rmd` from inside the repo. And `private: true` blocks the npm
    publish that WS-4's `npx remudero init` quickstart depends on. Both must change together, and the
    published tarball must NOT leak local/ , state/, worker credentials, or machine paths."
  design: |
    Add `"bin": { "rmd": "bin/rmd" }` to package.json and flip `private` off (or drop it) with an
    explicit `files` allowlist + `.npmignore`/`publishConfig` so the tarball ships ONLY the runtime
    surface (bin/, src/, settings/, hooks/, README, LICENSE). Never local/, state/, node_modules, or
    any *.pat. `bin/rmd` already resolves its own dir, so it works from any cwd once on PATH. Keep the
    version at a pre-alpha tag; publishability is proven with --dry-run, no actual publish in this PR.
  acceptance:
    - claim: "`rmd` is on PATH after install and runs from OUTSIDE the repo dir"
      proof: "after `npm link` (or a global install of the pack), `which rmd` returns a path and
        `rmd --help` runs from a DIFFERENT directory (paste both, run from e.g. $HOME)"
    - claim: "the publish tarball contains ONLY intended files — no local/, no state/, no credentials"
      proof: "`npm pack --dry-run` output pasted in full; assert no local/, state/, *.pat, node_modules,
        or absolute machine paths appear in the file list"
    - claim: "`rmd --help` exits cleanly (a real CLI has a help path, not just `run-task`)"
      proof: "paste `rmd --help` exit code 0 and its usage text"
  status: queued
  attempts: 0

