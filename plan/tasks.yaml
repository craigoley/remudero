      proof: "a mounts.yaml whose reviewer row violates architect.tier > worker.tier is REJECTED at load with the named Tier-Invariant error (W1-T5 validation, extended)"
    - claim: "reviewer_outcome is recorded on the review.posted ledger line and printed in the console review summary"
      proof: "unit test: a review.posted built from a review.reviewer that ended error_max_turns carries reviewer_outcome=error_max_turns; a completed one carries reviewer_outcome=success; the console summary distinguishes floor-only from completed"
    - claim: "MASTER-PLAN Sec 9 names mount-governed vs deliberately-bounded phases (flat-400 claim corrected)"
      proof: "grep MASTER-PLAN.md Sec 9 for the corrected paragraph naming reviewer/fix/diagnose mount-governed, recon/containment-probe deliberately-bounded"
