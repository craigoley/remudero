    PR): run-task reads the plan from the LOCAL checkout (run-task.ts:612 loadPlan(planPath),
    planPath=join(repoRoot,'plan','tasks.yaml')) and bases worktrees on the LOCAL origin/main ref
    (:785 runTask, :1280 retro) with NO fetch in that path; the ONLY fetch+reset is the daemon's
    NON-self-target clone (:1634-35), whose own comment ('a stale clone would drain an old plan') states
    the exact reasoning that was NEVER applied to run-task or the self target. So a run today silently
    dispatches from whatever the operator last hand-pulled. The runner must NEVER require a manual pull,
    and must NEVER mutate the operator's working tree or local branches — fetch updates remote-tracking
    refs only, and the plan is read AT origin/main, so a dirty DECISIONS.md WIP or a stale local main is
