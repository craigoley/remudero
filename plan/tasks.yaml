    (executed_pass|executed_fail|not_executable|exec_error) recorded on the review.posted ledger line
    and printed in the console summary, so an OBSERVED verdict is legible vs a KEYWORD one.
    HEAD DISCIPLINE (stale-checkout class, documented): proofs execute against a checkout AT THE PR
    HEAD SHA — the runner's own worktree when judging its own run; a fresh temp worktree fetched at
    the head SHA on the rmd review path; NEVER the operator's working checkout. VERIFY the judge call
    site's current checkout source in run-task.ts by reading it first; the call site passing the head
    checkout path into the judge is a NAMED DELIVERABLE of this task (the orphaned-call-site lesson).
