    durations — #193 (plan-only, PRE-W1-T108) 13m11s; #279 (src, non-classify, collapse + FORCE-PUSHED) 24s;
    #282 (src, non-classify) 18s. W1-T108's diff-scope skip + Stryker incremental + actions/cache restore-keys
    (most-recent, cross-branch-safe) already make the PR gate cheap (~18-24s for any PR not touching classify.ts;
    #279's force-push did NOT cold-start it — the per-branch-cache hypothesis is REFUTED by the data). The REAL
    gap the numbers expose: the gate mutates ONLY src/lib/classify.ts (261 lines) — the other ~15k lines of
    src/** have ZERO mutation coverage, and every sampled run since it went live concluded SUCCESS. A gate that
