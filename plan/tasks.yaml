    about your own state). Sibling of the overhaul (W1-T153)."

- id: W1-T128
  title: THE DEAD PROOF FLOOR — 101 of 126 runnable-dialect proofs (80%) can never execute, so proof_exec
    has read 0/N since W1-T72 and the anti-theater gate performs theater
  repo: remudero
  queue_note: |
    MOVED 2026-07-20 from ~line 6566 to here — directly behind the console arc — and given
    depends_on: [W1-T156, W1-T154]. DO NOT re-sort this block back down the file without
    reading why.
    MECHANISM: the drain has NO priority field. nextRunnable (lib/drain.ts) is a linear first-match
    scan over the merged task array in FILE ORDER, deps only GATE, they never SORT — and the merged
    view appends every tasks.d/ shard AFTER all of tasks.yaml (lib/plan.ts). So file position IS the
    priority mechanism, and this task's own 'RETRO PRIORITY 1' rationale text is prose that nothing
    greps, nothing sorts on, and nothing enforces. That marker created the illusion of prioritization
    while the drain skipped past ~90 unblocked tasks ahead of it for weeks. Moving the block IS the
    prioritization. (Corollary: filing this as a tasks.d/ shard would DEMOTE it to the very bottom.)
    FRESHNESS EVIDENCE, 2026-07-20 — three-for-three proof_exec 0/N in a single session, on reviews
    that now gate RATIFICATIONS and machine-emitted plan PRs: PR #391 PASS at 0/3 with an explicit
    'FLOOR DEGRADED: 0/3 proofs executed; keyword floor was binding', PR #394 PASS at 0/4, and #391's
    earlier round at 0/3. Every one rendered 'no test theater' on keyword overlap alone. The floor's
    empirical leg is dead weight at exactly the moment its judgments started gating ratification.
    FINAL EVIDENCE SET, measured from the ledger over the whole 2026-07-20 evening session (all
    review.posted lines at or after 19:00Z). BUILD AGAINST THESE FIXTURES — they are the closing
    measurement of the defect, superseding the four-greens figure above:
      22 verdicts posted (13 success, 9 failure)
      76 proofs across them
      75 NOT_EXECUTABLE — 98%
      1 proof actually executed, all session
    Note the shape: this is not a sampling artifact and not confined to passes. NINE of those verdicts
    were FAILURES, and their unmet reasons read 'proof unmet: report does not substantiate it (matched
    N/M proof keywords)' — so the floor is not merely failing to confirm work, it is actively BLOCKING
    work on lexical overlap while executing nothing. Both polarities of the gate now run on keywords.
    THE CLOSING FIXTURE, and the one that should shape the fix — PR #398 (W1-T156, the console's own
    trust layer): the automated review blocked it with all SIX criteria unmet at proof_exec 0/6 and
    test_theater FALSE, every reason a keyword-coverage miss (4/26, 3/18, 5/48, 3/39, 7/44). The work
    was fully delivered: five falsifier-encoding tests in test/serve.live-state.test.ts mapping 1:1 to
    the criteria, CI green, including assertions written as the criteria's own falsifiers
    (doesNotMatch(text, /^\\s*live\\s*$/) for 'never keeps claiming live'). It was unblocked by
    REWRITING THE PR BODY to carry more of the criteria vocabulary — not one additional line of source,
    not one additional test. The gate then passed 6/6 at proof_exec STILL 0/6. A gate that can be moved
    from FAIL to PASS by better prose, on unchanged code, is measuring authorship rather than
    substantiation. That is the defect stated in its sharpest observed form.
    CONSEQUENCE FOR SEQUENCING, now realised rather than predicted: this defect cost the CONSOLE ARC's
    own delivery on the same night this task was pulled forward behind that arc. W1-T156 is delivered
    and its position as this task's dependency is satisfied — the arc is clear and this task is now the
    drain head.
    TRADEOFF ACCEPTED KNOWINGLY: depends_on is a HARD gate, so the deps are deliberately the MINIMAL
    pair that means 'behind the console arc' — W1-T156 (the arc's last active member, currently the
    drain's next dispatch) and W1-T154 (already merged via PR #388). W1-T152 was CONSIDERED and
    REJECTED as a third dep: a 30-deep dry-run preview of current main never reaches W1-T152 at all
    (it is itself dep-blocked behind W1-T139's W3-* chain), so hitching this task to it would have
    stranded RETRO PRIORITY 1 indefinitely behind the very stall it was pulled forward to escape.
    The no-deps alternative was also rejected: at this file position it would dispatch AHEAD of the
    arc, since the arc members are themselves dep-gated further down the file.
    NOTE for whoever verifies this: `rmd drain --dry-run` reads the ORIGIN/MAIN plan blob (W1-T60),
    not the working tree, so this reordering is INVISIBLE to a preview until it merges. Verify the
    new position with a dry-run AFTER merge, not before.
  type: implement
  verify: auto
  principles:
    tdd: strict
  budget_usd: 100.0
  rationale: 'RETRO PRIORITY 1, filed from #271 holding-note item 9. It re-scores the reliability of every

    review verdict on record.


    MEASURED 2026-07-19 over plan/tasks.yaml: 381 acceptance proofs, of which 126 carry a runnable

    house-dialect prefix (''unit test:'' / ''grep:'') and only 25 can EVER execute. 101 (80%) are

    REFUSED. Mechanism: UNSAFE_FENCE_CHARS_RE in src/lib/review.ts rejects any dialect body

    containing ; & backtick $ < > unless it is a literal test path. Nearly every refusal is a

    single SEMICOLON in ordinary prose — W1-T38''s own proof reads ''unit test: marking an entry

    superseded reduces the counted size; the same bytes as an active entry would exceed the cap''.

    The semicolon alone refuses it.


    CONSEQUENCE: proof_exec has read 0/N on essentially every review since W1-T72 shipped, and

    every FLOOR DEGRADED line traces to this one cause. The floor was designed to catch test

    theater and instead PERFORMS it — green from keyword overlap, rendered as ''no test theater''.

    Confirmed on the four PRs that PASSED on 2026-07-19 (#232/#240/#238/#220): all four report

    proof_exec 0/2 alongside ''PASS - 2 criteria substantiated, no test theater''.


    SUB-FINDING, cheap and independently useful: the floor reads the PR BODY ONLY. On #234 the

    identical proof text posted as a PR COMMENT changed nothing; moved into the body it flipped

    FAIL to PASS. Substantiation written to a comment is invisible to the gate.


    FIX DIRECTION: execute proofs in the EXISTING WORKER SANDBOX — containment already bounds

    them, and the character blocklist was standing in for isolation the harness already has.

    Alternatively a structured proof format (cmd plus expect fields) needing no fence-parsing.'
  design: '(i) Replace character-blocklist REFUSAL with EXECUTION IN THE EXISTING SANDBOX, or adopt a

    structured proof format with explicit cmd/expect fields. The blocklist substituted for

    isolation that containment already provides.

    (ii) The gate must not merely start passing — a genuinely failing proof must still FAIL the

    review. This is the load-bearing constraint: a fix that makes proof_exec non-zero by relaxing

    judgment would deepen the exact defect being fixed.

    (iii) Make the body-only read explicit and documented, or extend substantiation to comments —

    either is acceptable, silently reading one and not the other is not.

    (iv) Report proof_exec honestly: a refused or unexecutable proof must be visibly distinct from

    an executed-and-passed one in the verdict line.'
  acceptance:
  - claim: the 101 currently-refused dialect proofs measurably become executable — proof_exec reads N
      greater than 0 on a standard filing, against the recorded 2026-07-19 baseline of 25 of 126
    proof: 'unit test: test/proof-execution.test.ts'
  - claim: a genuinely failing proof still FAILS the review — the falsifier proving the floor was repaired
      rather than merely relaxed into passing
    proof: 'unit test: test/proof-execution.test.ts'
  - claim: 'the W1-T38 over-cap fixture executes end-to-end: a bulk active corpus goes RED naming the
      overage, reverts, and the same bytes marked superseded go green'
    proof: 'unit test: test/proof-execution.test.ts'
  - claim: 'a proof whose body contains a semicolon executes rather than being refused — the #234 regression
      fixture, the single character that disabled 80 percent of the floor'
    proof: 'unit test: test/proof-execution.test.ts'
  risk: high
  origin: architect
  plan_refs:
  - MASTER-PLAN#12A
  files:
  - src/lib/review.ts
  depends_on: [W1-T156, W1-T154]
