# PR-attribution integrity (plan/pr-attribution-integrity, origin: architect — the first integrity
# INVERSION: a run that CLAIMED work it did not do). Run W1-T54b-1784151420811 was credited verdict=merged
# via PR #80 (Dependabot's own PR) because parseReport takes the FIRST pull-URL in worker output while the
