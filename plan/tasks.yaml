    matching hash does nothing (no redundant install). VERIFY the install-time hash-persistence location, the
    build/serve entry point, and W1-T126's pull->re-exec sequence from source before wiring (distrust this note).
  acceptance:
    - claim: "a pull that changes package-lock.json triggers npm install before build/serve; a matching hash does NOT"
      proof: "unit test over an injected install-runner: a persisted lock-hash that DIFFERS from the current package-lock.json triggers exactly ONE install BEFORE build/serve proceeds; a MATCHING hash triggers NO install (the no-redundant-install falsifier)"
    - claim: "the daemon self-restart (W1-T126) reinstalls on a lock change before re-exec, not just re-pulls"
      proof: "unit test: W1-T126's pull->re-exec path, given a package-lock.json change between the boot sha and the new sha, runs npm install BEFORE re-exec; with no lock change it re-execs WITHOUT installing"
    - claim: "the workspace-conversion fixture (CI-green, operator-broke) is caught"
      proof: "unit test: a fixture converting to workspaces (package.json workspaces added + lock changed) makes the freshness check detect the change and install; the pre-fix path (no install) would run stale node_modules against new code — asserted as the caught regression"
