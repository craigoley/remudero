# Ratifies P15 (captured #101): the deterministic FLOOR observes repo state, not just report keywords —
# so a correct verdict survives reviewer death (kills both the #100 false-block and the W1-T51 false-pass).
- id: W1-T65
  title: "The deterministic FLOOR executes whitelisted proofs against the PR head (observation survives reviewer death; ratifies P15)"
  repo: remudero
  depends_on: [W1-T3F]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "Ratifies P15 (captured #101). GROUND TRUTH (self-host cycle): the reviewer completes on
    simple PRs and dies error_max_turns on complex ones; on death the gate falls to the FLOOR, which
    keyword-matches the REPORT and is BLIND to repo state (review.ts's own comment: 'the deeper fix is
    observing repo state, not keywords'). One fact, both failure directions: FALSE-PASS (W1-T51 merged
    '2 of 4 criteria substantiated') and FALSE-BLOCK (W1-T18/#100 — the work was genuinely on the branch,
    verified from source, but not keyword-claimed in the report). W1-T63 makes the reviewer complete more
    often; the floor stays blind, so ANY future reviewer death re-opens both holes. W1-T3F/#35 built
    whitelisted observation in the ADVISORY layer; this task lifts it into the BINDING one, making the
    reviewer purely additive (subtle-catch) and never load-bearing for basic correctness."
  design: |
    Lift W1-T3F's whitelisted-proof execution into judgeCriterion's floor. WHITELIST UNCHANGED from
    W1-T3F (a named test or a grep; free-prose proofs keep the keyword floor; no arbitrary code
    execution from proof text). Execution semantics, all legible:
    (1) executed_pass -> criterion MET, regardless of report keywords (kills the #100 false-block).
    (2) executed_fail -> criterion UNMET, OVERRIDING any keyword-coverage pass (kills the W1-T51
        false-pass: a claim the repo state refutes never merges on prose).
