- id: W1-T3F
  title: The reviewer verifies a criterion against REPO STATE (run test/grep on PR head), not only diff+report
  repo: remudero
  depends_on: [W1-T1D]
  type: implement
  verify: auto
  principles: {tdd: strict}
  budget_usd: 100.00
  rationale: "OWN CONCERN + the REAL fix for the false-positive class. The reviewer judges diff+report and
    never repo state, so a criterion satisfied by an EARLIER PR is permanently unsatisfiable by a later one
    (the failure that forced the `satisfied_by` manual patch). Give the reviewer the ability to OBSERVE:
    a criterion whose proof is a test name or a grep can be checked by RUNNING it on the PR head.
    `satisfied_by` is a manual patch; observation is the real fix, so this earns its own task."
  acceptance:
    - claim: "a criterion satisfied by an EARLIER PR is judged MET WITHOUT any satisfied_by annotation,
        because the reviewer OBSERVED it (its named test passes / its grep matches on the PR head)"
      proof: "over a PR that does NOT itself deliver the criterion's code, the reviewer runs the proof's
        named test (or grep) against the PR head, sees it pass/match, and marks the criterion MET — with
        NO satisfied_by present; a criterion whose test FAILS on the head is still marked unmet (fail-closed)"
    - claim: "observation is bounded and deterministic (only whitelisted proof shapes: a test name or a grep)"
      proof: "unit test: a proof that names a test or a grep is executed; a free-prose proof falls back to
        the keyword floor unchanged (no arbitrary code execution from proof text)"
  status: queued
  attempts: 0

