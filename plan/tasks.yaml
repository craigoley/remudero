  acceptance:
    - claim: "`rmd run-task <id>` executes ONE tasks.yaml entry end-to-end: recon → prompt → implement → PR"
      proof: "a merged PR on remudero-sandbox whose ledger line names the task id"
    - claim: "src/lib/ is unchanged in behavior (lifted, not rewritten)"
      proof: "spike's env unit tests still 4/4 green; git diff shows moves, not rewrites"
    - claim: "worker settings are VALIDATED before spawn (WS-0 FF10a: -p drops invalid settings silently)"
      proof: "a planted schema typo (allowedDomains at sandbox root) FAILS the guard with a named error"
  status: queued           # decorative — real merge-state is DERIVED FROM GITHUB (see header + lib/status.ts)
  pr: 2                     # merged PR #2 -> deriveStatus resolves this task as merged
  attempts: 0

