  budget_usd: 100.00
  rationale: "Ratifies P23, investigation complete (operator ledger read, 2026-07-17): both novel blocks
    were ONE bootstrap night's guards firing CORRECTLY — blocked_isolation on 2 inherited shell functions
    (FIELD FINDING 11b class, $0.25), blocked_containment on 'no OS-denial observed -> UNPROVEN, fail
    closed' ($0) — during the W1-T63 build session; the task later merged and both preflights pass
    routinely since. Zero host regressions. The confirmed gap: the reason strings are rich PROSE the
    retro cannot classify — guard-fired blocks currently read as task failures, polluting the task's
    defect stats with infrastructure events."
  design: |
    (i) STRUCTURE AT WRITE: guard-block verdict ledger lines gain structured fields — guard (isolation|
    containment), check (the specific probe: inherited-functions|outside-cwd-denial|...), observed (the
    measured value) — alongside the existing prose reason; the preflight's three-state epistemology
    (proven-holding | proven-broken | UNPROVEN) is preserved in `observed`, never collapsed.
