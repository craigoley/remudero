    LIVE FINDING (2026-07-19 quota forensics): orphaned PID 87119 — a gh pr create --fill --base main
    armed with sleep-until-exact-quota-reset, spawned from a worker's shell snapshot, discovered AFTER
    its run ended. It would have opened an unattributed PR the moment quota returned: a worker action
    firing outside its run's lifetime, budget, attribution, and gates.

    STRUCTURAL GAP, verified in the checkout (the finding's durable half): src/lib/worker.ts spawns
    via the SDK query() and src/lib/daemon.ts drives the poll loop, and NEITHER contains any process-
    group, session, or teardown-kill logic — no setsid, no group signal, no survivor scan. Teardown
    today reaps WORKTREES (pruneStaleWorktrees, live-pid-aware) but never PROCESSES. The write fence
    and isolation probes bound what a worker touches DURING a run; nothing bounds WHEN a worker's
    effects stop. A surviving process is an escape from every per-run guarantee at once.

    EVIDENCE CAVEAT, recorded so the builder does not over-trust the trigger: PID 87119 is GONE and
    the incident is NOT in state/ledger.ndjson — there is no orphan-related step, because the very
    ledgering this task adds does not exist yet. The specific process is operator testimony,
    unreproducible after the fact. The absent-teardown gap above is what is independently checkable,
    and it alone justifies the task.
