  type: implement
  verify: auto
  principles: {tdd: encouraged}
  budget_usd: 100.00
  rationale: "MASTER-PLAN §5 CI mechanics. A conditionally-skipped required check DEADLOCKS merge forever
    (LEARNINGS); as tiers add path-filtered sub-jobs, the fix is ONE always-runs aggregator that reads
    SIBLING check-runs across workflows (NOT `needs:`, which can't cross workflow files) and is the single
    required context. The required context is the JOB NAME, not the workflow file."
  design: |
    ★ CORRECTED to the installed fleet pattern (craigoley/synthwatch .github/workflows/ci-gate.yml, this
    sweep): a `needs:`-based aggregator only sees jobs WITHIN ONE workflow, but remudero's required checks
    live in SEPARATE workflows (codeql / semgrep / osv-scanner-pr / claude-review, etc.) — `needs:` cannot
    reference them, and a SKIPPED reusable-workflow caller creates NO check run, deadlocking branch
    protection forever (synthwatch #102, an esbuild Dependabot bump sat blocked). So `ci-gate` instead
    READS THE PR HEAD COMMIT'S CHECK RUNS across ALL workflows (gh api, `checks: read`), ALWAYS runs (no
    `if:`, no path filter — so its context ALWAYS reports), treats skipped/absent siblings as OK, and FAILS
    ONLY on a real failure conclusion. Rewire protection so required_status_checks.contexts == [ci-gate,
    remudero-review] (an admin `gh api` PATCH — Craig's to run).
  acceptance:
    - claim: ".github/workflows/ci-gate.yml exists and aggregates the PR head's CHECK-RUNS via gh api (checks: read), not a needs: list — always runs, skipped/absent OK, fails only on a real failure conclusion"
