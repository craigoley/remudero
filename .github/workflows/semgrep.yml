name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, off-peak (Mondays 05:23 UTC — staggered from CodeQL/OSV).
    - cron: "23 5 * * 1"
  workflow_dispatch:

# Least privilege at the top level (Scorecard TokenPermissions: a topLevel write
# permission scores worse than the identical permission scoped to job level, even
# though this workflow has only one job — W1-T66); the job below elevates only
# what it needs.
permissions:
  contents: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    # Standalone / community edition, run from the official pinned image — no pip
    # install (Scorecard PinnedDependencies flagged the old `pip install
    # semgrep==1.167.0` as unpinned; pip has no single-line hash-pin for a package
    # plus its full transitive dependency set without also hash-locking every
    # transitive dep, so W1-T66 switched to the vendor image instead, pinned by
    # digest like every other action reference in this repo), no SEMGREP_APP_TOKEN,
    # no Semgrep Cloud.
    container:
      image: semgrep/semgrep@sha256:4095860d71cc40d42617b92b0b420711736ada7d67fdb254c5ef4f37dd8fc3ec # 1.167.0
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run Semgrep
        # Never fail the build here; findings surface in the Security tab via SARIF.
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif
        continue-on-error: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
