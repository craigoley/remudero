name: Semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, off-peak (Mondays 05:23 UTC — staggered from CodeQL/OSV).
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Semgrep CE
        # Standalone / community edition — no SEMGREP_APP_TOKEN, no Semgrep Cloud.
        run: pip install "semgrep==1.167.0"

      - name: Run Semgrep
        # Never fail the build here; findings surface in the Security tab via SARIF.
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config p/security-audit \
            --config p/secrets \
            --sarif --output semgrep.sarif
        continue-on-error: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep
