name: OSV-Scanner (PR)

# Diff-aware scan of the dependency tree, using Google's official reusable
# PR workflow. fail-on-vuln: true — deliberately stricter than the fleet's
# warn-only default, because W1-T23's acceptance proof is a planted
# known-CVE dependency turning THIS job red and AWAITABLE in the PR run
# (Dependabot's own alert is async and not awaitable there).
on:
  pull_request:
    branches: [main]

# Least privilege at the top level (Scorecard TokenPermissions: a topLevel write
# permission scores worse than the same permission scoped to job level — W1-T66);
# the job below passes its own, full permissions block to the reusable workflow.
permissions:
  contents: read

jobs:
  scan-pr:
    # No actor exemption: a Dependabot PR is exactly the shape of PR that changes dependencies,
    # so it is exactly the PR this scanner must run on, not skip (W1-T211). Skipping it here was
    # doubly wrong: it exempted the highest-risk PRs from the dependency scanner, AND (once this
    # check-run's name is REQUIRED by ci-gate.yml) a skipped `uses:` reusable-workflow caller
    # registers NO check run under that nested name at all -- ci-gate.yml's own header documents
    # this as the synthwatch #102 deadlock class -- so exempting the actor would have permanently
    # blocked every Dependabot PR once ci-gate started awaiting this check instead of racing it.
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # Recursively scan the repo (picks up package-lock.json at the root).
      scan-args: |-
        -r
        ./
      fail-on-vuln: true
    permissions:
      security-events: write
      contents: read
      actions: read
