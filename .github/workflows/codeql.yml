name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, off-peak (Mondays 04:17 UTC — deliberately not on :00/:30).
    - cron: "17 4 * * 1"
  workflow_dispatch:

# Explicit workflow — GitHub's *default* CodeQL setup is left OFF at the
# repo level (code-scanning/default-setup) because running both conflicts
# and leaves each unreliable (fleet lesson, MASTER-PLAN §5).
#
# Least privilege at the top level (Scorecard TokenPermissions: a topLevel write
# permission scores worse than the identical permission scoped to job level, even
# though this workflow has only one job — W1-T66); the job below elevates only
# what it needs.
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    # Cancel superseded runs of the same ref + language, but never cancel
    # in-flight runs of a different language.
    concurrency:
      group: codeql-${{ github.workflow }}-${{ github.ref }}-${{ matrix.language }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # remudero orchestrates its own fleet of workflows — scan them too.
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality: security-extended queries + maintainability.
          queries: security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:${{ matrix.language }}"
